# Flutter widget bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/flutter_widgets.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.
#
# Types covered:
#   Bridge classes (dartic code can extend):
#     - StatelessWidget, StatefulWidget, State
#   Binding-only (dartic code uses, not extends):
#     - Widget, BuildContext, Navigator
#     - Material: MaterialApp, Scaffold, AppBar, Text, ElevatedButton, etc.

output_bindings: "../lib/src/bindings"
output_plugins: "../lib/src/plugins"

# Use package: imports instead of relative imports (external package).
custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/src/api/dartic_absent.dart"
  - "package:dartic/src/runtime/object.dart"
  - "package:flutter/foundation.dart"
  - "package:flutter/rendering.dart"
  - "package:flutter/gestures.dart"
  - "package:flutter/services.dart"
  - "package:flutter/widgets.dart"
  - "package:flutter/material.dart"

libraries:
  # ── Framework types (from package:flutter/widgets.dart) ───────────────
  #
  # The analyzer resolves these to their actual src/ URIs automatically
  # (e.g. package:flutter/src/widgets/framework.dart::StatelessWidget).

  - uri: package:flutter/widgets.dart
    classes:
      # Widget — abstract base, binding-only
      - Widget

      # StatelessWidget — bridge with custom lifecycle
      - name: StatelessWidget
        bridge: true

      # StatefulWidget — bridge with custom lifecycle
      - name: StatefulWidget
        bridge: true

      # State — bridge with @mustCallSuper lifecycle methods
      - name: State
        bridge: true

      # BuildContext — binding-only
      - BuildContext

      # Navigator — binding-only
      - Navigator

      # Layout widgets — binding-only
      - Center
      - Column
      - Row
      - SizedBox
      - Padding
      - Expanded
      - Container
      - Text
      - Icon

      # ── Task 12: Layout & Basic (~34 types) ──────────────────────────────
      - Stack
      - Positioned
      - PositionedDirectional
      - IndexedStack
      - Flex
      - Flexible
      - Wrap
      - Align
      - FittedBox
      - FractionallySizedBox
      - LimitedBox
      - OverflowBox
      - AspectRatio
      - ConstrainedBox
      - UnconstrainedBox
      - IntrinsicWidth
      - IntrinsicHeight
      - Opacity
      - ClipRect
      - ClipRRect
      - ClipOval
      - ClipPath
      - Transform
      - RotatedBox
      - FractionalTranslation
      - Offstage
      - IgnorePointer
      - AbsorbPointer
      - RepaintBoundary
      - ColoredBox
      - PhysicalModel
      - PhysicalShape
      - CustomPaint
      - Directionality

      # ── Task 13: Interaction & Scroll (~20 types) ────────────────────────
      - GestureDetector
      - ListView
      - GridView
      - CustomScrollView
      - SingleChildScrollView
      - PageView
      - Builder
      - StatefulBuilder
      - FadeInImage
      - Form
      - MediaQuery
      - DefaultTextStyle
      - RichText

      # ── Task 14: Animation & Navigation (~22 types) ──────────────────────
      - AnimatedContainer
      - AnimatedPadding
      - AnimatedAlign
      - AnimatedPositioned
      - AnimatedOpacity
      - AnimatedDefaultTextStyle
      - AnimatedPhysicalModel
      - AnimatedScale
      - AnimatedRotation
      - AnimatedSlide
      - AnimatedSwitcher
      - AnimatedSize
      - SlideTransition
      - ScaleTransition
      - RotationTransition
      - FadeTransition
      - SizeTransition
      - DecoratedBoxTransition
      - Hero
      - PageRouteBuilder
      - RouteSettings

      # ── Task 15: Other (~11 types) ───────────────────────────────────────
      - Dismissible
      - DraggableScrollableSheet
      - Placeholder
      - PreferredSize
      - Overlay
      - OverlayEntry
      - LayoutBuilder
      - OrientationBuilder
      - Tooltip

      # ── Task 13: Enums ──────────────────────────────────────────────────
      - ScrollViewKeyboardDismissBehavior
      - ConnectionState
      - AutovalidateMode
      - Orientation

    overrides:
      # ── StatelessWidget: custom Bridge (Widget @nonVirtual hashCode/==) ──
      StatelessWidget:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
        preamble: |
          /// Bridge class that allows dartic code to extend StatelessWidget.
          ///
          /// Widget marks `hashCode` and `==` as `@nonVirtual`, so this Bridge
          /// cannot override them (unlike standard dart:core Bridge classes).
          class _$StatelessWidget extends StatelessWidget implements DarticObjectHolder {
            _$StatelessWidget(this._dispatch, this.$darticObject, List<Object?> superArgs)
                : super(key: superArgs.isNotEmpty && !identical(superArgs[0], darticAbsent) ? superArgs[0] as Key? : null);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            @override
            Widget build(BuildContext context) {
              final r = _dispatch.invoke(this, $darticObject, 'build', [context]);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'StatelessWidget.build() must be overridden in dartic code');
              }
              return r as Widget;
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStatelessWidgetBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$StatelessWidget(dispatch, obj, superArgs);
        extra_methods:
          "build#1": "(args) => (args[0] as _$StatelessWidget).build(args[1] as BuildContext)"
          "toString#0": "(args) => (args[0] as StatelessWidget).toString()"
          "hashCode#0": "(args) => (args[0] as StatelessWidget).hashCode"
          "==#1": "(args) => args[0] == args[1]"
          "key#0": "(args) => (args[0] as StatelessWidget).key"

      # ── StatefulWidget: custom Bridge ──────────────────────────────────
      StatefulWidget:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
          - no_logic_in_create_state
        preamble: |
          /// Bridge class that allows dartic code to extend StatefulWidget.
          class _$StatefulWidget extends StatefulWidget implements DarticObjectHolder {
            _$StatefulWidget(this._dispatch, this.$darticObject, List<Object?> superArgs)
                : super(key: superArgs.isNotEmpty && !identical(superArgs[0], darticAbsent) ? superArgs[0] as Key? : null);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            @override
            State createState() {
              final r = _dispatch.invoke(this, $darticObject, 'createState', const []);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'StatefulWidget.createState() must be overridden in dartic code');
              }
              return r as State;
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStatefulWidgetBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$StatefulWidget(dispatch, obj, superArgs);
        extra_methods:
          "createState#0": "(args) => (args[0] as _$StatefulWidget).createState()"
          "toString#0": "(args) => (args[0] as StatefulWidget).toString()"
          "hashCode#0": "(args) => (args[0] as StatefulWidget).hashCode"
          "==#1": "(args) => args[0] == args[1]"
          "key#0": "(args) => (args[0] as StatefulWidget).key"

      # ── State: custom Bridge with @mustCallSuper lifecycle methods ─────
      State:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
        preamble: |
          /// Bridge class that allows dartic code to extend State.
          ///
          /// Lifecycle method delegation uses wrapped delegation pattern:
          /// - `build()` — required override: throws if not overridden
          /// - `initState()` — always calls super first, then dispatches
          /// - `dispose()` — dispatches first, then always calls super
          /// - `didUpdateWidget()`/`didChangeDependencies()` — super first
          /// - `deactivate()` — dispatch first, then super
          ///
          /// This ensures @mustCallSuper contracts are always satisfied.
          class _$State extends State<StatefulWidget> implements DarticObjectHolder {
            // superArgs is unused — State has no meaningful super constructor args.
            // The parameter is required by the BridgeFactory signature.
            _$State(this._dispatch, this.$darticObject, List<Object?> superArgs);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            @override
            Widget build(BuildContext context) {
              final r = _dispatch.invoke(this, $darticObject, 'build', [context]);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'State.build() must be overridden in dartic code');
              }
              return r as Widget;
            }

            @override
            void initState() {
              super.initState();
              _dispatch.invoke(this, $darticObject, 'initState', const []);
            }

            @override
            void dispose() {
              _dispatch.invoke(this, $darticObject, 'dispose', const []);
              super.dispose();
            }

            @override
            void didUpdateWidget(covariant StatefulWidget oldWidget) {
              super.didUpdateWidget(oldWidget);
              _dispatch.invoke(this, $darticObject, 'didUpdateWidget', [oldWidget]);
            }

            @override
            void didChangeDependencies() {
              super.didChangeDependencies();
              _dispatch.invoke(this, $darticObject, 'didChangeDependencies', const []);
            }

            @override
            void deactivate() {
              _dispatch.invoke(this, $darticObject, 'deactivate', const []);
              super.deactivate();
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStateBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$State(dispatch, obj, superArgs);
        extra_methods:
          "build#1": "(args) => (args[0] as _$State).build(args[1] as BuildContext)"
          "initState#0": "(args) { (args[0] as _$State).initState(); return null; }"
          "dispose#0": "(args) { (args[0] as _$State).dispose(); return null; }"
          "setState#1": |
            (args) {
              final fn = args[1] as Function;
              (args[0] as State).setState(() { fn(); });
              return null;
            }
          "mounted#0": "(args) => (args[0] as State).mounted"
          "widget#0": "(args) => (args[0] as State).widget"
          "context#0": "(args) => (args[0] as State).context"
          "toString#0": "(args) => (args[0] as State).toString()"
          "hashCode#0": "(args) => (args[0] as State).hashCode"
          "==#1": "(args) => args[0] == args[1]"

      # ── BuildContext: suppress unusable generic methods ────────────────
      # These generic methods require reified type arguments the interpreter
      # can't provide. Override with throwing stubs so the auto-generated
      # (type-erased) versions are suppressed.
      BuildContext:
        extra_methods:
          "findAncestorWidgetOfExactType#0": "(args) => throw UnsupportedError('findAncestorWidgetOfExactType requires reified type argument')"
          "findAncestorStateOfType#0": "(args) => throw UnsupportedError('findAncestorStateOfType requires reified type argument')"
          "findRootAncestorStateOfType#0": "(args) => throw UnsupportedError('findRootAncestorStateOfType requires reified type argument')"
          "getInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getInheritedWidgetOfExactType requires reified type argument')"
          "getElementForInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getElementForInheritedWidgetOfExactType requires reified type argument')"
          "findAncestorRenderObjectOfType#0": "(args) => throw UnsupportedError('findAncestorRenderObjectOfType requires reified type argument')"

      # ── Navigator: no extra overrides needed ─────────────────────────

  # ── Material widgets (from package:flutter/material.dart) ─────────────

  - uri: package:flutter/material.dart
    classes:
      - MaterialApp
      - Scaffold
      - AppBar
      - ElevatedButton
      - TextButton
      - FloatingActionButton
      - Card
      - ListTile
