# Flutter painting bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/painting.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/painting"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: package:flutter/src/painting
    discover: all
    exclude:
      # Platform-specific classes not available on all platforms
      - package:flutter/src/painting/_network_image_io.dart::NetworkImage
    classes:
      - name: NotchedShape
        bridge: true
      - name: Decoration
        bridge: false

    overrides:
      # ── NotchedShape: abstract getOuterPath — prevent bridge recursion ──
      NotchedShape:
        extra_methods:
          "getOuterPath#2": "(args) => throw UnsupportedError('getOuterPath() is abstract — must be overridden')"

      # ── ColorSwatch: fromFields ──
      # Field layout (6 fields, alphabetical):
      #   args[0] = _swatch  (Map<dynamic, Color>)
      #   args[1] = a        (double)
      #   args[2] = colorSpace (ColorSpace)
      #   args[3] = g        (double)
      #   args[4] = r        (double)
      #   args[5] = value    (int)  — the raw color int, same as ctor's 'primary'
      # a/g/r are computed from primary; _rotationRadians is irrelevant here.
      # Pass value (args[5]) as primary and _swatch (args[0]) as swatch.
      ColorSwatch:
        extra_methods:
          "_#fromFields#6": "(args) => ColorSwatch<dynamic>(args[5] as int, (args[0] as Map).cast<dynamic, Color>())"

      # ── FlutterLogoDecoration: fromFields ──
      # Field layout (5 fields, alphabetical among public+private):
      #   args[0] = _opacity    (double — internal, not a ctor param)
      #   args[1] = _position   (computed from style — not a ctor param)
      #   args[2] = margin      (EdgeInsets)
      #   args[3] = style       (FlutterLogoStyle)
      #   args[4] = textColor   (Color)
      # _opacity and _position are recomputed by the ctor, so we omit them.
      FlutterLogoDecoration:
        extra_methods:
          "_#fromFields#5": "(args) => FlutterLogoDecoration(textColor: args[4] as ui.Color, style: args[3] as FlutterLogoStyle, margin: args[2] as EdgeInsets)"

      # ── StarBorder: fromFields ──
      # Field layout (7 fields, alphabetical):
      #   args[0] = _rotationRadians (double, stored in radians)
      #   args[1] = innerRadiusRatio (double)
      #   args[2] = pointRounding    (double)
      #   args[3] = points           (double)
      #   args[4] = side             (BorderSide)
      #   args[5] = squash           (double)
      #   args[6] = valleyRounding   (double)
      # The ctor accepts 'rotation' in degrees; _rotationRadians = rotation * pi/180.
      # Reverse: rotation = _rotationRadians * 180 / pi (use math.pi from the existing import).
      StarBorder:
        extra_methods:
          "_#fromFields#7": "(args) => StarBorder(side: args[4] as BorderSide, points: args[3] as double, innerRadiusRatio: args[1] as double, pointRounding: args[2] as double, valleyRounding: args[6] as double, rotation: (args[0] as double) * 180.0 / math.pi, squash: args[5] as double)"

      # ── StrutStyle: fromFields ──
      # Field layout (11 fields, alphabetical):
      #   args[0]  = _fontFamilyFallback (List<String>?)  — raw private field
      #   args[1]  = _package            (String?)        — raw private field
      #   args[2]  = debugLabel          (String?)
      #   args[3]  = fontFamily          (String?)        — already has package prefix baked in
      #   args[4]  = fontSize            (double?)
      #   args[5]  = fontStyle           (FontStyle?)
      #   args[6]  = fontWeight          (FontWeight?)
      #   args[7]  = forceStrutHeight    (bool?)
      #   args[8]  = height              (double?)
      #   args[9]  = leading             (double?)
      #   args[10] = leadingDistribution (TextLeadingDistribution?)
      # fontFamily (args[3]) already includes the package prefix, so pass package=null
      # to avoid double-prefixing. Pass _fontFamilyFallback directly as fontFamilyFallback.
      StrutStyle:
        extra_methods:
          "_#fromFields#11": |
            (args) => StrutStyle(
              fontFamily: args[3] as String?,
              fontFamilyFallback: args[0] == null ? null : (args[0] as List).cast<String>(),
              fontSize: args[4] as double?,
              height: args[8] as double?,
              leadingDistribution: args[10] as TextLeadingDistribution?,
              leading: args[9] as double?,
              fontWeight: args[6] as FontWeight?,
              fontStyle: args[5] as FontStyle?,
              forceStrutHeight: args[7] as bool?,
              debugLabel: args[2] as String?,
              package: null,
            )

      # ── TextStyle: fromFields ──
      # Field layout (26 fields, alphabetical):
      #   args[0]  = _fontFamilyFallback (List<String>?)
      #   args[1]  = _package            (String?)
      #   args[2]  = background          (Paint?)
      #   args[3]  = backgroundColor     (Color?)
      #   args[4]  = color               (Color?)
      #   args[5]  = debugLabel          (String?)
      #   args[6]  = decoration          (TextDecoration?)
      #   args[7]  = decorationColor     (Color?)
      #   args[8]  = decorationStyle     (TextDecorationStyle?)
      #   args[9]  = decorationThickness (double?)
      #   args[10] = fontFamily          (String?)  — already has package prefix baked in
      #   args[11] = fontFeatures        (List<FontFeature>?)
      #   args[12] = fontSize            (double?)
      #   args[13] = fontStyle           (FontStyle?)
      #   args[14] = fontVariations      (List<FontVariation>?)
      #   args[15] = fontWeight          (FontWeight?)
      #   args[16] = foreground          (Paint?)
      #   args[17] = height              (double?)
      #   args[18] = inherit             (bool)
      #   args[19] = leadingDistribution (TextLeadingDistribution?)
      #   args[20] = letterSpacing       (double?)
      #   args[21] = locale              (Locale?)
      #   args[22] = overflow            (TextOverflow?)
      #   args[23] = shadows             (List<Shadow>?)
      #   args[24] = textBaseline        (TextBaseline?)
      #   args[25] = wordSpacing         (double?)
      # fontFamily (args[10]) already includes the package prefix; pass package=null.
      TextStyle:
        extra_methods:
          "_#fromFields#26": |
            (args) => TextStyle(
              inherit: args[18] as bool,
              color: args[4] as ui.Color?,
              backgroundColor: args[3] as ui.Color?,
              fontSize: args[12] as double?,
              fontWeight: args[15] as ui.FontWeight?,
              fontStyle: args[13] as ui.FontStyle?,
              letterSpacing: args[20] as double?,
              wordSpacing: args[25] as double?,
              textBaseline: args[24] as ui.TextBaseline?,
              height: args[17] as double?,
              leadingDistribution: args[19] as ui.TextLeadingDistribution?,
              locale: args[21] as ui.Locale?,
              foreground: args[16] as ui.Paint?,
              background: args[2] as ui.Paint?,
              shadows: args[23] == null ? null : (args[23] as List).cast<ui.Shadow>(),
              fontFeatures: args[11] == null ? null : (args[11] as List).cast<ui.FontFeature>(),
              fontVariations: args[14] == null ? null : (args[14] as List).cast<ui.FontVariation>(),
              decoration: args[6] as ui.TextDecoration?,
              decorationColor: args[7] as ui.Color?,
              decorationStyle: args[8] as ui.TextDecorationStyle?,
              decorationThickness: args[9] as double?,
              debugLabel: args[5] as String?,
              fontFamily: args[10] as String?,
              fontFamilyFallback: args[0] == null ? null : (args[0] as List).cast<String>(),
              package: null,
              overflow: args[22] as TextOverflow?,
            )
