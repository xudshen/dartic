# Flutter painting bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/painting.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/painting"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: package:flutter/src/painting
    discover: all
    exclude:
      # Platform-specific classes not available on all platforms
      - package:flutter/src/painting/_network_image_io.dart::NetworkImage
    classes:
      - name: NotchedShape
        bridge: true

    overrides:
      # ── NotchedShape: abstract getOuterPath — prevent bridge recursion ──
      NotchedShape:
        extra_methods:
          "getOuterPath#2": "(args) => throw UnsupportedError('getOuterPath() is abstract — must be overridden')"
