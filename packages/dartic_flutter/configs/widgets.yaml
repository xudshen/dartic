# Flutter widgets bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/widgets.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/widgets"
output_plugins: "../lib/src/plugins"

libraries:
  # ── Framework types (from package:flutter/widgets.dart) ───────────────
  #
  # The analyzer resolves these to their actual src/ URIs automatically
  # (e.g. package:flutter/src/widgets/framework.dart::StatelessWidget).

  - uri: package:flutter/src/widgets
    discover: all
    classes:
      - name: StatelessWidget
        bridge: true

      - name: StatefulWidget
        bridge: true

      - name: State
        bridge: true
      # Bridge skipped: generic/covariant type issues in bridge class
      - name: AutocompleteHighlightedOption
        bridge: false
      - name: ConstrainedLayoutBuilder
        bridge: false
      - name: LayoutBuilder
        bridge: false
      - name: MediaQuery
        bridge: false
      - name: SliverLayoutBuilder
        bridge: false
      - name: SlottedMultiChildRenderObjectWidget
        bridge: false
      - name: WidgetStateMapper
        bridge: false
      - name: WidgetStateTextStyle
        bridge: false
      - name: WindowScope
        bridge: false
      - name: RestorableEnumN
        bridge: false
      - name: RestorableNum
        bridge: false

    overrides:
      # ── TweenAnimationBuilder: fromFields needs ValueWidgetBuilder<Object?> ──
      TweenAnimationBuilder:
        extra_methods:
          "_#fromFields#7": |
            (args) => TweenAnimationBuilder<Object?>(key: args[4] as Key?, tween: args[6] as Tween<Object>, duration: args[3] as Duration, curve: args[2] as Curve, builder: args[0] as ValueWidgetBuilder<Object?>, onEnd: args[5] as VoidCallback?, child: args[1] as Widget?)

      # ── StatelessWidget ──
      StatelessWidget:
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member

      # ── StatefulWidget ──
      StatefulWidget:
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
          - no_logic_in_create_state

      # ── State ──
      State:
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member

      # ── BuildContext: suppress unusable generic methods ────────────────
      # These generic methods require reified type arguments the interpreter
      # can't provide. Override with throwing stubs so the auto-generated
      # (type-erased) versions are suppressed.
      BuildContext:
        extra_methods:
          "findAncestorWidgetOfExactType#0": "(args) => throw UnsupportedError('findAncestorWidgetOfExactType requires reified type argument')"
          "findAncestorStateOfType#0": "(args) => throw UnsupportedError('findAncestorStateOfType requires reified type argument')"
          "findRootAncestorStateOfType#0": "(args) => throw UnsupportedError('findRootAncestorStateOfType requires reified type argument')"
          "getInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getInheritedWidgetOfExactType requires reified type argument')"
          "getElementForInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getElementForInheritedWidgetOfExactType requires reified type argument')"
          "findAncestorRenderObjectOfType#0": "(args) => throw UnsupportedError('findAncestorRenderObjectOfType requires reified type argument')"

      # ── AsyncSnapshot: 4 ctors, discriminate by error/data/connectionState ──
      AsyncSnapshot:
        extra_methods:
          "_#fromFields#4": |
            (args) {
              final cs = args[0] as ConnectionState;
              final data = args[1];
              final error = args[2];
              final stackTrace = args[3];
              if (error != null) return AsyncSnapshot<dynamic>.withError(cs, error as Object, stackTrace == null ? StackTrace.empty : stackTrace as StackTrace);
              if (data != null) return AsyncSnapshot<dynamic>.withData(cs, data);
              if (cs == ConnectionState.waiting) return AsyncSnapshot<dynamic>.waiting();
              return AsyncSnapshot<dynamic>.nothing();
            }

      # ── BackdropFilter: 7 fields, _useSharedKey unmapped, use primary ctor ──
      BackdropFilter:
        extra_methods:
          "_#fromFields#7": |
            (args) => BackdropFilter(key: args[6] as Key?, filter: args[5] as ui.ImageFilter, child: args[3] as Widget?, blendMode: args[2] as ui.BlendMode, enabled: args[4] as bool, backdropGroupKey: args[1] as BackdropKey?)

      # ── Shortcuts: 6 fields, manager unmapped from primary ctor ────────────
      Shortcuts:
        extra_methods:
          "_#fromFields#6": |
            (args) {
              final manager = args[5];
              if (manager != null) return Shortcuts.manager(key: args[4] as Key?, manager: manager as ShortcutManager, child: args[1] as Widget, debugLabel: args[2] as String?, includeSemantics: args[3] as bool);
              return Shortcuts(key: args[4] as Key?, shortcuts: (args[0] as Map).cast<ShortcutActivator, Intent>(), child: args[1] as Widget, debugLabel: args[2] as String?, includeSemantics: args[3] as bool);
            }

      # ── SpellCheckConfiguration: 5 fields, _spellCheckEnabled unmapped ─────
      SpellCheckConfiguration:
        extra_methods:
          "_#fromFields#5": |
            (args) {
              final enabled = args[0];
              if (enabled == false) return SpellCheckConfiguration.disabled();
              return SpellCheckConfiguration(spellCheckService: args[3] as SpellCheckService?, misspelledSelectionColor: args[1] as Color?, misspelledTextStyle: args[2] as TextStyle?, spellCheckSuggestionsToolbarBuilder: args[4] == null ? null : (a, b) => (args[4] as Function)(a, b));
            }

      # ── TapRegion: 11 fields, 1 ctor, COMPUTED debugLabel passed directly ──
      TapRegion:
        extra_methods:
          "_#fromFields#11": |
            (args) => TapRegion(key: args[6] as Key?, child: args[1] as Widget?, enabled: args[4] as bool, behavior: args[0] as HitTestBehavior, onTapOutside: args[8] == null ? null : (a) => (args[8] as Function)(a), onTapInside: args[7] == null ? null : (a) => (args[7] as Function)(a), onTapUpOutside: args[10] == null ? null : (a) => (args[10] as Function)(a), onTapUpInside: args[9] == null ? null : (a) => (args[9] as Function)(a), groupId: args[5], consumeOutsideTaps: args[2] as bool, debugLabel: args[3] as String?)

      # ── Text: 18 fields, 2 ctors, discriminate by textSpan ─────────────────
      Text:
        extra_methods:
          "_#fromFields#18": |
            (args) {
              final textSpan = args[16];
              if (textSpan != null) return Text.rich(textSpan as InlineSpan, key: args[1] as Key?, style: args[10] as TextStyle?, strutStyle: args[9] as StrutStyle?, textAlign: args[11] as TextAlign?, textDirection: args[12] as TextDirection?, locale: args[2] as Locale?, softWrap: args[8] as bool?, overflow: args[4] as TextOverflow?, textScaleFactor: args[14] as double?, textScaler: args[15] as TextScaler?, maxLines: args[3] as int?, semanticsLabel: args[7] as String?, semanticsIdentifier: args[6] as String?, textWidthBasis: args[17] as TextWidthBasis?, textHeightBehavior: args[13] as TextHeightBehavior?, selectionColor: args[5] as Color?);
              return Text(args[0] as String, key: args[1] as Key?, style: args[10] as TextStyle?, strutStyle: args[9] as StrutStyle?, textAlign: args[11] as TextAlign?, textDirection: args[12] as TextDirection?, locale: args[2] as Locale?, softWrap: args[8] as bool?, overflow: args[4] as TextOverflow?, textScaleFactor: args[14] as double?, textScaler: args[15] as TextScaler?, maxLines: args[3] as int?, semanticsLabel: args[7] as String?, semanticsIdentifier: args[6] as String?, textWidthBasis: args[17] as TextWidthBasis?, textHeightBehavior: args[13] as TextHeightBehavior?, selectionColor: args[5] as Color?);
            }

      # ── TextFieldTapRegion: 11 fields, 1 ctor, COMPUTED debugLabel passed directly ──
      TextFieldTapRegion:
        extra_methods:
          "_#fromFields#11": |
            (args) => TextFieldTapRegion(key: args[6] as Key?, child: args[1] as Widget?, enabled: args[4] as bool, onTapOutside: args[8] == null ? null : (a) => (args[8] as Function)(a), onTapInside: args[7] == null ? null : (a) => (args[7] as Function)(a), onTapUpOutside: args[10] == null ? null : (a) => (args[10] as Function)(a), onTapUpInside: args[9] == null ? null : (a) => (args[9] as Function)(a), consumeOutsideTaps: args[2] as bool, debugLabel: args[3] as String?, groupId: args[5])

      # ── Navigator: no extra overrides needed ─────────────────────────
