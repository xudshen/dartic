# Flutter widgets bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/widgets.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/widgets"
output_plugins: "../lib/src/plugins"

libraries:
  # ── Framework types (from package:flutter/widgets.dart) ───────────────
  #
  # The analyzer resolves these to their actual src/ URIs automatically
  # (e.g. package:flutter/src/widgets/framework.dart::StatelessWidget).

  - uri: package:flutter/src/widgets
    discover: all
    classes:
      - name: StatelessWidget
        bridge: true

      - name: StatefulWidget
        bridge: true

      - name: State
        bridge: true

    overrides:
      # ── TweenAnimationBuilder: fromFields needs ValueWidgetBuilder<Object?> ──
      TweenAnimationBuilder:
        extra_methods:
          "_#fromFields#7": |
            (args) => TweenAnimationBuilder<Object?>(key: args[4] as Key?, tween: args[6] as Tween<Object>, duration: args[3] as Duration, curve: args[2] as Curve, builder: args[0] as ValueWidgetBuilder<Object?>, onEnd: args[5] as VoidCallback?, child: args[1] as Widget?)

      # ── StatelessWidget: custom Bridge (Widget @nonVirtual hashCode/==) ──
      StatelessWidget:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
        preamble: |
          /// Bridge class that allows dartic code to extend StatelessWidget.
          ///
          /// Widget marks `hashCode` and `==` as `@nonVirtual`, so this Bridge
          /// cannot override them (unlike standard dart:core Bridge classes).
          class _$StatelessWidget extends StatelessWidget implements DarticObjectHolder {
            _$StatelessWidget(this._dispatch, this.$darticObject, List<Object?> superArgs)
                : super(key: superArgs.isNotEmpty && !identical(superArgs[0], darticAbsent) ? superArgs[0] as Key? : null);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            @override
            Widget build(BuildContext context) {
              final r = _dispatch.invoke(this, $darticObject, 'build', [context]);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'StatelessWidget.build() must be overridden in dartic code');
              }
              return r as Widget;
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }

            // Super trampolines
            StatelessElement _super$createElement() => super.createElement();
            String _super$toStringShort() => super.toStringShort();
            void _super$debugFillProperties(DiagnosticPropertiesBuilder properties) { super.debugFillProperties(properties); }
            String _super$toStringShallow({String joiner = ', ', DiagnosticLevel minLevel = DiagnosticLevel.debug}) => super.toStringShallow(joiner: joiner, minLevel: minLevel);
            String _super$toStringDeep({String prefixLineOne = '', String? prefixOtherLines, DiagnosticLevel minLevel = DiagnosticLevel.debug, int wrapWidth = 65}) => super.toStringDeep(prefixLineOne: prefixLineOne, prefixOtherLines: prefixOtherLines, minLevel: minLevel, wrapWidth: wrapWidth);
            DiagnosticsNode _super$toDiagnosticsNode({String? name, DiagnosticsTreeStyle? style = DiagnosticsTreeStyle.errorProperty}) => super.toDiagnosticsNode(name: name, style: style);
            List<DiagnosticsNode> _super$debugDescribeChildren() => super.debugDescribeChildren();
            Key? get _super$key => super.key;
            String _super$toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) => super.toString(minLevel: minLevel);
            int get _super$hashCode => super.hashCode;
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStatelessWidgetBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$StatelessWidget(dispatch, obj, superArgs);
        extra_methods:
          "build#1": "(args) => throw UnsupportedError('build() is abstract — must be overridden')"
          "toString#0": "(args) => (args[0] as StatelessWidget).toString()"
          "hashCode#0": "(args) => (args[0] as StatelessWidget).hashCode"
          "==#1": "(args) => args[0] == args[1]"
          "key#0": "(args) => (args[0] as StatelessWidget).key"

      # ── StatefulWidget: custom Bridge ──────────────────────────────────
      StatefulWidget:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
          - no_logic_in_create_state
        preamble: |
          /// Bridge class that allows dartic code to extend StatefulWidget.
          class _$StatefulWidget extends StatefulWidget implements DarticObjectHolder {
            _$StatefulWidget(this._dispatch, this.$darticObject, List<Object?> superArgs)
                : super(key: superArgs.isNotEmpty && !identical(superArgs[0], darticAbsent) ? superArgs[0] as Key? : null);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            @override
            State createState() {
              final r = _dispatch.invoke(this, $darticObject, 'createState', const []);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'StatefulWidget.createState() must be overridden in dartic code');
              }
              return r as State;
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }

            // Super trampolines
            StatefulElement _super$createElement() => super.createElement();
            String _super$toStringShort() => super.toStringShort();
            void _super$debugFillProperties(DiagnosticPropertiesBuilder properties) { super.debugFillProperties(properties); }
            String _super$toStringShallow({String joiner = ', ', DiagnosticLevel minLevel = DiagnosticLevel.debug}) => super.toStringShallow(joiner: joiner, minLevel: minLevel);
            String _super$toStringDeep({String prefixLineOne = '', String? prefixOtherLines, DiagnosticLevel minLevel = DiagnosticLevel.debug, int wrapWidth = 65}) => super.toStringDeep(prefixLineOne: prefixLineOne, prefixOtherLines: prefixOtherLines, minLevel: minLevel, wrapWidth: wrapWidth);
            DiagnosticsNode _super$toDiagnosticsNode({String? name, DiagnosticsTreeStyle? style = DiagnosticsTreeStyle.errorProperty}) => super.toDiagnosticsNode(name: name, style: style);
            List<DiagnosticsNode> _super$debugDescribeChildren() => super.debugDescribeChildren();
            Key? get _super$key => super.key;
            String _super$toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) => super.toString(minLevel: minLevel);
            int get _super$hashCode => super.hashCode;
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStatefulWidgetBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$StatefulWidget(dispatch, obj, superArgs);
        extra_methods:
          "createState#0": "(args) => throw UnsupportedError('createState() is abstract — must be overridden')"
          "toString#0": "(args) => (args[0] as StatefulWidget).toString()"
          "hashCode#0": "(args) => (args[0] as StatefulWidget).hashCode"
          "==#1": "(args) => args[0] == args[1]"
          "key#0": "(args) => (args[0] as StatefulWidget).key"

      # ── State: custom Bridge with @mustCallSuper lifecycle methods ─────
      State:
        custom_bridge: true
        ignore_for_file:
          - implementation_imports
          - invalid_use_of_protected_member
        preamble: |
          /// Bridge class that allows dartic code to extend State.
          ///
          /// Lifecycle methods use dispatch + bit-flag fallback:
          /// - Dispatch to dartic code first
          /// - If dartic calls super via $super$ trampoline, flag is set
          /// - finally block calls super if dartic didn't (guarantees @mustCallSuper)
          ///
          /// Trampolines (_super$xxx) are appended by the gen tool.
          class _$State extends State<StatefulWidget> implements DarticObjectHolder {
            _$State(this._dispatch, this.$darticObject, List<Object?> superArgs);

            final DarticDispatch _dispatch;

            @override
            final DarticObject $darticObject;

            // @mustCallSuper bit flags
            static const _kInitState = 1 << 0;
            static const _kDispose = 1 << 1;
            static const _kDidUpdateWidget = 1 << 2;
            static const _kDidChangeDependencies = 1 << 3;
            static const _kDeactivate = 1 << 4;
            int _superCalled = 0;

            @override
            Widget build(BuildContext context) {
              final r = _dispatch.invoke(this, $darticObject, 'build', [context]);
              if (identical(r, notOverridden)) {
                throw FlutterError(
                    'State.build() must be overridden in dartic code');
              }
              return r as Widget;
            }

            @override
            void initState() {
              _superCalled &= ~_kInitState;
              try {
                _dispatch.invoke(this, $darticObject, 'initState', const []);
              } finally {
                if (_superCalled & _kInitState == 0) _super$initState();
              }
            }

            @override
            void dispose() {
              _superCalled &= ~_kDispose;
              try {
                _dispatch.invoke(this, $darticObject, 'dispose', const []);
              } finally {
                if (_superCalled & _kDispose == 0) _super$dispose();
              }
            }

            @override
            void didUpdateWidget(covariant StatefulWidget oldWidget) {
              _superCalled &= ~_kDidUpdateWidget;
              try {
                _dispatch.invoke(this, $darticObject, 'didUpdateWidget', [oldWidget]);
              } finally {
                if (_superCalled & _kDidUpdateWidget == 0) _super$didUpdateWidget(oldWidget);
              }
            }

            @override
            void didChangeDependencies() {
              _superCalled &= ~_kDidChangeDependencies;
              try {
                _dispatch.invoke(this, $darticObject, 'didChangeDependencies', const []);
              } finally {
                if (_superCalled & _kDidChangeDependencies == 0) _super$didChangeDependencies();
              }
            }

            @override
            void deactivate() {
              _superCalled &= ~_kDeactivate;
              try {
                _dispatch.invoke(this, $darticObject, 'deactivate', const []);
              } finally {
                if (_superCalled & _kDeactivate == 0) _super$deactivate();
              }
            }

            @override
            String toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) {
              final r = _dispatch.invoke(this, $darticObject, 'toString', const []);
              if (identical(r, notOverridden)) {
                return super.toString(minLevel: minLevel);
              }
              return r as String;
            }

            // Super trampolines for lifecycle methods (set flag so finally-block skips)
            void _super$initState() { _superCalled |= _kInitState; super.initState(); }
            void _super$dispose() { _superCalled |= _kDispose; super.dispose(); }
            void _super$didUpdateWidget(StatefulWidget oldWidget) { _superCalled |= _kDidUpdateWidget; super.didUpdateWidget(oldWidget); }
            void _super$didChangeDependencies() { _superCalled |= _kDidChangeDependencies; super.didChangeDependencies(); }
            void _super$deactivate() { _superCalled |= _kDeactivate; super.deactivate(); }
            String _super$toString({DiagnosticLevel minLevel = DiagnosticLevel.info}) => super.toString(minLevel: minLevel);
            int get _super$hashCode => super.hashCode;
          }

          /// Test-only factory to create Bridge instances without exposing the
          /// private class.
          Object createStateBridge(
                  DarticDispatch dispatch, DarticObject obj, List<Object?> superArgs) =>
              _$State(dispatch, obj, superArgs);
        extra_methods:
          "build#1": "(args) => throw UnsupportedError('build() is abstract — must be overridden')"
          "initState#0": "(args) { (args[0] as _$State)._super$initState(); return null; }"
          "dispose#0": "(args) { (args[0] as _$State)._super$dispose(); return null; }"
          "didUpdateWidget#1": "(args) { (args[0] as _$State)._super$didUpdateWidget(args[1] as StatefulWidget); return null; }"
          "didChangeDependencies#0": "(args) { (args[0] as _$State)._super$didChangeDependencies(); return null; }"
          "deactivate#0": "(args) { (args[0] as _$State)._super$deactivate(); return null; }"
          "setState#1": |
            (args) {
              final fn = args[1] as Function;
              (args[0] as State).setState(() { fn(); });
              return null;
            }
          "mounted#0": "(args) => (args[0] as State).mounted"
          "widget#0": "(args) => (args[0] as State).widget"
          "context#0": "(args) => (args[0] as State).context"
          "toString#0": "(args) => (args[0] as State).toString()"
          "hashCode#0": "(args) => (args[0] as State).hashCode"
          "==#1": "(args) => args[0] == args[1]"

      # ── BuildContext: suppress unusable generic methods ────────────────
      # These generic methods require reified type arguments the interpreter
      # can't provide. Override with throwing stubs so the auto-generated
      # (type-erased) versions are suppressed.
      BuildContext:
        extra_methods:
          "findAncestorWidgetOfExactType#0": "(args) => throw UnsupportedError('findAncestorWidgetOfExactType requires reified type argument')"
          "findAncestorStateOfType#0": "(args) => throw UnsupportedError('findAncestorStateOfType requires reified type argument')"
          "findRootAncestorStateOfType#0": "(args) => throw UnsupportedError('findRootAncestorStateOfType requires reified type argument')"
          "getInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getInheritedWidgetOfExactType requires reified type argument')"
          "getElementForInheritedWidgetOfExactType#0": "(args) => throw UnsupportedError('getElementForInheritedWidgetOfExactType requires reified type argument')"
          "findAncestorRenderObjectOfType#0": "(args) => throw UnsupportedError('findAncestorRenderObjectOfType requires reified type argument')"

      # ── Navigator: no extra overrides needed ─────────────────────────
