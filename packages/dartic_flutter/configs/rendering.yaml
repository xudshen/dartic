# Flutter rendering bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/rendering.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/rendering"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: package:flutter/src/rendering
    discover: all
    classes:
      # Bridge skipped: generic/covariant type issues in bridge class
      - name: RenderAnimatedOpacity
        bridge: false
      - name: RenderEditable
        bridge: false
      - name: RenderParagraph
        bridge: false
      - name: RenderSliverAnimatedOpacity
        bridge: false

    overrides:
      # SelectionEdgeUpdateEvent: 2 ctors (.forStart, .forEnd), discriminate by type
      # Fields: globalPosition(0), granularity(1), type(2)
      SelectionEdgeUpdateEvent:
        extra_methods:
          "_#fromFields#3": |
            (args) {
              if ((args[2] as Enum).index == 0) {
                return SelectionEdgeUpdateEvent.forStart(
                  globalPosition: args[0] as Offset,
                  granularity: args[1] as TextGranularity?);
              }
              return SelectionEdgeUpdateEvent.forEnd(
                globalPosition: args[0] as Offset,
                granularity: args[1] as TextGranularity?);
            }
