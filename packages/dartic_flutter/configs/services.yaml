# Flutter services bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/services.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.
#
# Types covered (~14):
#   Binding-only (dartic code uses, not extends):
#     - TextInputType, TextEditingValue, FilteringTextInputFormatter,
#       LengthLimitingTextInputFormatter, SystemUiOverlayStyle
#   Enums:
#     - SmartDashesType, SmartQuotesType, TextInputAction,
#       TextCapitalization, MaxLengthEnforcement, DeviceOrientation,
#       SystemUiOverlay, SystemUiMode
#
# Excluded types (code gen limitations):
#   - ClipboardData: may not be a public class
#   - TextInputConfiguration: complex
#   - BasicMessageChannel, MethodChannel, EventChannel: complex generics
#   - TextInputFormatter Bridge: skip Bridge for formatters
#   - LengthLimitingTextInputFormatter: gen emits call to @visibleForTesting `truncate`

output_bindings: "../lib/src/bindings/services"
output_plugins: "../lib/src/plugins"

# Use package: imports instead of relative imports (external package).
custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/src/api/dartic_absent.dart"
  - "package:dartic/src/runtime/object.dart"
  - "package:flutter/services.dart"
  - "package:flutter/foundation.dart"
  - "dart:ui"

libraries:
  - uri: package:flutter/services.dart
    classes:
      # ── Input ────────────────────────────────────────────────────────
      - TextInputType
      - TextEditingValue

      # ── Formatters (binding-only, skip Bridge) ───────────────────────
      - FilteringTextInputFormatter
      # LengthLimitingTextInputFormatter removed: gen emits call to
      # @visibleForTesting member `truncate`

      # ── System ───────────────────────────────────────────────────────
      - SystemUiOverlayStyle

      # ── Enums ────────────────────────────────────────────────────────
      - SmartDashesType
      - SmartQuotesType
      - TextInputAction
      - TextCapitalization
      - MaxLengthEnforcement
      - DeviceOrientation
      - SystemUiOverlay
      - SystemUiMode
