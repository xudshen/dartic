# dart:ui bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/dart_ui.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve dart:ui types.
#
# ~49 types covering enums, value/style classes, and binding-only abstracts.

output_bindings: "../lib/src/bindings/ui"
output_plugins: "../lib/src/plugins"

custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/src/api/dartic_absent.dart"
  - "package:dartic/src/runtime/object.dart"
  - "dart:ui"
  - "dart:typed_data"

libraries:
  - uri: dart:ui
    classes:
      # ── P0: 几乎所有 Widget 都用 ──────────────────────────────────
      - Color
      - TextDirection

      # ── P1: 布局/手势/动画 ────────────────────────────────────────
      - Offset
      - Size
      - Rect
      - Radius

      # ── P1: 文字样式枚举 ─────────────────────────────────────────
      - FontWeight
      - FontStyle
      - TextAlign

      # ── P2: 绘制相关枚举 ─────────────────────────────────────────
      - BlendMode
      - FilterQuality
      - StrokeCap
      - StrokeJoin
      - PaintingStyle
      - Clip
      - ColorSpace
      - ImageByteFormat
      - PixelFormat
      - PathFillType
      - PathOperation
      - BlurStyle
      - TileMode
      - PointMode
      - ClipOp
      - VertexMode

      # ── P2: 文字相关枚举 ─────────────────────────────────────────
      - TextBaseline
      - TextDecoration
      - TextDecorationStyle
      - TextLeadingDistribution
      - TextAffinity
      - BoxHeightStyle
      - BoxWidthStyle
      - PlaceholderAlignment

      # ── P2: 值类型/样式类 ────────────────────────────────────────
      - Paint
      - Shadow
      - MaskFilter
      - ColorFilter
      - TextStyle
      - ParagraphStyle
      - StrutStyle
      - ParagraphConstraints
      - TextBox
      - TextPosition
      - TextRange
      - LineMetrics
      - RRect
      - RSuperellipse
      - RSTransform

      # ── P2: Binding-only 抽象类 ──────────────────────────────────
      - Canvas
      - Path
      - Picture
      - PictureRecorder
      - Paragraph
      - ParagraphBuilder
      - Image
      - Codec
