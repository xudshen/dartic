# dart:ui bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/dart_ui.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve dart:ui types.

output_bindings: "../lib/src/bindings/ui"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: dart:ui
    discover: all

    overrides:

      # ── ColorFilter: discriminate by _type field (args[3]) ──
      # _type constants: 1=mode, 2=matrix, 3=linearToSrgbGamma, 4=srgbToLinearGamma
      # Field order from Kernel IR: args[0]=_blendMode, args[1]=_color, args[2]=_matrix, args[3]=_type
      ColorFilter:
        extra_methods:
          "_#fromFields#4": |
            (args) {
              final type = args[3] as int;
              if (type == 2) return ColorFilter.matrix((args[2] as List).cast<double>());
              if (type == 3) return ColorFilter.linearToSrgbGamma();
              if (type == 4) return ColorFilter.srgbToLinearGamma();
              return ColorFilter.mode(args[1] as Color, args[0] as BlendMode);
            }

      # ── SceneBuilder: pushOpacity offset default is Offset.zero ──
      SceneBuilder:
        extra_methods:
          "pushOpacity#3": |
            (args) {
              final self = args[0] as SceneBuilder;
              final alpha = args[1] as int;
              final oldLayer = identical(args[3], darticAbsent)
                  ? null
                  : args[3] as OpacityEngineLayer?;
              if (identical(args[2], darticAbsent)) {
                return self.pushOpacity(alpha, oldLayer: oldLayer);
              }
              return self.pushOpacity(alpha,
                  offset: args[2] as Offset?, oldLayer: oldLayer);
            }

      # ── SemanticsActionEvent: copyWith arguments default is private sentinel ──
      SemanticsActionEvent:
        extra_methods:
          "copyWith#4": |
            (args) {
              final self = args[0] as SemanticsActionEvent;
              final type = identical(args[1], darticAbsent)
                  ? null
                  : args[1] as SemanticsAction?;
              final viewId = identical(args[2], darticAbsent)
                  ? null
                  : args[2] as int?;
              final nodeId = identical(args[3], darticAbsent)
                  ? null
                  : args[3] as int?;
              if (identical(args[4], darticAbsent)) {
                return self.copyWith(
                    type: type, viewId: viewId, nodeId: nodeId);
              }
              return self.copyWith(
                  type: type,
                  viewId: viewId,
                  nodeId: nodeId,
                  arguments: args[4]);
            }
