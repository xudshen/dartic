# Flutter material bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/material.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.
#
# Types covered (~69):
#   Binding-only (dartic code uses, not extends):
#     - MaterialApp, Scaffold, AppBar, ElevatedButton, TextButton, etc.
#     - ThemeData, ColorScheme, TextTheme, ButtonStyle, InputDecoration
#     - TextField, Checkbox, Switch, Slider
#     - Dialog, AlertDialog, NavigationBar, NavigationRail
#     - TabBar, SnackBar, Chip variants, ProgressIndicators, etc.

output_bindings: "../lib/src/bindings"
output_plugins: "../lib/src/plugins"

# Use package: imports instead of relative imports (external package).
custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/src/api/dartic_absent.dart"
  - "package:dartic/src/runtime/object.dart"
  - "package:flutter/foundation.dart"
  - "package:flutter/rendering.dart"
  - "package:flutter/gestures.dart"
  - "package:flutter/services.dart"
  - "package:flutter/widgets.dart"
  - "package:flutter/material.dart"
  - "package:flutter/cupertino.dart"
  - "dart:ui"

libraries:
  - uri: package:flutter/material.dart
    classes:
      # ── Core widgets ────────────────────────────────────────────────────
      - MaterialApp
      - Scaffold
      - AppBar
      - ElevatedButton
      - TextButton
      - FloatingActionButton
      - Card
      - ListTile

      # ── Theme & Style (~15 types) ──────────────────────────────────────
      - ThemeData
      - Theme
      - AnimatedTheme
      - ColorScheme
      - TextTheme
      - ButtonStyle
      - InputDecoration
      - InputDecorationTheme
      - VisualDensity
      - IconThemeData
      - InputBorder
      - UnderlineInputBorder
      - OutlineInputBorder
      # Enums
      - MaterialTapTargetSize
      - FloatingLabelBehavior

      # ── Input & Form widgets ───────────────────────────────────────────
      - TextField
      - Checkbox
      - Switch
      - Slider

      # ── Navigation & Dialog ────────────────────────────────────────────
      - Dialog
      - AlertDialog
      - SimpleDialog
      - SimpleDialogOption
      - BottomSheet
      - Drawer
      - NavigationBar
      - NavigationDestination
      - NavigationRail
      - BottomNavigationBar
      - BottomAppBar
      # Enums
      - DrawerAlignment
      - NavigationDestinationLabelBehavior
      - SnackBarClosedReason

      # ── Tab & Other widgets ────────────────────────────────────────────
      - TabBar
      - TabBarView
      - Tab
      - TabPageSelector
      - TabPageSelectorIndicator
      - SnackBar
      - SnackBarAction
      - Chip
      - ActionChip
      - ChoiceChip
      - FilterChip
      - InputChip
      - ExpansionTile
      - CircleAvatar
      - Badge
      - Divider
      - ExpandIcon
      - LinearProgressIndicator
      - CircularProgressIndicator
      - RefreshProgressIndicator
      - GridTile
      - GridTileBar
      - IconButton
      - OutlinedButton
      - FilledButton
      - MaterialPageRoute
      # Enums
      - TabBarIndicatorSize
      - TabAlignment
