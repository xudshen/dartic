# Flutter material bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     packages/dartic_flutter/configs/material.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/material"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: package:flutter/src/material
    discover: all

    overrides:
      # MaterialColor: inherited fields from Color + ColorSwatch._swatch.
      # Sorted fields: _swatch, a, b, colorSpace, g, r (6 total)
      MaterialColor:
        extra_methods:
          "_#fromFields#6": "(args) => MaterialColor(Color.from(alpha: args[1] as double, blue: args[2] as double, colorSpace: args[3] as ColorSpace, green: args[4] as double, red: args[5] as double).value, (args[0] as Map).cast<int, Color>())"

      # ActionChip: _chipVariant discriminator (index 0=primary, 1=elevated).
      # Sorted fields (27): _chipVariant, autofocus, avatar, avatarBoxConstraints,
      #   backgroundColor, chipAnimationStyle, clipBehavior, color, disabledColor,
      #   elevation, focusNode, iconTheme, isEnabled, key, label, labelPadding,
      #   labelStyle, materialTapTargetSize, mouseCursor, onPressed, padding,
      #   pressElevation, shadowColor, side, shape, surfaceTintColor, tooltip,
      #   visualDensity (but arity is 27 so these map to constructor #26 args)
      # Constructor #26: key=args[0], avatar=args[1], label=args[2], labelStyle=args[3],
      #   labelPadding=args[4], onPressed=args[5], pressElevation=args[6], tooltip=args[7],
      #   side=args[8], shape=args[9], clipBehavior=args[10], focusNode=args[11],
      #   autofocus=args[12], color=args[13], backgroundColor=args[14], disabledColor=args[15],
      #   padding=args[16], visualDensity=args[17], materialTapTargetSize=args[18],
      #   elevation=args[19], shadowColor=args[20], surfaceTintColor=args[21],
      #   iconTheme=args[22], avatarBoxConstraints=args[23], chipAnimationStyle=args[24],
      #   mouseCursor=args[25]
      # fromFields sorted: [0]=_chipVariant,[1]=autofocus,[2]=avatar,[3]=avatarBoxConstraints,
      #   [4]=backgroundColor,[5]=chipAnimationStyle,[6]=clipBehavior,[7]=color,
      #   [8]=disabledColor,[9]=elevation,[10]=focusNode,[11]=iconTheme,[12]=isEnabled,
      #   [13]=key,[14]=label,[15]=labelPadding,[16]=labelStyle,[17]=materialTapTargetSize,
      #   [18]=mouseCursor,[19]=onPressed,[20]=padding,[21]=pressElevation,[22]=shadowColor,
      #   [23]=shape,[24]=side,[25]=surfaceTintColor,[26]=tooltip (isEnabled not a ctor param)
      # Use primary ctor (index==0); elevated ctor is functionally identical for fromFields.
      ActionChip:
        extra_methods:
          "_#fromFields#27": |
            (args) => (args[0] as Enum).index == 0
              ? ActionChip(key: args[12] as Key?, avatar: args[2] as Widget?, label: args[13] as Widget, labelStyle: args[15] as TextStyle?, labelPadding: args[14] as EdgeInsetsGeometry?, onPressed: (args[18] as Function?) == null ? null : () => (args[18] as Function?)!(), pressElevation: args[20] as double?, tooltip: args[25] as String?, side: args[23] as BorderSide?, shape: args[22] as OutlinedBorder?, clipBehavior: args[6] as Clip, focusNode: args[10] as FocusNode?, autofocus: args[1] as bool, color: args[7] as WidgetStateProperty<Color?>?, backgroundColor: args[4] as Color?, disabledColor: args[8] as Color?, padding: args[19] as EdgeInsetsGeometry?, visualDensity: args[26] as VisualDensity?, materialTapTargetSize: args[16] as MaterialTapTargetSize?, elevation: args[9] as double?, shadowColor: args[21] as Color?, surfaceTintColor: args[24] as Color?, iconTheme: args[11] as IconThemeData?, avatarBoxConstraints: args[3] as BoxConstraints?, chipAnimationStyle: args[5] as ChipAnimationStyle?, mouseCursor: args[17] as MouseCursor?)
              : ActionChip.elevated(key: args[12] as Key?, avatar: args[2] as Widget?, label: args[13] as Widget, labelStyle: args[15] as TextStyle?, labelPadding: args[14] as EdgeInsetsGeometry?, onPressed: (args[18] as Function?) == null ? null : () => (args[18] as Function?)!(), pressElevation: args[20] as double?, tooltip: args[25] as String?, side: args[23] as BorderSide?, shape: args[22] as OutlinedBorder?, clipBehavior: args[6] as Clip, focusNode: args[10] as FocusNode?, autofocus: args[1] as bool, color: args[7] as WidgetStateProperty<Color?>?, backgroundColor: args[4] as Color?, disabledColor: args[8] as Color?, padding: args[19] as EdgeInsetsGeometry?, visualDensity: args[26] as VisualDensity?, materialTapTargetSize: args[16] as MaterialTapTargetSize?, elevation: args[9] as double?, shadowColor: args[21] as Color?, surfaceTintColor: args[24] as Color?, iconTheme: args[11] as IconThemeData?, avatarBoxConstraints: args[3] as BoxConstraints?, chipAnimationStyle: args[5] as ChipAnimationStyle?, mouseCursor: args[17] as MouseCursor?)

      # AdaptiveTextSelectionToolbar: discriminator field is `buttonItems` (null vs non-null).
      # Sorted fields (4): anchors, buttonItems, children, key
      # Primary ctor (#3): key=args[0], children=args[1], anchors=args[2]
      # buttonItems ctor: key=args[0], buttonItems=args[1], anchors=args[2]
      # fromFields: [0]=anchors, [1]=buttonItems, [2]=children, [3]=key
      AdaptiveTextSelectionToolbar:
        extra_methods:
          "_#fromFields#4": "(args) => args[1] != null ? AdaptiveTextSelectionToolbar.buttonItems(key: args[3] as Key?, buttonItems: (args[1] as List).cast<ContextMenuButtonItem>(), anchors: args[0] as TextSelectionToolbarAnchors) : AdaptiveTextSelectionToolbar(key: args[3] as Key?, children: args[2] == null ? null : (args[2] as List).cast<Widget>(), anchors: args[0] as TextSelectionToolbarAnchors)"

      # Card: _variant discriminator (0=primary, 1=filled, 2=outlined).
      # Sorted fields (12): _variant, borderOnForeground, child, clipBehavior, color,
      #   elevation, key, margin, semanticContainer, shadowColor, shape, surfaceTintColor
      # Constructor #11: key=args[0], color=args[1], shadowColor=args[2], surfaceTintColor=args[3],
      #   elevation=args[4], shape=args[5], borderOnForeground=args[6], margin=args[7],
      #   clipBehavior=args[8], child=args[9], semanticContainer=args[10]
      # fromFields: [0]=_variant,[1]=borderOnForeground,[2]=child,[3]=clipBehavior,
      #   [4]=color,[5]=elevation,[6]=key,[7]=margin,[8]=semanticContainer,
      #   [9]=shadowColor,[10]=shape,[11]=surfaceTintColor
      Card:
        extra_methods:
          "_#fromFields#12": |
            (args) {
              final key = args[6] as Key?;
              final color = args[4] as Color?;
              final shadowColor = args[9] as Color?;
              final surfaceTintColor = args[11] as Color?;
              final elevation = args[5] as double?;
              final shape = args[10] as ShapeBorder?;
              final borderOnForeground = args[1] as bool;
              final margin = args[7] as EdgeInsetsGeometry?;
              final clipBehavior = args[3] as Clip?;
              final child = args[2] as Widget?;
              final semanticContainer = args[8] as bool;
              final v = (args[0] as Enum).index;
              if (v == 1) return Card.filled(key: key, color: color, shadowColor: shadowColor, surfaceTintColor: surfaceTintColor, elevation: elevation, shape: shape, borderOnForeground: borderOnForeground, margin: margin, clipBehavior: clipBehavior, child: child, semanticContainer: semanticContainer);
              if (v == 2) return Card.outlined(key: key, color: color, shadowColor: shadowColor, surfaceTintColor: surfaceTintColor, elevation: elevation, shape: shape, borderOnForeground: borderOnForeground, margin: margin, clipBehavior: clipBehavior, child: child, semanticContainer: semanticContainer);
              return Card(key: key, color: color, shadowColor: shadowColor, surfaceTintColor: surfaceTintColor, elevation: elevation, shape: shape, borderOnForeground: borderOnForeground, margin: margin, clipBehavior: clipBehavior, child: child, semanticContainer: semanticContainer);
            }

      # CarouselView: itemExtent discriminator (primary vs weighted).
      # Sorted fields (18+): itemExtent field distinguishes primary vs weighted ctor.
      # Constructor #16: key=args[0], ..., itemExtent=args[14], children=args[15]
      # weighted#17: key=args[0], ..., flexWeights=args[15], children=args[16]
      # fromFields sorted (18): _variant or itemExtent distinguishes primary path.
      # Primary ctor has itemExtent (required double); weighted has flexWeights.
      # fromFields: [0]=backgroundColor,[1]=children,[2]=clipBehavior (itemClipBehavior),[3]=consumeMaxWeight,
      #   [4]=controller,[5]=elevation,[6]=enableSplash,[7]=flexWeights,[8]=itemClipBehavior,
      #   [9]=itemExtent,[10]=itemSnapping,[11]=key,[12]=onTap,[13]=overlayColor,[14]=padding,
      #   [15]=reverse,[16]=scrollDirection,[17]=shape (wait — need to count exact fields)
      # Actually the _#fromFields#18 indicates 18 fields total. Let's use the primary
      # constructor unconditionally (itemExtent) since it's the canonical one, passing null
      # for uncovered fields. The weighted ctor isn't distinguishable cleanly.
      # fromFields sorted 18: [0]=backgroundColor,[1]=children,[2]=consumeMaxWeight,
      #   [3]=controller,[4]=elevation,[5]=enableSplash,[6]=flexWeights,[7]=itemClipBehavior,
      #   [8]=itemExtent,[9]=itemSnapping,[10]=key,[11]=onTap,[12]=overlayColor,[13]=padding,
      #   [14]=reverse,[15]=scrollDirection,[16]=shape,[17]=shrinkExtent
      CarouselView:
        extra_methods:
          "_#fromFields#18": "(args) => CarouselView(key: args[10] as Key?, padding: args[13] as EdgeInsets?, backgroundColor: args[0] as Color?, elevation: args[4] as double?, shape: args[16] as ShapeBorder?, itemClipBehavior: args[7] as Clip?, overlayColor: args[12] as WidgetStateProperty<Color?>?, itemSnapping: args[9] as bool, shrinkExtent: args[17] as double, controller: args[3] as CarouselController?, scrollDirection: args[15] as Axis, reverse: args[14] as bool, onTap: (args[11] as Function?) == null ? null : (a) => (args[11] as Function?)!(a), enableSplash: args[5] as bool, itemExtent: args[8] as double, children: (args[1] as List).cast<Widget>())"

