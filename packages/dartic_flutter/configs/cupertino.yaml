# Flutter Cupertino bindings configuration for dartic code generator.
#
# Run with:
#   fvm dart run packages/dartic_cli/bin/dartic.dart gen \
#     --config packages/dartic_flutter/configs/cupertino.yaml \
#     --analysis-root packages/dartic_flutter
#
# The --analysis-root must point to a Flutter project so the analyzer
# can resolve package:flutter/* types.

output_bindings: "../lib/src/bindings/cupertino"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: package:flutter/src/cupertino
    discover: all

    overrides:
      # ── CupertinoActivityIndicator ────────────────────────────────────────
      # Fields (5, alpha): animating(0), color(1), key(2), progress(3), radius(4)
      # Discriminate via progress (args[3]):
      #   - primary ctor: progress is always stored as 1.0 (the default).
      #   - .partiallyRevealed ctor: progress is a required user-provided value (0.0-1.0).
      # Using animating==false is unreliable because the primary ctor also allows
      # animating=false. Using progress!=1.0 is the correct discriminator.
      CupertinoActivityIndicator:
        extra_methods:
          "_#fromFields#5": |
            (args) {
              // Fields: animating(0), color(1), key(2), progress(3), radius(4)
              // Discriminate by progress: partiallyRevealed stores a user value (!= 1.0);
              // the primary ctor always stores the default 1.0.
              final animating = args[0] as bool;
              final color = args[1] as dynamic;
              final key = args[2] as dynamic;
              final progress = args[3] as double;
              final radius = args[4] as dynamic;
              if (progress != 1.0) {
                // partiallyRevealed ctor
                if (identical(radius, darticAbsent) || radius == null) {
                  return CupertinoActivityIndicator.partiallyRevealed(
                    key: key,
                    color: color,
                    progress: progress,
                  );
                } else {
                  return CupertinoActivityIndicator.partiallyRevealed(
                    key: key,
                    color: color,
                    radius: radius as double,
                    progress: progress,
                  );
                }
              } else {
                // primary ctor
                if (identical(radius, darticAbsent) || radius == null) {
                  return CupertinoActivityIndicator(
                    key: key,
                    color: color,
                    animating: animating,
                  );
                } else {
                  return CupertinoActivityIndicator(
                    key: key,
                    color: color,
                    animating: animating,
                    radius: radius as double,
                  );
                }
              }
            }

      # ── CupertinoAdaptiveTextSelectionToolbar ─────────────────────────────
      # Fields (4, alpha): anchors(0), buttonItems(1), children(2), key(3)
      # Primary ctor: children non-null, buttonItems null.
      # buttonItems ctor: buttonItems possibly non-null, children null.
      CupertinoAdaptiveTextSelectionToolbar:
        extra_methods:
          "_#fromFields#4": |
            (args) {
              // Fields: anchors(0), buttonItems(1), children(2), key(3)
              final anchors = args[0] as TextSelectionToolbarAnchors;
              final buttonItems = args[1];
              final children = args[2];
              final key = args[3] as Key?;
              if (buttonItems != null) {
                return CupertinoAdaptiveTextSelectionToolbar.buttonItems(
                  key: key,
                  buttonItems: buttonItems == null ? null : (buttonItems as List).cast<ContextMenuButtonItem>(),
                  anchors: anchors,
                );
              } else {
                return CupertinoAdaptiveTextSelectionToolbar(
                  key: key,
                  children: children == null ? null : (children as List).cast<Widget>(),
                  anchors: anchors,
                );
              }
            }

      # ── CupertinoApp ──────────────────────────────────────────────────────
      # Fields (35, alpha): actions(0), backButtonDispatcher(1), builder(2),
      #   checkerboardOffscreenLayers(3), checkerboardRasterCacheImages(4),
      #   color(5), debugShowCheckedModeBanner(6), home(7), initialRoute(8),
      #   key(9), locale(10), localeListResolutionCallback(11),
      #   localeResolutionCallback(12), localizationsDelegates(13),
      #   navigatorKey(14), navigatorObservers(15), onGenerateInitialRoutes(16),
      #   onGenerateRoute(17), onGenerateTitle(18), onNavigationNotification(19),
      #   onUnknownRoute(20), restorationScopeId(21), routeInformationParser(22),
      #   routeInformationProvider(23), routerConfig(24), routerDelegate(25),
      #   routes(26), scrollBehavior(27), shortcuts(28), showPerformanceOverlay(29),
      #   showSemanticsDebugger(30), supportedLocales(31), theme(32), title(33),
      #   useInheritedMediaQuery(34)
      # Discriminate: routerDelegate(25) or routerConfig(24) non-null → router ctor.
      CupertinoApp:
        extra_methods:
          "_#fromFields#35": |
            (args) {
              final routerDelegate = args[25];
              final routerConfig = args[24];
              if (routerDelegate != null || routerConfig != null) {
                // router ctor — router#27
                return CupertinoApp.router(
                  key: args[9] as Key?,
                  routeInformationProvider: args[23] as RouteInformationProvider?,
                  routeInformationParser: args[22] as RouteInformationParser<Object>?,
                  routerDelegate: routerDelegate as RouterDelegate<Object>?,
                  backButtonDispatcher: args[1] as BackButtonDispatcher?,
                  routerConfig: routerConfig as RouterConfig<Object>?,
                  theme: args[32] as CupertinoThemeData?,
                  builder: (args[2] as Function?) == null ? null : (a, b) => (args[2] as Function)!(a, b),
                  title: args[33] == null ? null : args[33] as String?,
                  onGenerateTitle: (args[18] as Function?) == null ? null : (a) => (args[18] as Function)!(a),
                  onNavigationNotification: (args[19] as Function?) == null ? null : (a) => (args[19] as Function)!(a),
                  color: args[5] as Color?,
                  locale: args[10] as Locale?,
                  localizationsDelegates: args[13] == null ? null : (args[13] as Iterable).cast<LocalizationsDelegate<dynamic>>(),
                  localeListResolutionCallback: (args[11] as Function?) == null ? null : (a, b) => (args[11] as Function)!(a, b),
                  localeResolutionCallback: (args[12] as Function?) == null ? null : (a, b) => (args[12] as Function)!(a, b),
                  supportedLocales: (args[31] as Iterable).cast<Locale>(),
                  showPerformanceOverlay: args[29] as bool,
                  checkerboardRasterCacheImages: args[4] as bool,
                  checkerboardOffscreenLayers: args[3] as bool,
                  showSemanticsDebugger: args[30] as bool,
                  debugShowCheckedModeBanner: args[6] as bool,
                  shortcuts: args[28] == null ? null : (args[28] as Map).cast<ShortcutActivator, Intent>(),
                  actions: args[0] == null ? null : (args[0] as Map).cast<Type, Action<Intent>>(),
                  restorationScopeId: args[21] as String?,
                  scrollBehavior: args[27] as ScrollBehavior?,
                  useInheritedMediaQuery: args[34] as bool,
                );
              } else {
                // primary ctor — #30
                return CupertinoApp(
                  key: args[9] as Key?,
                  navigatorKey: args[14] as GlobalKey<NavigatorState>?,
                  home: args[7] as Widget?,
                  theme: args[32] as CupertinoThemeData?,
                  routes: args[26] == null ? const <String, WidgetBuilder>{} : (args[26] as Map).cast<String, Widget Function(BuildContext)>(),
                  initialRoute: args[8] as String?,
                  onGenerateRoute: (args[17] as Function?) == null ? null : (a) => (args[17] as Function)!(a),
                  onGenerateInitialRoutes: (args[16] as Function?) == null ? null : (a) => (args[16] as Function)!(a),
                  onUnknownRoute: (args[20] as Function?) == null ? null : (a) => (args[20] as Function)!(a),
                  onNavigationNotification: (args[19] as Function?) == null ? null : (a) => (args[19] as Function)!(a),
                  navigatorObservers: args[15] == null ? const <NavigatorObserver>[] : (args[15] as List).cast<NavigatorObserver>(),
                  builder: (args[2] as Function?) == null ? null : (a, b) => (args[2] as Function)!(a, b),
                  title: args[33] == null ? null : args[33] as String?,
                  onGenerateTitle: (args[18] as Function?) == null ? null : (a) => (args[18] as Function)!(a),
                  color: args[5] as Color?,
                  locale: args[10] as Locale?,
                  localizationsDelegates: args[13] == null ? null : (args[13] as Iterable).cast<LocalizationsDelegate<dynamic>>(),
                  localeListResolutionCallback: (args[11] as Function?) == null ? null : (a, b) => (args[11] as Function)!(a, b),
                  localeResolutionCallback: (args[12] as Function?) == null ? null : (a, b) => (args[12] as Function)!(a, b),
                  supportedLocales: (args[31] as Iterable).cast<Locale>(),
                  showPerformanceOverlay: args[29] as bool,
                  checkerboardRasterCacheImages: args[4] as bool,
                  checkerboardOffscreenLayers: args[3] as bool,
                  showSemanticsDebugger: args[30] as bool,
                  debugShowCheckedModeBanner: args[6] as bool,
                  shortcuts: args[28] == null ? null : (args[28] as Map).cast<ShortcutActivator, Intent>(),
                  actions: args[0] == null ? null : (args[0] as Map).cast<Type, Action<Intent>>(),
                  restorationScopeId: args[21] as String?,
                  scrollBehavior: args[27] as ScrollBehavior?,
                  useInheritedMediaQuery: args[34] as bool,
                );
              }
            }

      # ── CupertinoButton ───────────────────────────────────────────────────
      # Fields (20, alpha): _style(0), alignment(1), autofocus(2),
      #   borderRadius(3), child(4), color(5), disabledColor(6), focusColor(7),
      #   focusNode(8), foregroundColor(9), key(10), minSize(11), minimumSize(12),
      #   mouseCursor(13), onFocusChange(14), onLongPress(15), onPressed(16),
      #   padding(17), pressedOpacity(18), sizeStyle(19)
      # _style is private enum _CupertinoButtonStyle: plain(0), tinted(1), filled(2)
      # _style field sorts before 'a' (underscore < lowercase).
      CupertinoButton:
        extra_methods:
          "_#fromFields#20": |
            (args) {
              // Fields: _style(0), alignment(1), autofocus(2), borderRadius(3),
              //   child(4), color(5), disabledColor(6), focusColor(7),
              //   focusNode(8), foregroundColor(9), key(10), minSize(11),
              //   minimumSize(12), mouseCursor(13), onFocusChange(14),
              //   onLongPress(15), onPressed(16), padding(17),
              //   pressedOpacity(18), sizeStyle(19)
              // _style index: 0=plain (primary), 1=tinted, 2=filled
              final styleEnum = args[0] as dynamic;
              final styleIndex = (styleEnum as dynamic).index as int;
              final key = args[10] as Key?;
              final child = args[4] as Widget;
              final sizeStyle = args[19] as CupertinoButtonSize;
              final padding = args[17] as EdgeInsetsGeometry?;
              final color = args[5] as Color?;
              final foregroundColor = args[9] as Color?;
              final disabledColor = args[6] as Color;
              final minSize = args[11] as double?;
              final minimumSize = args[12] as Size?;
              final pressedOpacity = args[18] as double?;
              final borderRadius = args[3] as BorderRadius?;
              final alignment = args[1] as AlignmentGeometry;
              final focusColor = args[7] as Color?;
              final focusNode = args[8] as FocusNode?;
              final onFocusChange = (args[14] as Function?) == null ? null : (a) => (args[14] as Function)!(a);
              final autofocus = args[2] as bool;
              final mouseCursor = args[13] as MouseCursor?;
              final onLongPress = (args[15] as Function?) == null ? null : () => (args[15] as Function)!();
              final onPressed = (args[16] as Function?) == null ? null : () => (args[16] as Function)!();
              if (styleIndex == 1) {
                return CupertinoButton.tinted(
                  key: key, child: child, sizeStyle: sizeStyle, padding: padding,
                  color: color, foregroundColor: foregroundColor,
                  disabledColor: disabledColor, minSize: minSize,
                  minimumSize: minimumSize, pressedOpacity: pressedOpacity,
                  borderRadius: borderRadius, alignment: alignment,
                  focusColor: focusColor, focusNode: focusNode,
                  onFocusChange: onFocusChange, autofocus: autofocus,
                  mouseCursor: mouseCursor, onLongPress: onLongPress,
                  onPressed: onPressed,
                );
              } else if (styleIndex == 2) {
                return CupertinoButton.filled(
                  key: key, child: child, sizeStyle: sizeStyle, padding: padding,
                  color: color, disabledColor: disabledColor,
                  foregroundColor: foregroundColor, minSize: minSize,
                  minimumSize: minimumSize, pressedOpacity: pressedOpacity,
                  borderRadius: borderRadius, alignment: alignment,
                  focusColor: focusColor, focusNode: focusNode,
                  onFocusChange: onFocusChange, autofocus: autofocus,
                  mouseCursor: mouseCursor, onLongPress: onLongPress,
                  onPressed: onPressed,
                );
              } else {
                // plain (styleIndex == 0)
                return CupertinoButton(
                  key: key, child: child, sizeStyle: sizeStyle, padding: padding,
                  color: color, foregroundColor: foregroundColor,
                  disabledColor: disabledColor, minSize: minSize,
                  minimumSize: minimumSize, pressedOpacity: pressedOpacity,
                  borderRadius: borderRadius, alignment: alignment,
                  focusColor: focusColor, focusNode: focusNode,
                  onFocusChange: onFocusChange, autofocus: autofocus,
                  mouseCursor: mouseCursor, onLongPress: onLongPress,
                  onPressed: onPressed,
                );
              }
            }

      # ── CupertinoDesktopTextSelectionToolbarButton ────────────────────────
      # Fields (5, alpha): buttonItem(0), child(1), key(2), onPressed(3), text(4)
      # Primary ctor (#3): child is set, buttonItem/text are null.
      # text ctor (text#3): text is set, child/buttonItem are null.
      # buttonItem ctor (buttonItem#2): buttonItem is set, child/text/onPressed are null.
      CupertinoDesktopTextSelectionToolbarButton:
        extra_methods:
          "_#fromFields#5": |
            (args) {
              // Fields: buttonItem(0), child(1), key(2), onPressed(3), text(4)
              final buttonItem = args[0] as ContextMenuButtonItem?;
              final child = args[1] as Widget?;
              final key = args[2] as Key?;
              final onPressed = (args[3] as Function?) == null ? null : () => (args[3] as Function)!();
              final text = args[4] as String?;
              if (buttonItem != null) {
                return CupertinoDesktopTextSelectionToolbarButton.buttonItem(
                  key: key,
                  buttonItem: buttonItem,
                );
              } else if (child != null) {
                return CupertinoDesktopTextSelectionToolbarButton(
                  key: key,
                  onPressed: onPressed,
                  child: child,
                );
              } else {
                return CupertinoDesktopTextSelectionToolbarButton.text(
                  key: key,
                  onPressed: onPressed,
                  text: text,
                );
              }
            }

      # ── CupertinoDynamicColor ─────────────────────────────────────────────
      # Fields (11, alpha): _debugResolveContext is a private Element? field that
      # is set only during resolveFrom(). User-created instances always have it null.
      # The 3 public ctors differ only in how many Color variants they take.
      # Fields from the primary ctor (#9): debugLabel(via _debugLabel private field),
      # color, darkColor, highContrastColor, darkHighContrastColor, elevatedColor,
      # darkElevatedColor, highContrastElevatedColor, darkHighContrastElevatedColor.
      # The 11 fields sorted: _debugLabel(0), _debugResolveContext(1),
      #   color(2), darkColor(3), darkElevatedColor(4),
      #   darkHighContrastColor(5), darkHighContrastElevatedColor(6),
      #   elevatedColor(7), highContrastColor(8), highContrastElevatedColor(9),
      #   value(10) — wait, value is from Color superclass.
      # Actually let's check: CupertinoDynamicColor extends Color (has `value` field).
      # All stored fields: _debugLabel, _debugResolveContext (own), plus color,
      # darkColor, highContrastColor, darkHighContrastColor, elevatedColor,
      # darkElevatedColor, highContrastElevatedColor, darkHighContrastElevatedColor (own).
      # Color.value is the superclass field. Total = 11.
      # Sorted: _debugLabel(0), _debugResolveContext(1), color(2), darkColor(3),
      #   darkElevatedColor(4), darkHighContrastColor(5),
      #   darkHighContrastElevatedColor(6), elevatedColor(7),
      #   highContrastColor(8), highContrastElevatedColor(9), value(10)
      # Strategy: always use the full primary ctor (#9) — it takes all 8 Color fields.
      # _debugLabel is private but accessible via debugLabel param.
      # _debugResolveContext cannot be passed — ignore it.
      CupertinoDynamicColor:
        extra_methods:
          "_#fromFields#11": |
            (args) {
              // Fields: _debugLabel(0), _debugResolveContext(1), color(2),
              //   darkColor(3), darkElevatedColor(4), darkHighContrastColor(5),
              //   darkHighContrastElevatedColor(6), elevatedColor(7),
              //   highContrastColor(8), highContrastElevatedColor(9), value(10)
              // _debugResolveContext is transient (resolve context), ignore it.
              return CupertinoDynamicColor(
                debugLabel: args[0] as String?,
                color: args[2] as Color,
                darkColor: args[3] as Color,
                highContrastColor: args[8] as Color,
                darkHighContrastColor: args[5] as Color,
                elevatedColor: args[7] as Color,
                darkElevatedColor: args[4] as Color,
                highContrastElevatedColor: args[9] as Color,
                darkHighContrastElevatedColor: args[6] as Color,
              );
            }

      # ── CupertinoFormSection ──────────────────────────────────────────────
      # Fields (9, alpha): _type(0), backgroundColor(1), children(2),
      #   clipBehavior(3), decoration(4), footer(5), header(6), key(7), margin(8)
      # _type is CupertinoListSectionType: base(index=0), insetGrouped(index=1)
      CupertinoFormSection:
        extra_methods:
          "_#fromFields#9": |
            (args) {
              // Fields: _type(0), backgroundColor(1), children(2),
              //   clipBehavior(3), decoration(4), footer(5), header(6),
              //   key(7), margin(8)
              final typeEnum = args[0] as dynamic;
              final typeIndex = (typeEnum as dynamic).index as int;
              final key = args[7] as Key?;
              final children = (args[2] as List).cast<Widget>();
              final header = args[6] as Widget?;
              final footer = args[5] as Widget?;
              final margin = args[8] as EdgeInsetsGeometry;
              final backgroundColor = args[1] as Color;
              final decoration = args[4] as BoxDecoration?;
              final clipBehavior = args[3] as Clip;
              if (typeIndex == 1) {
                // insetGrouped ctor
                return CupertinoFormSection.insetGrouped(
                  key: key, children: children, header: header, footer: footer,
                  margin: margin, backgroundColor: backgroundColor,
                  decoration: decoration, clipBehavior: clipBehavior,
                );
              } else {
                // primary (base) ctor
                return CupertinoFormSection(
                  key: key, children: children, header: header, footer: footer,
                  margin: margin, backgroundColor: backgroundColor,
                  decoration: decoration, clipBehavior: clipBehavior,
                );
              }
            }

      # ── CupertinoListSection ──────────────────────────────────────────────
      # Fields (13, alpha): additionalDividerMargin(0), backgroundColor(1),
      #   children(2), clipBehavior(3), decoration(4), dividerMargin(5),
      #   footer(6), header(7), key(8), margin(9), separatorColor(10),
      #   topMargin(11), type(12)
      # type is CupertinoListSectionType: base(index=0), insetGrouped(index=1)
      CupertinoListSection:
        extra_methods:
          "_#fromFields#13": |
            (args) {
              // Fields: additionalDividerMargin(0), backgroundColor(1),
              //   children(2), clipBehavior(3), decoration(4),
              //   dividerMargin(5), footer(6), header(7), key(8),
              //   margin(9), separatorColor(10), topMargin(11), type(12)
              final typeEnum = args[12] as dynamic;
              final typeIndex = (typeEnum as dynamic).index as int;
              final key = args[8] as Key?;
              final children = args[2] == null ? null : (args[2] as List).cast<Widget>();
              final header = args[7] as Widget?;
              final footer = args[6] as Widget?;
              final margin = args[9] as EdgeInsetsGeometry?;
              final backgroundColor = args[1] as Color;
              final decoration = args[4] as BoxDecoration?;
              final clipBehavior = args[3] as Clip;
              final dividerMargin = args[5] as double?;
              final additionalDividerMargin = args[0] as double?;
              final topMargin = args[11] as double?;
              final separatorColor = args[10] as Color?;
              if (typeIndex == 1) {
                // insetGrouped ctor
                if (dividerMargin != null) {
