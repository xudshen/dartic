name: dartic_flutter
description: Flutter widget Bridge bindings for the dartic bytecode interpreter.
version: 0.1.0
repository: https://github.com/xudshen/dartic/tree/main/packages/dartic_flutter

environment:
  sdk: ^3.10.7
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  dartic:
    path: ../../
  characters: '^1.4.0'
  collection: '^1.19.1'
  material_color_utilities: '^0.11.1'
  meta: '^1.17.0'
  vector_math: '^2.2.0'

dartic:
  role: plugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  dartic_stdlib:
    path: ../dartic_stdlib
