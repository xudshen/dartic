name: dartic_compiler
description: Compiler and toolchain for dartic — compiles Kernel AST to dartic bytecode.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.7

resolution: workspace

dependencies:
  dartic:
    path: ../../
  kernel:
    path: ../../vendor/dart-sdk/pkg/kernel
  meta: ^1.11.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
