name: dartic_generator
description: Code generator for dartic — produces HostClassWrapper, Bridge classes, and DarticPlugin registration code from @DarticExport annotations.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: ^8.0.0
  build: ^4.0.4
  dartic_annotation:
    path: ../dartic_annotation

dev_dependencies:
  test: ^1.24.0
