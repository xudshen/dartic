# dart:math bindings configuration for dartic code generator.
#
# Types covered:
#   1. Top-level math functions (min, max, sqrt, pow, sin, cos, tan, log, exp,
#      atan2, asin, acos, atan)
#   2. Random (constructor with optional seed, secure factory, instance methods)
#   3. Point (constructor, getters, methods, operators, _#fromFields)
#   4. Rectangle + _RectangleBase (constructors, getters, methods)
#   5. MutableRectangle (constructors, getters, setters, methods)
#
# Constants (pi, e, ln2, ln10, log2e, log10e, sqrt1_2, sqrt2) are compiled as
# inline constants by the CFE and do not generate CALL_HOST bindings.

output_bindings: "../../../lib/src/bridge/bindings"
output_plugins: "../../../lib/src/bridge/plugins"

libraries:
  - uri: dart:math
    classes:
      # ── Random ──────────────────────────────────────────────────────────
      - Random

      # ── Point ───────────────────────────────────────────────────────────
      - Point

      # ── Rectangle + _RectangleBase ──────────────────────────────────────
      - name: Rectangle
        internal_types:
          - _RectangleBase

      # ── MutableRectangle ────────────────────────────────────────────────
      - MutableRectangle

    # ── Top-level functions ──────────────────────────────────────────────

    functions:
      - name: min
        arity: 2
        custom: "(args) => min(args[0] as num, args[1] as num)"

      - name: max
        arity: 2
        custom: "(args) => max(args[0] as num, args[1] as num)"

      - name: sqrt
        arity: 1
        custom: "(args) => sqrt(args[0] as num)"

      - name: pow
        arity: 2
        custom: "(args) => pow(args[0] as num, args[1] as num)"

      - name: sin
        arity: 1
        custom: "(args) => sin(args[0] as num)"

      - name: cos
        arity: 1
        custom: "(args) => cos(args[0] as num)"

      - name: tan
        arity: 1
        custom: "(args) => tan(args[0] as num)"

      - name: log
        arity: 1
        custom: "(args) => log(args[0] as num)"

      - name: exp
        arity: 1
        custom: "(args) => exp(args[0] as num)"

      - name: atan2
        arity: 2
        custom: "(args) => atan2(args[0] as num, args[1] as num)"

      - name: asin
        arity: 1
        custom: "(args) => asin(args[0] as num)"

      - name: acos
        arity: 1
        custom: "(args) => acos(args[0] as num)"

      - name: atan
        arity: 1
        custom: "(args) => atan(args[0] as num)"

    # ── Overrides ────────────────────────────────────────────────────────

    overrides:

      # ── Random: optional seed in constructor + secure factory ──
      Random:
        extra_methods:
          "#1": |
            (args) {
              final seed = args.isNotEmpty ? args[0] as int? : null;
              return Random(seed);
            }
          "secure#0": "(args) => Random.secure()"

      # ── Point: _#fromFields and == override ──
      Point:
        extra_methods:
          "_#fromFields#2": "(args) => Point(args[0] as num, args[1] as num)"
          "==#1": "(args) => args[0] == args[1]"

      # ── _RectangleBase: internal base class, all methods cast to Rectangle ──
      _RectangleBase:
        extra_methods:
          "left#0": "(args) => (args[0] as Rectangle).left"
          "top#0": "(args) => (args[0] as Rectangle).top"
          "width#0": "(args) => (args[0] as Rectangle).width"
          "height#0": "(args) => (args[0] as Rectangle).height"
          "right#0": "(args) => (args[0] as Rectangle).right"
          "bottom#0": "(args) => (args[0] as Rectangle).bottom"
          "containsPoint#1": "(args) => (args[0] as Rectangle).containsPoint(args[1] as Point)"
          "intersects#1": "(args) => (args[0] as Rectangle).intersects(args[1] as Rectangle)"
          "intersection#1": "(args) => (args[0] as Rectangle).intersection(args[1] as Rectangle)"
          "boundingBox#1": "(args) => (args[0] as Rectangle).boundingBox(args[1] as Rectangle)"
          "toString#0": "(args) => (args[0] as Rectangle).toString()"
          "hashCode#0": "(args) => (args[0] as Rectangle).hashCode"
          "==#1": "(args) => args[0] == args[1]"

      # ── Rectangle: == override ──
      Rectangle:
        extra_methods:
          "==#1": "(args) => args[0] == args[1]"

      # ── MutableRectangle: == override + toString + hashCode ──
      MutableRectangle:
        extra_methods:
          "==#1": "(args) => args[0] == args[1]"
          "toString#0": "(args) => (args[0] as MutableRectangle).toString()"
          "hashCode#0": "(args) => (args[0] as MutableRectangle).hashCode"
