output_bindings: "lib/src/bridge/bindings"
output_plugins: "lib/src/bridge/plugins"

libraries:
  - uri: "package:flutter/widgets.dart"
    classes:
      - name: State
        bridge: true
    overrides:
      State:
        method_overrides:
          dispose:
            super_order: after
          deactivate:
            super_order: after
          shouldRepaint:
            default_return: "true"
          build:
            super_order: before
