output_bindings: "lib/src/bridge/bindings"
output_plugins: "lib/src/bridge/plugins"

libraries:
  - uri: dart:core
    classes:
      - int
      - double
      - name: List
        internal_types:
          - _GrowableList
          - _List
      - name: Enum
        source_name: _Enum
    functions:
      - identical
      - name: print
        custom: |
          (args) { print(args[0]); return null; }
    overrides:
      _GrowableList:
        extra_methods:
          "_literal1#1": "(args) => <dynamic>[args[0]]"
      Symbol:
        extra_bindings:
          - "dart:_internal::Symbol::#1"
