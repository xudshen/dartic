# dart:convert bindings configuration for dartic code generator.
#
# Only extra_methods that the generator cannot auto-produce are listed:
#   - Callback wrapping (Function params need explicit (v) => func(v))
#   - List<dynamic> → List<int> casting (dartic dual-stack)
#   - Stream<dynamic>/Sink<Object?> type casting (CastSink helpers)
#   - _#fromFields with non-standard field layouts
#   - Internal type constructor → public factory mapping

output_bindings: "../lib/src/bindings/convert"
output_plugins: "../lib/src/plugins"

custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/dartic_internal.dart"
  - "package:dartic_stdlib/src/bindings/convert/convert_helpers.dart"

libraries:
  - uri: dart:convert
    classes:
      - Codec
      - Converter
      - Encoding
      - JsonCodec
      - JsonEncoder
      - JsonDecoder
      - JsonUtf8Encoder
      - JsonUnsupportedObjectError
      - Utf8Codec
      - Utf8Encoder
      - Utf8Decoder
      - Base64Codec
      - Base64Encoder
      - Base64Decoder
      - AsciiCodec
      - name: AsciiEncoder
        internal_types:
          - _UnicodeSubsetEncoder
      - name: AsciiDecoder
        internal_types:
          - _UnicodeSubsetDecoder
      - Latin1Codec
      - name: Latin1Encoder
        internal_types:
          - _UnicodeSubsetEncoder
      - name: Latin1Decoder
        internal_types:
          - _UnicodeSubsetDecoder
      - HtmlEscape
      - HtmlEscapeMode
      - LineSplitter
      - name: ChunkedConversionSink
        internal_types:
          - _SimpleCallbackSink
      - name: StringConversionSink
        internal_types:
          - _StringCallbackSink
          - _StringAdapterSink
          - _StringSinkConversionSink
      - name: ByteConversionSink
        internal_types:
          - _ByteAdapterSink
          - _ByteCallbackSink
      - name: ClosableStringSink
        internal_types:
          - _ClosableStringSink

      # ── JsonCyclicError (subclass of JsonUnsupportedObjectError) ────────
      - JsonCyclicError

    functions:
      - name: jsonEncode
        arity: 2
        custom: |
          (args) {
            final value = args[0];
            final toEncodable = identical(args[1], darticAbsent) ? null : args[1] as Function?;
            if (toEncodable != null) {
              return jsonEncode(value, toEncodable: (v) => toEncodable(v));
            }
            return jsonEncode(value);
          }

      - name: jsonDecode
        arity: 2
        custom: |
          (args) {
            final source = args[0] as String;
            final reviver = identical(args[1], darticAbsent) ? null : args[1] as Function?;
            if (reviver != null) {
              return jsonDecode(source, reviver: (key, value) => reviver(key, value));
            }
            return jsonDecode(source);
          }

      - name: base64Encode
        arity: 1
        custom: "(args) => base64Encode((args[0] as List).cast<int>())"

      - name: base64Decode
        arity: 1
        custom: "(args) => base64Decode(args[0] as String)"

      - name: base64UrlEncode
        arity: 1
        custom: "(args) => base64Url.encode((args[0] as List).cast<int>())"

    overrides:

      # ── Codec: encode/decode need List<dynamic> → List<int> cast ──
      Codec:
        extra_methods:
          "encode#1": |
            (args) {
              final codec = args[0] as Codec;
              var input = args[1];
              if (input is List && input is! List<int>) {
                input = input.cast<int>();
              }
              return codec.encode(input);
            }
          "decode#1": |
            (args) {
              final codec = args[0] as Codec;
              var input = args[1];
              if (input is List && input is! List<int>) {
                input = input.cast<int>();
              }
              return codec.decode(input);
            }

      # ── Converter: convert/bind/startChunkedConversion need type casts ──
      Converter:
        extra_methods:
          "convert#1": |
            (args) {
              final converter = args[0] as Converter;
              var input = args[1];
              if (input is List && input is! List<int> && input is! List<String>) {
                input = input.cast<int>();
              }
              return converter.convert(input);
            }
          "bind#1": |
            (args) {
              final converter = args[0] as Converter;
              var stream = args[1] as Stream;
              if (stream is! Stream<String> && stream is! Stream<List<int>>) {
                if (converter is Converter<String, dynamic>) {
                  stream = stream.cast<String>();
                } else {
                  stream = stream.cast<List<int>>();
                }
              }
              return converter.bind(stream);
            }
          "startChunkedConversion#1": |
            (args) {
              final converter = args[0] as Converter;
              var sink = args[1];
              if (converter is Converter<dynamic, String>) {
                return converter.startChunkedConversion(castToStringSink(sink));
              } else if (converter is Converter<dynamic, List<int>>) {
                return converter.startChunkedConversion(castToBytesSink(sink));
              }
              return (converter as dynamic).startChunkedConversion(sink);
            }

      # ── Encoding: decodeStream/decode need type casts ──
      Encoding:
        extra_methods:
          "decodeStream#1": "(args) => (args[0] as Encoding).decodeStream((args[1] as Stream).cast<List<int>>())"
          "decode#1": "(args) => (args[0] as Encoding).decode((args[1] as List).cast<int>())"

      # ── JsonCodec: callback wrapping for reviver/toEncodable ──
      JsonCodec:
        extra_methods:
          "_#fromFields#2": "(args) => JsonCodec()"
          "#2": |
            (args) {
              final reviver = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final toEncodable = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              return JsonCodec(
                reviver: reviver != null ? (key, value) => reviver(key, value) : null,
                toEncodable: toEncodable != null ? (v) => toEncodable(v) : null,
              );
            }
          "decode#2": |
            (args) {
              final self = args[0] as JsonCodec;
              final source = args[1] as String;
              final reviver = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (reviver != null) {
                return self.decode(source, reviver: (key, value) => reviver(key, value));
              }
              return self.decode(source);
            }
          "encode#2": |
            (args) {
              final self = args[0] as JsonCodec;
              final value = args[1];
              final toEncodable = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (toEncodable != null) {
                return self.encode(value, toEncodable: (v) => toEncodable(v));
              }
              return self.encode(value);
            }

      # ── JsonEncoder: callback wrapping + Sink/Stream cast ──
      #   _#fromFields: field "indent" has no matching unnamed ctor param
      JsonEncoder:
        extra_methods:
          "_#fromFields#2": "(args) => JsonEncoder.withIndent(args[0] as String?, args[1] as dynamic Function(dynamic)?)"
          "#1": |
            (args) {
              final toEncodable = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              if (toEncodable != null) {
                return JsonEncoder((v) => toEncodable(v));
              }
              return const JsonEncoder();
            }
          "withIndent#2": |
            (args) {
              final indent = args[0] as String?;
              final toEncodable = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              if (toEncodable != null) {
                return JsonEncoder.withIndent(indent, (v) => toEncodable(v));
              }
              return JsonEncoder.withIndent(indent);
            }
          "startChunkedConversion#1": "(args) => (args[0] as JsonEncoder).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as JsonEncoder).bind((args[1] as Stream).cast<Object>())"

      # ── JsonDecoder: callback wrapping + Sink/Stream cast ──
      JsonDecoder:
        extra_methods:
          "#1": |
            (args) {
              final reviver = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              if (reviver != null) {
                return JsonDecoder((key, value) => reviver(key, value));
              }
              return const JsonDecoder();
            }
          "startChunkedConversion#1": "(args) => (args[0] as dynamic).startChunkedConversion(args[1])"
          "bind#1": "(args) => (args[0] as JsonDecoder).bind((args[1] as Stream).cast<String>())"

      # ── JsonUtf8Encoder: callback wrapping + non-standard _#fromFields ──
      JsonUtf8Encoder:
        extra_methods:
          "_#fromFields#3": |
            (args) => JsonUtf8Encoder(
              args[0] as String?,
              args[1] as dynamic Function(dynamic)?,
              args[2] as int? ?? 256,
            )
          "#3": |
            (args) {
              final indent = identical(args[0], darticAbsent) ? null : args[0] as String?;
              final toEncodable = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final bufferSize = identical(args[2], darticAbsent) ? 256 : args[2] as int;
              if (toEncodable != null) {
                return JsonUtf8Encoder(indent, (v) => toEncodable(v), bufferSize);
              }
              if (indent != null) {
                return JsonUtf8Encoder(indent, null, bufferSize);
              }
              return JsonUtf8Encoder();
            }
          "startChunkedConversion#1": "(args) => (args[0] as JsonUtf8Encoder).startChunkedConversion(castToBytesSink(args[1]))"
          "bind#1": "(args) => (args[0] as JsonUtf8Encoder).bind((args[1] as Stream).cast<Object>())"

      # ── Utf8Codec: decode needs List<int> cast ──
      #   _#fromFields: auto-gen fails (analyzer doesn't report private fields for SDK codec classes)
      Utf8Codec:
        extra_methods:
          "_#fromFields#1": "(args) => Utf8Codec(allowMalformed: args[0] as bool)"
          "decode#2": |
            (args) {
              final self = args[0] as Utf8Codec;
              final codeUnits = (args[1] as List).cast<int>();
              final allowMalformed = identical(args[2], darticAbsent) ? null : args[2] as bool?;
              if (allowMalformed != null) {
                return self.decode(codeUnits, allowMalformed: allowMalformed);
              }
              return self.decode(codeUnits);
            }

      # ── Utf8Encoder: Sink/Stream cast ──
      Utf8Encoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as Utf8Encoder).startChunkedConversion(castToBytesSink(args[1]))"
          "bind#1": "(args) => (args[0] as Utf8Encoder).bind((args[1] as Stream).cast<String>())"

      # ── Utf8Decoder: List<int> cast + Sink/Stream cast ──
      Utf8Decoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as Utf8Decoder).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as Utf8Decoder).bind((args[1] as Stream).cast<List<int>>())"
          "convert#3": |
            (args) {
              final self = args[0] as Utf8Decoder;
              final codeUnits = (args[1] as List).cast<int>();
              final start = identical(args[2], darticAbsent) ? 0 : args[2] as int;
              final end = identical(args[3], darticAbsent) ? null : args[3] as int?;
              return self.convert(codeUnits, start, end);
            }

      # ── Base64Codec: non-standard _#fromFields + List<int> cast ──
      Base64Codec:
        extra_methods:
          "_#fromFields#1": |
            (args) {
              final encoder = args[0] as Base64Encoder;
              return identical(encoder, const Base64Encoder()) ? const Base64Codec() : const Base64Codec.urlSafe();
            }
          "encode#1": "(args) => (args[0] as Base64Codec).encode((args[1] as List).cast<int>())"

      # ── Base64Encoder: non-standard _#fromFields + List<int> cast + Sink/Stream cast ──
      Base64Encoder:
        extra_methods:
          "_#fromFields#1": |
            (args) {
              final urlSafe = args[0] as bool;
              return urlSafe ? Base64Encoder.urlSafe() : const Base64Encoder();
            }
          "convert#1": "(args) => (args[0] as Base64Encoder).convert((args[1] as List).cast<int>())"
          "startChunkedConversion#1": "(args) => (args[0] as Base64Encoder).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as Base64Encoder).bind((args[1] as Stream).cast<List<int>>())"

      # ── Base64Decoder: Sink/Stream cast ──
      Base64Decoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as Base64Decoder).startChunkedConversion(castToBytesSink(args[1]))"
          "bind#1": "(args) => (args[0] as Base64Decoder).bind((args[1] as Stream).cast<String>())"

      # ── AsciiCodec: decode needs List<int> cast ──
      AsciiCodec:
        extra_methods:
          "_#fromFields#1": "(args) => AsciiCodec(allowInvalid: args[0] as bool)"
          "decode#2": |
            (args) {
              final self = args[0] as AsciiCodec;
              final bytes = (args[1] as List).cast<int>();
              final allowInvalid = identical(args[2], darticAbsent) ? null : args[2] as bool?;
              if (allowInvalid != null) {
                return self.decode(bytes, allowInvalid: allowInvalid);
              }
              return self.decode(bytes);
            }

      # ── AsciiEncoder: Sink/Stream cast ──
      AsciiEncoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as AsciiEncoder).startChunkedConversion(castToBytesSink(args[1]))"
          "bind#1": "(args) => (args[0] as AsciiEncoder).bind((args[1] as Stream).cast<String>())"

      # _UnicodeSubsetEncoder: dynamic dispatch + Sink/Stream cast
      _UnicodeSubsetEncoder:
        extra_methods:
          "convert#3": |
            (args) {
              final self = args[0];
              final string = args[1] as String;
              final start = identical(args[2], darticAbsent) ? 0 : args[2] as int;
              final end = identical(args[3], darticAbsent) ? null : args[3] as int?;
              return (self as dynamic).convert(string, start, end);
            }
          "bind#1": "(args) => (args[0] as dynamic).bind((args[1] as Stream).cast<String>())"
          "startChunkedConversion#1": "(args) => (args[0] as dynamic).startChunkedConversion(castToBytesSink(args[1]))"

      # ── AsciiDecoder: List<int> cast + Sink/Stream cast ──
      AsciiDecoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as AsciiDecoder).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as AsciiDecoder).bind((args[1] as Stream).cast<List<int>>())"
          "convert#3": |
            (args) {
              final self = args[0] as AsciiDecoder;
              final bytes = (args[1] as List).cast<int>();
              final start = identical(args[2], darticAbsent) ? 0 : args[2] as int;
              final end = identical(args[3], darticAbsent) ? null : args[3] as int?;
              return self.convert(bytes, start, end);
            }

      # _UnicodeSubsetDecoder: dynamic dispatch + List<int> cast
      _UnicodeSubsetDecoder:
        extra_methods:
          "convert#3": |
            (args) {
              final self = args[0];
              final bytes = (args[1] as List).cast<int>();
              final start = identical(args[2], darticAbsent) ? 0 : args[2] as int;
              final end = identical(args[3], darticAbsent) ? null : args[3] as int?;
              return (self as dynamic).convert(bytes, start, end);
            }
          "bind#1": "(args) => (args[0] as dynamic).bind((args[1] as Stream).cast<List<int>>())"

      # ── Latin1Codec: decode needs List<int> cast ──
      Latin1Codec:
        extra_methods:
          "_#fromFields#1": "(args) => Latin1Codec(allowInvalid: args[0] as bool)"
          "decode#2": |
            (args) {
              final self = args[0] as Latin1Codec;
              final bytes = (args[1] as List).cast<int>();
              final allowInvalid = identical(args[2], darticAbsent) ? null : args[2] as bool?;
              if (allowInvalid != null) {
                return self.decode(bytes, allowInvalid: allowInvalid);
              }
              return self.decode(bytes);
            }

      # ── Latin1Encoder: Sink/Stream cast ──
      Latin1Encoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as Latin1Encoder).startChunkedConversion(castToBytesSink(args[1]))"
          "bind#1": "(args) => (args[0] as Latin1Encoder).bind((args[1] as Stream).cast<String>())"

      # ── Latin1Decoder: List<int> cast + Sink/Stream cast ──
      Latin1Decoder:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as Latin1Decoder).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as Latin1Decoder).bind((args[1] as Stream).cast<List<int>>())"
          "convert#3": |
            (args) {
              final self = args[0] as Latin1Decoder;
              final bytes = (args[1] as List).cast<int>();
              final start = identical(args[2], darticAbsent) ? 0 : args[2] as int;
              final end = identical(args[3], darticAbsent) ? null : args[3] as int?;
              return self.convert(bytes, start, end);
            }

      # ── HtmlEscape: Sink/Stream cast ──
      HtmlEscape:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as HtmlEscape).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as HtmlEscape).bind((args[1] as Stream).cast<String>())"

      # ── LineSplitter: Sink/Stream cast ──
      LineSplitter:
        extra_methods:
          "startChunkedConversion#1": "(args) => (args[0] as LineSplitter).startChunkedConversion(castToStringSink(args[1]))"
          "bind#1": "(args) => (args[0] as LineSplitter).bind((args[1] as Stream).cast<String>())"

      # ── ChunkedConversionSink: smart List casting ──
      ChunkedConversionSink:
        extra_methods:
          "add#1": |
            (args) {
              var item = args[1];
              if (item is List && item is! List<int> && item is! List<String>) {
                if (item.isNotEmpty && item.first is int) {
                  item = item.cast<int>();
                }
              }
              (args[0] as Sink).add(item);
              return null;
            }

      # _SimpleCallbackSink: callback wrapping
      _SimpleCallbackSink:
        extra_methods:
          "#1": |
            (args) {
              final callback = args[0] as Function;
              return ChunkedConversionSink.withCallback((chunks) => callback(chunks));
            }

      # ── StringConversionSink: asUtf8Sink needs optional param handling ──
      StringConversionSink:
        extra_methods:
          "asUtf8Sink#1": |
            (args) {
              final allowMalformed = identical(args[1], darticAbsent) ? false : args[1] as bool;
              return (args[0] as StringConversionSink).asUtf8Sink(allowMalformed);
            }

      # _StringCallbackSink: callback wrapping
      _StringCallbackSink:
        extra_methods:
          "#1": |
            (args) {
              final callback = args[0] as Function;
              return StringConversionSink.withCallback((s) => callback(s));
            }

      # _StringAdapterSink: Sink cast
      _StringAdapterSink:
        extra_methods:
          "#1": "(args) => StringConversionSink.from(castToStringSink(args[0]))"

      # _StringSinkConversionSink: factory mapping
      _StringSinkConversionSink:
        extra_methods:
          "#1": "(args) => StringConversionSink.fromStringSink(args[0] as StringSink)"

      # ── ByteConversionSink: List<int> cast ──
      ByteConversionSink:
        extra_methods:
          "add#1": |
            (args) {
              (args[0] as ByteConversionSink).add((args[1] as List).cast<int>());
              return null;
            }
          "addSlice#4": |
            (args) {
              (args[0] as ByteConversionSink).addSlice(
                (args[1] as List).cast<int>(),
                args[2] as int,
                args[3] as int,
                args[4] as bool,
              );
              return null;
            }

      # _ByteAdapterSink: Sink cast
      _ByteAdapterSink:
        extra_methods:
          "#1": "(args) => ByteConversionSink.from(castToBytesSink(args[0]))"

      # _ByteCallbackSink: callback wrapping
      _ByteCallbackSink:
        extra_methods:
          "#1": |
            (args) {
              final callback = args[0] as Function;
              return ByteConversionSink.withCallback((bytes) => callback(bytes));
            }

      # _ClosableStringSink: callback wrapping
      _ClosableStringSink:
        extra_methods:
          "#2": |
            (args) {
              final sink = args[0] as StringSink;
              final onClose = args[1] as Function;
              return ClosableStringSink.fromStringSink(sink, () => onClose());
            }

      # ── JsonCyclicError: subclass of JsonUnsupportedObjectError ──
      JsonCyclicError:
        extra_methods:
          "#1": "(args) => JsonCyclicError(args[0])"
          "toString#0": "(args) => (args[0] as JsonCyclicError).toString()"
