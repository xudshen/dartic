# dart:core bindings configuration for dartic code generator.
#
# This file drives code generation for ALL dart:core types currently registered
# in the hand-written binding files. The generator uses this YAML + dart analyzer
# to produce equivalent .g.dart files.
#
# Types are organized by category:
#   1. Non-generic types (type-only dispatcher, no test needed)
#   2. Generic/polymorphic types (dispatcher + test predicate)
#   3. Binding-only types (no dispatcher needed)
#   4. Error/Exception hierarchy
#   5. Misc types (Stopwatch, StackTrace, Symbol, Expando, MapEntry, etc.)
#   6. RegExp/Match/RegExpMatch
#   7. Runes/RuneIterator
#   8. BigInt, DateTime, StringBuffer, Uri, Invocation

output_bindings: "../lib/src/bindings/core"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: dart:core
    discover: all
    extra_imports:
      - "package:dartic_stdlib/src/bindings/core/iterable_helpers.dart"
    classes:
      # ── Non-generic types (type-only dispatcher, no test needed) ──────

      # int -- dispatcher prefix chain: int, num
      - int

      # double -- dispatcher prefix chain: double, num
      - double

      # String (also registers Pattern bindings separately)
      - String

      # bool
      - bool

      # Duration (non-final, bridgeable)
      - name: Duration
        bridge: true

      # ── Generic/polymorphic types (need test predicate) ──────────────
      # NOTE: Supertypes MUST come before subtypes here. The dispatch
      # registry uses reverse-order predicate scan, so later registrations
      # take priority. If Iterable (supertype) is registered after List,
      # `[1,2,3] is Iterable` matches first, binding the wrong dispatcher.

      # Iterable -- registered first so subtypes (List, Set) take priority
      # bridge: true enables _$Iterable bridge class for dartic classes that
      # extend Iterable (or the typedef aliases IterableBase/IterableMixin).
      - name: Iterable
        bridge: true
        internal_types:
          # dart:_internal iterable wrappers — VM-internal classes returned by
          # Iterable/List methods (where, map, take, etc.). Can't be imported
          # directly; we redirect constructors to the equivalent host method.
          - name: WhereIterable
            source: "dart:_internal"
          - name: MappedIterable
            source: "dart:_internal"
          - name: ExpandIterable
            source: "dart:_internal"
          - name: TakeIterable
            source: "dart:_internal"
          - name: TakeWhileIterable
            source: "dart:_internal"
          - name: SkipIterable
            source: "dart:_internal"
          - name: SkipWhileIterable
            source: "dart:_internal"
          - name: CastIterable
            source: "dart:_internal"
          - name: WhereTypeIterable
            source: "dart:_internal"
          - name: FollowedByIterable
            source: "dart:_internal"
          - name: SubListIterable
            source: "dart:_internal"
          - name: ReversedListIterable
            source: "dart:_internal"
          - name: MappedListIterable
            source: "dart:_internal"
          - name: ListMapView
            source: "dart:_internal"
          - name: ListIterator
            source: "dart:_internal"
          - name: EfficientLengthMappedIterable
            source: "dart:_internal"
          - name: Sort
            source: "dart:_internal"
          - name: checkNotNullable
            source: "dart:_internal"
          - name: IterableElementError
            source: "dart:_internal"

      # List -- dispatcher prefix chain: List, _GrowableList, Iterable
      - name: List
        internal_types:
          - _GrowableList
          - _List

      # Map -- dispatcher prefix chain: Map, LinkedHashMap
      - name: Map
        internal_types:
          - name: LinkedHashMap
            source: dart:collection

      # Set -- dispatcher prefix chain: Set, _Set, Iterable
      - name: Set
        internal_types:
          - name: _Set
            source: "dart:_compact_hash"

      # Invocation
      - Invocation

      # ── Binding-only types (no dispatcher needed) ────────────────────

      # num -- no runtime instances; int/double dispatchers handle via superclasses
      - num

      # Object -- too generic as dispatcher (all types match)
      - Object

      # Type -- no dispatcher, just bindings
      - Type

      # _Enum -- abstract base for enums, no dispatcher
      - name: Enum
        source_name: _Enum

      # Function -- no dispatcher for Function instances
      - Function

      # Iterator -- abstract, bridge: true enables _$Iterator bridge class
      # so dartic classes implementing Iterator can be used as host Iterator
      # (e.g. returned from Iterable.iterator getter through the Iterable bridge).
      - name: Iterator
        bridge: true

      # ── Error/Exception hierarchy ────────────────────────────────────
      # Non-final error/exception types get bridge: true so scripts can
      # define custom error/exception subclasses.

      - name: Error
        bridge: true
      - name: ArgumentError
        bridge: true
      - name: RangeError
        bridge: true
      - name: IndexError
        bridge: true
      - name: StateError
        bridge: true
      - name: UnsupportedError
        bridge: true
      - name: UnimplementedError
        bridge: true
      - name: FormatException
        bridge: true
      - name: Exception
        bridge: true
      - name: ConcurrentModificationError
        bridge: true
      - StackOverflowError
      - name: AssertionError
        bridge: true
      - name: TypeError
        bridge: true
      - NoSuchMethodError  # factory-only constructors, can't be bridged
      - Deprecated
      - OutOfMemoryError

      # ── Misc types ──────────────────────────────────────────────────

      - name: Stopwatch
        bridge: true
      - StackTrace
      - name: _StringStackTrace
        source_name: _StringStackTrace
      - Symbol
      - Expando
      - MapEntry

      # ── Pattern (String implements Pattern, Kernel may resolve to Pattern::) ──

      - Pattern

      # ── RegExp / Match / RegExpMatch ─────────────────────────────────

      - name: RegExp
        extra_bindings:
          - "dart:core::RegExp::#5"
      - Match
      - RegExpMatch

      # ── Runes / RuneIterator ─────────────────────────────────────────

      - Runes
      - RuneIterator

      # ── Standalone types ─────────────────────────────────────────────

      - BigInt
      - DateTime
      - StringBuffer
      - name: Uri
        internal_types:
          - _Uri
      - UriData

      # ── StringSink (abstract, needed by dart:convert ClosableStringSink) ──
      - StringSink

      # ── Comparable (abstract interface for natural ordering) ──
      - Comparable

      # ── Sink (abstract interface for data destinations) ──
      - Sink

      # ── WeakReference (weak reference to objects) ──
      - WeakReference

      # ── Finalizer (GC finalization callbacks) ──
      - Finalizer

    # ── Top-level functions ──────────────────────────────────────────────

    functions:
      - identical

      - name: print
        arity: 1
        custom: |
          (args) {
            (ctx.config.onPrint ?? print)(args[0]);
            return null;
          }

      - name: identityHashCode
        arity: 1
        custom: "(args) => identityHashCode(args[0])"

      # EnumName|get#name -- extension getter used by .name on enums
      - name: "EnumName|get#name"
        arity: 1
        custom: |
          (args) {
            final obj = args[0] as DarticObject;
            return obj.refFields[0] as String;
          }

    # ── Overrides (things the analyzer can't auto-discover) ──────────────

    overrides:

      # ── Object: null-safe toString + const Object() reconstruction ──
      Object:
        extra_methods:
          # Object methods must NOT cast args[0] to Object — null.toString() is valid
          "toString#0": "(args) => args[0].toString()"
          "hashCode#0": "(args) => args[0].hashCode"
          "==#1": "(args) => args[0] == args[1]"
          "$super$==#1": "(args) => identical(args[0], args[1])"
          "$super$toString#0": "(args) => args[0].toString()"
          "$super$noSuchMethod#1": "(args) => NoSuchMethodError.withInvocation(args[0], args[1] as Invocation)"
          "$super$hashCode#0": "(args) => identityHashCode(args[0])"
          "$super$runtimeType#0": "(args) => args[0].runtimeType"

      # ── Expando: reject DarticRecord keys (records have no identity) ──
      Expando:
        extra_methods:
          "[]=#2": "(args) { if (args[1] is DarticRecord) throw ArgumentError.value(args[1], 'object', 'Records do not have a well-defined identity'); (args[0] as Expando)[args[1] as Object] = args[2]; return args[2]; }"
          "[]#1": "(args) { if (args[1] is DarticRecord) throw ArgumentError.value(args[1], 'object', 'Records do not have a well-defined identity'); return (args[0] as Expando)[(args[1] as Object)]; }"

      # ── _GrowableList: VM-internal literal constructors ──
      _GrowableList:
        extra_methods:
          "cast#0": "(args) => (args[0] as List).cast()"
          "#1": "(args) => List<dynamic>.filled(args[0] as int, null, growable: true)"
          "_literal1#1": "(args) => <dynamic>[args[0]]"
          "_literal2#2": "(args) => <dynamic>[args[0], args[1]]"
          "_literal3#3": "(args) => <dynamic>[args[0], args[1], args[2]]"
          "_literal4#4": "(args) => <dynamic>[args[0], args[1], args[2], args[3]]"
          "_literal5#5": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4]]"
          "_literal6#6": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5]]"
          "_literal7#7": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5], args[6]]"
          "_literal8#8": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5], args[6], args[7]]"
          "_literal#1": "(args) => List<dynamic>.from(args[0] as List)"
          "filled#2": "(args) => List<dynamic>.filled(args[0] as int, args[1], growable: true)"
          "empty#0": "(args) => <dynamic>[]"
          "generate#2": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              return List.generate(length, (i) => generator(i));
            }
          "generate#3": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              if (!identical(args[2], darticAbsent)) {
                return List.generate(length, (i) => generator(i), growable: args[2] as bool);
              }
              return List.generate(length, (i) => generator(i));
            }

      # ── _List: VM-internal fixed-length list constructors ──
      _List:
        extra_methods:
          "filled#2": "(args) => List<dynamic>.filled(args[0] as int, args[1], growable: false)"
          "#1": "(args) => List<dynamic>.filled(args[0] as int, null, growable: false)"
          "empty#0": "(args) => const []"
          "generate#2": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              return List.generate(length, (i) => generator(i), growable: false);
            }
          "generate#3": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              if (!identical(args[2], darticAbsent)) {
                return List.generate(length, (i) => generator(i), growable: args[2] as bool);
              }
              return List.generate(length, (i) => generator(i), growable: false);
            }

      # ── _Set: VM-internal compact set constructor ──
      _Set:
        extra_methods:
          "#0": "(args) => <dynamic>{}"
          "add#1": "(args) => (args[0] as Set).add(args[1])"
          "cast#0": "(args) => (args[0] as Set).cast()"

      # ── dart:_internal iterable wrappers ──
      # VM-internal classes returned by Iterable/List methods. Constructor
      # bindings redirect to the equivalent host Iterable/List method.
      WhereIterable:
        extra_methods:
          "#2": "(args) => WhereIterableProxy(args[0] as Iterable, args[1] as bool Function(dynamic))"
      MappedIterable:
        extra_methods:
          "#2": "(args) => MappedIterableProxy(args[0] as Iterable, args[1] as dynamic Function(dynamic))"
      ExpandIterable:
        extra_methods:
          "#2": "(args) => ExpandIterableProxy(args[0] as Iterable, args[1] as Iterable Function(dynamic))"
      TakeIterable:
        extra_methods:
          "#2": "(args) => TakeIterableProxy(args[0] as Iterable, args[1] as int)"
      TakeWhileIterable:
        extra_methods:
          "#2": "(args) => TakeWhileIterableProxy(args[0] as Iterable, args[1] as bool Function(dynamic))"
      SkipIterable:
        extra_methods:
          "#2": "(args) => SkipIterableProxy(args[0] as Iterable, args[1] as int)"
      SkipWhileIterable:
        extra_methods:
          "#2": "(args) => SkipWhileIterableProxy(args[0] as Iterable, args[1] as bool Function(dynamic))"
      CastIterable:
        extra_methods:
          "#1": "(args) => CastIterableProxy(args[0] as Iterable)"
      WhereTypeIterable:
        extra_methods:
          "#1": "(args) => args[0] as Iterable"
      FollowedByIterable:
        extra_methods:
          "#2": "(args) => FollowedByIterableProxy(args[0] as Iterable, args[1] as Iterable)"
          "firstEfficient#2": "(args) => FollowedByIterableProxy(args[0] as Iterable, args[1] as Iterable)"
      SubListIterable:
        extra_methods:
          "#3": "(args) => SubListIterableProxy(args[0] as Iterable, args[1] as int, args[2] as int?)"
      ReversedListIterable:
        extra_methods:
          "#1": "(args) => ReversedListIterableProxy(args[0] as Iterable)"
      MappedListIterable:
        extra_methods:
          "#2": "(args) => MappedIterableProxy(args[0] as Iterable, args[1] as dynamic Function(dynamic))"
      ListMapView:
        extra_methods:
          "#1": "(args) => ListMapViewProxy(args[0] as List)"
      ListIterator:
        extra_methods:
          "#1": "(args) => ListIteratorProxy(args[0] as Iterable)"
      EfficientLengthMappedIterable:
        extra_methods:
          "#2": "(args) => MappedIterableProxy(args[0] as Iterable, args[1] as dynamic Function(dynamic))"
      Sort:
        extra_methods:
          "sort#2": |
            (args) {
              final list = args[0] as List;
              final compare = args[1] as int Function(dynamic, dynamic)?;
              if (compare != null) { list.sort(compare); } else { list.sort(); }
              return null;
            }
          "sort#3": |
            (args) {
              (args[0] as List).sort();
              return null;
            }
          "sort#4": |
            (args) {
              final list = args[0] as List;
              final compare = args[3] as int Function(dynamic, dynamic)?;
              if (compare != null) { list.sort(compare); } else { list.sort(); }
              return null;
            }
      checkNotNullable:
        extra_methods:
          "#2": |
            (args) {
              if (args[0] == null) throw TypeError();
              return args[0];
            }
      IterableElementError:
        extra_methods:
          "noElement#0": "(args) => StateError('No element')"
          "tooMany#0": "(args) => StateError('Too many elements')"
          "tooFew#0": "(args) => StateError('Too few elements')"

      # ── LinkedHashMap: CFE lowers map literals to LinkedHashMap ──
      LinkedHashMap:
        extra_methods:
          "of#1": "(args) => LinkedHashMap<dynamic, dynamic>.of(args[0] as Map)"
          "#0": "(args) => <dynamic, dynamic>{}"

      # ── Symbol: cross-namespace binding (dart:_internal) ──
      # Symbols are interned: const Symbol('foo') must be identical across calls.
      Symbol:
        preamble: |
          /// Symbol intern cache — ensures const Symbol('foo') is canonicalized.
          final Map<String, Symbol> _symbolCache = {};
        extra_methods:
          "#1": "(args) => _symbolCache.putIfAbsent(args[0] as String, () => Symbol(args[0] as String))"
          "==#1": "(args) => args[0] == args[1]"
          "toString#0": "(args) => args[0].toString()"
        extra_bindings:
          - "dart:_internal::Symbol::#1"

      # ── _StringStackTrace: internal StackTrace implementation ──
      _StringStackTrace:
        extra_methods:
          "#1": "(args) => StackTrace.fromString(args[0] as String)"

      # ── _Enum: DarticObject field accessors ──
      # Compiler emits dart:core::Enum::index#0 (public interface name),
      # but source_name is _Enum, so we need an extra_bindings alias.
      _Enum:
        extra_methods:
          "index#0": |
            (args) {
              final obj = args[0] as DarticObject;
              return obj.valueFields[0];
            }
          "_name#0": |
            (args) {
              final obj = args[0] as DarticObject;
              return obj.refFields[0] as String;
            }
        extra_bindings:
          - "dart:core::Enum::index#0"

      # ── Error: uses custom _DarticErrorBacking for constructor ──
      # Also hosts LateError bindings (dart:_internal) via extra_bindings.
      # Late errors use DarticLateError from the core runtime package,
      # shared by both CALL_HOST (local/field) and DarticGlobalTable (global) paths.
      Error:
        preamble: |
          /// Minimal concrete Error subclass used as host backing for
          /// interpreter-defined Error subclasses.
          class _DarticErrorBacking extends Error {
            @override
            String toString() => 'Error';
          }
        extra_methods:
          "#0": "(args) => _DarticErrorBacking()"
          "toString#0": "(args) => (args[0] as Error).toString()"
          "localNI#1": |
            (args) => DarticLateError("Local '${args[0]}' has not been initialized.")
          "fieldNI#1": |
            (args) => DarticLateError("Field '${args[0]}' has not been initialized.")
          "localADI#1": |
            (args) => DarticLateError("Local '${args[0]}' has been assigned during initialization.")
          "fieldADI#1": |
            (args) => DarticLateError("Field '${args[0]}' has been assigned during initialization.")
          "localAI#1": |
            (args) => DarticLateError("Local '${args[0]}' has already been initialized.")
          "fieldAI#1": |
            (args) => DarticLateError("Field '${args[0]}' has already been initialized.")
          "_forExternal#1": |
            (args) => NoSuchMethodError.withInvocation(null, Invocation.method(Symbol(args[0] as String), const []))
        extra_bindings:
          - "dart:_internal::LateError::localNI#1"
          - "dart:_internal::LateError::fieldNI#1"
          - "dart:_internal::LateError::localADI#1"
          - "dart:_internal::LateError::fieldADI#1"
          - "dart:_internal::LateError::localAI#1"
          - "dart:_internal::LateError::fieldAI#1"
          - "dart:core::NoSuchMethodError::_forExternal#1"


      # ── ArgumentError: arity-1 variant for CFE backward compat ──
      ArgumentError:
        extra_methods:
          "#1": "(args) => ArgumentError(args[0])"

      # ── RangeError: extra_bindings for factory aliases ──
      RangeError:
        extra_bindings:
          - "dart:core::RangeError::value#3"
          - "dart:core::RangeError::range#5"
          - "dart:core::RangeError::index#5"

      # ── IndexError: extra_bindings for constructor alias ──
      IndexError:
        extra_bindings:
          - "dart:core::IndexError::#5"

      # ── Deprecated: constructor + message getter ──
      # Note: The analyzer may discover a phantom 'expires' getter that doesn't
      # exist at runtime; override it to suppress auto-generation.
      Deprecated:
        extra_methods:
          "expires#0": "(args) => (args[0] as Deprecated).message"
          "_#fromFields#2": "(args) => Deprecated(args[1] as String)"


      # ── NoSuchMethodError: _withInvocation (private factory used by CFE) ──
      NoSuchMethodError:
        extra_methods:
          "_withInvocation#2": "(args) => NoSuchMethodError.withInvocation(args[0], args[1] as Invocation)"
        extra_bindings:
          - "dart:core::NoSuchMethodError::_withInvocation#2"


      # ── MapEntry: private constructor variant ──
      MapEntry:
        extra_methods:
          "_#2": "(args) => MapEntry(args[0], args[1])"


      # ── Duration: constructor with all-named params + internal variant ──
      Duration:
        extra_methods:
          "_#fromFields#1": "(args) => Duration(microseconds: args[0] as int)"

      # ── int: parse with deprecated onError (Kernel compiles to arity 3) ──
      int:
        extra_methods:
          "parse#3": |
            (args) {
              final source = args[0] as String;
              if (!identical(args[1], darticAbsent)) {
                return int.parse(source, radix: args[1] as int);
              }
              return int.parse(source);
            }



      # ── Iterable: generate factory + callback methods + optional params ──
      Iterable:
        extra_methods:
          # Manual iteration to avoid orElse type mismatch:
          # Dart enforces `(() => E)?` at runtime for typed iterables (e.g. Runes),
          # but our `() => orElse()` returns `() => dynamic` which fails the check.
          "firstWhere#2": |
            (args) {
              final fn = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              for (final e in args[0] as Iterable) {
                if (fn(e) as bool) return e;
              }
              if (orElse != null) return orElse();
              throw StateError('No element');
            }
          "lastWhere#2": |
            (args) {
              final fn = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              Object? result;
              bool found = false;
              for (final e in args[0] as Iterable) {
                if (fn(e) as bool) { result = e; found = true; }
              }
              if (found) return result;
              if (orElse != null) return orElse();
              throw StateError('No element');
            }
          "singleWhere#2": |
            (args) {
              final fn = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              Object? result;
              bool found = false;
              for (final e in args[0] as Iterable) {
                if (fn(e) as bool) {
                  if (found) throw StateError('Too many elements');
                  result = e; found = true;
                }
              }
              if (found) return result;
              if (orElse != null) return orElse();
              throw StateError('No element');
            }
          "reduce#1": |
            (args) {
              final fn = args[1] as Function;
              final iter = (args[0] as Iterable).iterator;
              if (!iter.moveNext()) throw StateError('No element');
              var value = iter.current;
              while (iter.moveNext()) {
                value = fn(value, iter.current);
              }
              return value;
            }
          "#0": "(args) => const Iterable.empty()"
          # IterableElementError static factories (dart:_internal)
          "noElement#0": "(args) => StateError('No element')"
          "tooMany#0": "(args) => StateError('Too many elements')"
          "tooFew#0": "(args) => StateError('Too few elements')"
        extra_bindings:
          - "dart:_internal::EmptyIterable::#0"
          - "dart:_internal::IterableElementError::noElement#0"
          - "dart:_internal::IterableElementError::tooMany#0"
          - "dart:_internal::IterableElementError::tooFew#0"

      # ── List: factory constructors not discoverable by analyzer ──
      List:
        extra_methods:
          "unmodifiable#1": "(args) => List.unmodifiable(args[0] as Iterable)"
          "from#2": |
            (args) {
              final growable = (args.length > 1 && !identical(args[1], darticAbsent))
                  ? args[1] as bool
                  : true;
              return List.from(args[0] as Iterable, growable: growable);
            }
          "of#2": |
            (args) {
              final growable = identical(args[1], darticAbsent) ? true : args[1] as bool;
              return List.of(args[0] as Iterable, growable: growable);
            }
          "generate#2": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              return List.generate(length, (i) => generator(i));
            }
          "generate#3": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              if (!identical(args[2], darticAbsent)) {
                return List.generate(length, (i) => generator(i), growable: args[2] as bool);
              }
              return List.generate(length, (i) => generator(i));
            }
          # Extra arities from iterable_wrappers (named params)
          "empty#1": "(args) => (identical(args[0], darticAbsent) ? false : args[0] as bool) ? <dynamic>[] : List<dynamic>.empty()"
          "filled#3": "(args) => List<dynamic>.filled(args[0] as int, args[1], growable: identical(args[2], darticAbsent) ? true : args[2] as bool)"

      # ── Map: factories + callback methods + toString ──
      # CFE generates typedef constructor tear-offs that call Map factories
      # directly (not redirected to LinkedHashMap), so we must bind them here.
      Map:
        extra_methods:
          "#0": "(args) => <dynamic, dynamic>{}"
          "_fromLiteral#1": |
            (args) {
