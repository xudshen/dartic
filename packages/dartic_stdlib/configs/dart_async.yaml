                onDone: onDone != null ? () => onDone() : null,
                cancelOnError: cancelOnError,
              );
            }

      # ── StreamTransformerBase ────────────────────────────────────────────
      StreamTransformerBase:
        extra_methods:
          "cast#0": "(args) => (args[0] as StreamTransformer).cast()"
