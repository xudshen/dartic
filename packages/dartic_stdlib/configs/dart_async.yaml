# dart:async bindings configuration for dartic code generator.
#
# This file drives code generation for ALL dart:async types currently registered
# in the hand-written binding files. Nearly every method requires custom source
# code because of callback wrapping (Function → typed closures), so virtually
# all methods are specified via extra_methods overrides.
#
# Types covered:
#   1. Future (factory constructors, static methods, instance methods)
#   2. Completer (constructor, methods, getters)
#   3. Stream (factory constructors, instance methods) + _EmptyStream
#   4. StreamController (constructors, methods, getters)
#   5. StreamSubscription (methods, getters)
#   6. StreamTransformer + _StreamHandlerTransformer + _StreamSubscriptionTransformer
#   7. EventSink, StreamSink, StreamConsumer, MultiStreamController
#   8. StreamIterator + _StreamIterator
#   9. Timer (constructors, static methods, methods, getters)
#  10. Zone (static getters, instance methods, getters)
#  11. ZoneSpecification + _ZoneSpecification
#  12. Top-level functions: scheduleMicrotask, runZoned, runZonedGuarded

output_bindings: "../lib/src/bindings/async"
output_plugins: "../lib/src/plugins"

custom_imports:
  - "package:dartic/dartic.dart"
  - "package:dartic/dartic_internal.dart"

libraries:
  - uri: dart:async
    classes:
      # ── Future ──────────────────────────────────────────────────────────
      - Future

      # ── Completer ───────────────────────────────────────────────────────
      - Completer

      # ── Stream + _EmptyStream ───────────────────────────────────────────
      - name: Stream
        bridge: true
        internal_types:
          - _EmptyStream

      # ── StreamController ────────────────────────────────────────────────
      - StreamController

      # ── StreamSubscription ──────────────────────────────────────────────
      - name: StreamSubscription
        bridge: true

      # ── StreamTransformer + internal types ──────────────────────────────
      - name: StreamTransformer
        internal_types:
          - _StreamHandlerTransformer
          - _StreamSubscriptionTransformer

      # ── EventSink ───────────────────────────────────────────────────────
      - name: EventSink
        bridge: true

      # ── StreamSink ──────────────────────────────────────────────────────
      - name: StreamSink
        bridge: true

      # ── StreamConsumer ──────────────────────────────────────────────────
      - name: StreamConsumer
        bridge: true

      # ── MultiStreamController ───────────────────────────────────────────
      - MultiStreamController

      # ── StreamIterator + _StreamIterator ────────────────────────────────
      - name: StreamIterator
        internal_types:
          - _StreamIterator

      # ── Timer ───────────────────────────────────────────────────────────
      - Timer

      # ── Zone ────────────────────────────────────────────────────────────
      - name: Zone
        internal_types:
          - _RootZone

      # ── ZoneSpecification + _ZoneSpecification ──────────────────────────
      - name: ZoneSpecification
        internal_types:
          - _ZoneSpecification

      # ── TimeoutException ─────────────────────────────────────────────
      - TimeoutException

      # ── ZoneDelegate (abstract final, passed to zone handlers) ───────
      - ZoneDelegate

      # ── StreamView (read-only Stream wrapper) ────────────────────────
      - StreamView

      # ── StreamTransformerBase (abstract base for custom transformers) ─
      - StreamTransformerBase

    # ── Top-level functions ──────────────────────────────────────────────

    functions:
      - name: scheduleMicrotask
        arity: 1
        custom: |
          (args) {
            final callback = args[0] as Function;
            scheduleMicrotask(() => callback());
            return null;
          }

      - name: runZoned
        arity: 4
        custom: |
          (args) {
            final body = args[0] as Function;
            final zoneValues = identical(args[1], darticAbsent) ? null : args[1] as Map?;
            final zoneSpec =
                identical(args[2], darticAbsent) ? null : args[2] as ZoneSpecification?;
            final onError = identical(args[3], darticAbsent) ? null : args[3] as Function?;
            // ignore: deprecated_member_use
            return runZoned<Object?>(
              () => body(),
              zoneValues: zoneValues != null
                  ? Map<Object?, Object?>.from(zoneValues)
                  : null,
              zoneSpecification: zoneSpec,
              // ignore: deprecated_member_use
              onError: onError,
            );
          }

      - name: runZonedGuarded
        arity: 4
        custom: |
          (args) {
            final body = args[0] as Function;
            final onError = args[1] as Function;
            final zoneValues = identical(args[2], darticAbsent) ? null : args[2] as Map?;
            final zoneSpec =
                identical(args[3], darticAbsent) ? null : args[3] as ZoneSpecification?;
            return runZonedGuarded<Object?>(
              () => body(),
              (error, stack) => onError(error, stack),
              zoneValues: zoneValues != null
                  ? Map<Object?, Object?>.from(zoneValues)
                  : null,
              zoneSpecification: zoneSpec,
            );
          }

      - name: unawaited
        arity: 1
        custom: |
          (args) {
            unawaited(args[0] as Future<void>?);
            return null;
          }

      # CFE injects this in non-product `await for` lowering for debugger
      # support. In dartic it's a no-op — we don't have _StreamImpl.
      - name: _asyncStarMoveNextHelper
        arity: 1
        custom: "(args) => null"

    # ── Overrides ────────────────────────────────────────────────────────

    overrides:

      # ── Future ──────────────────────────────────────────────────────────
      Future:
        extra_methods:
          # FutureBox wrapping: when a computation returns a Future, wrap it
          # in FutureBox to prevent the host VM from incorrectly flattening
          # nested Future<Future<T>> values. Consumption points (.then/await)
          # unwrap and selectively re-flatten based on TAG_TYPE.
          "#1": |
            (args) {
              final computation = args[0] as Function;
              return Future(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "value#1": |
            (args) {
              final v = identical(args[0], darticAbsent) ? null : args[0];
              return Future.value(v is Future ? FutureBox(v) : v);
            }
          "error#2": |
            (args) {
              final error = args[0] as Object;
              final stackTrace = identical(args[1], darticAbsent) ? null : args[1] as StackTrace?;
              if (stackTrace != null) {
                return Future.error(error, stackTrace);
              }
              return Future.error(error);
            }
          "delayed#2": |
            (args) {
              final duration = args[0] as Duration;
              final computation = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              if (computation != null) {
                return Future.delayed(duration, () {
                  final result = computation();
                  return result is Future ? FutureBox(result) : result;
                });
              }
              return Future.delayed(duration);
            }
          "microtask#1": |
            (args) {
              final computation = args[0] as Function;
              return Future.microtask(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "sync#1": |
            (args) {
              final computation = args[0] as Function;
              return Future.sync(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "wait#3": |
            (args) {
              final futures = (args[0] as Iterable).cast<Future>();
              final eagerError = identical(args[1], darticAbsent) ? null : args[1] as bool?;
              final cleanUp = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return Future.wait(
                futures.toList(),
                eagerError: eagerError ?? false,
                cleanUp: cleanUp != null ? (v) => cleanUp(v) : null,
              );
            }
          "any#1": |
            (args) {
              final futures = (args[0] as Iterable).cast<Future>();
              return Future.any(futures.toList());
            }
          "doWhile#1": |
            (args) {
              final action = args[0] as Function;
              return Future.doWhile(() {
                final r = action();
                if (r is Future) return (r as Future).then((v) => v as bool);
                return r as bool;
              });
            }
          "forEach#2": |
            (args) {
              final elements = args[0] as Iterable;
              final action = args[1] as Function;
              return Future.forEach(elements, (e) => action(e));
            }
          "then#2": |
            (args) {
              final future = args[0] as Future;
              final onValue = args[1] as Function;
              final onError = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return future.then(
                (v) => onValue(v),
                onError: onError,
              );
            }
          "catchError#2": |
            (args) {
              final future = args[0] as Future;
              final onError = args[1] as Function;
              final test = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return future.catchError(
                onError,
                test: test != null ? (e) => test(e) as bool : null,
              );
            }
          "whenComplete#1": |
            (args) {
              final future = args[0] as Future;
              final action = args[1] as Function;
              return future.whenComplete(() => action() as FutureOr<void>);
            }
          "asStream#0": "(args) => (args[0] as Future).asStream()"
          "ignore#0": |
            (args) {
              (args[0] as Future).ignore();
              return null;
            }
          "timeout#2": |
            (args) {
              final future = args[0] as Future;
              final timeLimit = args[1] as Duration;
              final onTimeout = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (onTimeout != null) {
                return future.timeout(timeLimit, onTimeout: () => onTimeout());
              }
              return future.timeout(timeLimit);
            }

      # ── Completer ───────────────────────────────────────────────────────
      Completer:
        extra_methods:
          "#0": "(args) => Completer<Object?>()"
          "sync#0": "(args) => Completer<Object?>.sync()"
          "future#0": "(args) => (args[0] as Completer).future"
          "isCompleted#0": "(args) => (args[0] as Completer).isCompleted"

      # ── Stream ──────────────────────────────────────────────────────────
      Stream:
        extra_methods:
          "fromIterable#1": "(args) => Stream.fromIterable(args[0] as Iterable)"
          "fromFuture#1": "(args) => Stream.fromFuture(args[0] as Future)"
          "value#1": "(args) => Stream.value(args[0])"
          "error#2": |
            (args) {
              final error = args[0] as Object;
              final st = identical(args[1], darticAbsent) ? null : args[1] as StackTrace?;
              return Stream.error(error, st);
            }
          "empty#0": "(args) => const Stream.empty()"
          "fromFutures#1": "(args) => Stream.fromFutures((args[0] as Iterable).cast<Future>())"
          "periodic#2": |
            (args) {
              final period = args[0] as Duration;
              final computation = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              if (computation != null) {
                return Stream.periodic(period, (i) => computation(i));
              }
              return Stream.periodic(period);
            }
          "multi#2": |
            (args) {
              final onListen = args[0] as Function;
              final isBroadcast =
                  identical(args[1], darticAbsent) ? false : args[1] as bool? ?? false;
              return Stream.multi(
                (controller) => onListen(controller),
                isBroadcast: isBroadcast,
              );
            }
          "eventTransformed#2": |
            (args) {
              final source = args[0] as Stream;
              final mapSink = args[1] as Function;
              return Stream.eventTransformed(
                source,
                (sink) => mapSink(sink) as EventSink,
              );
            }
          "listen#4": |
            (args) {
              final stream = args[0] as Stream;
              final onData = args[1] as Function?;
              final onError = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              final onDone = identical(args[3], darticAbsent) ? null : args[3] as Function?;
              final cancelOnError =
                  identical(args[4], darticAbsent) ? null : args[4] as bool?;
              return stream.listen(
                onData != null ? (e) => onData(e) : null,
                onError: onError,
                onDone: onDone != null ? () => onDone() : null,
                cancelOnError: cancelOnError,
              );
            }
          "toList#0": "(args) => (args[0] as Stream).toList()"
          "map#1": |
            (args) {
              final stream = args[0] as Stream;
              final convert = args[1] as Function;
              return stream.map((e) => convert(e));
            }
          "where#1": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              return stream.where((e) => test(e) as bool);
            }
          "first#0": "(args) => (args[0] as Stream).first"
          "last#0": "(args) => (args[0] as Stream).last"
          "length#0": "(args) => (args[0] as Stream).length"
          "isEmpty#0": "(args) => (args[0] as Stream).isEmpty"
          "expand#1": |
            (args) {
              final stream = args[0] as Stream;
              final convert = args[1] as Function;
              return stream.expand((e) => convert(e) as Iterable);
            }
          "take#1": "(args) => (args[0] as Stream).take(args[1] as int)"
          "skip#1": "(args) => (args[0] as Stream).skip(args[1] as int)"
          "every#1": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              return stream.every((e) => test(e) as bool);
            }
          "any#1": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              return stream.any((e) => test(e) as bool);
            }
          "contains#1": "(args) => (args[0] as Stream).contains(args[1])"
          "forEach#1": |
            (args) {
              final stream = args[0] as Stream;
              final action = args[1] as Function;
              return stream.forEach((e) => action(e));
            }
          "drain#1": |
            (args) {
              final stream = args[0] as Stream;
              if (identical(args[1], darticAbsent)) return stream.drain();
              return stream.drain(args[1]);
            }
          "handleError#2": |
            (args) {
              final stream = args[0] as Stream;
              final onError = args[1] as Function;
              final test = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return stream.handleError(
                onError,
                test: test != null ? (e) => test(e) as bool : null,
              );
            }
          "asyncMap#1": |
            (args) {
              final stream = args[0] as Stream;
              final convert = args[1] as Function;
              return stream.asyncMap((e) => convert(e) as FutureOr);
            }
          "asyncExpand#1": |
            (args) {
              final stream = args[0] as Stream;
              final convert = args[1] as Function;
              return stream.asyncExpand((e) => convert(e) as Stream?);
            }
          "isBroadcast#0": "(args) => (args[0] as Stream).isBroadcast"
          "asBroadcastStream#2": |
            (args) {
              final stream = args[0] as Stream;
              final onListen = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final onCancel = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return stream.asBroadcastStream(
                onListen: onListen != null ? (sub) => onListen(sub) : null,
                onCancel: onCancel != null ? (sub) => onCancel(sub) : null,
              );
            }
          "join#1": |
            (args) {
              final stream = args[0] as Stream;
              final sep = identical(args[1], darticAbsent) ? null : args[1] as String?;
              return stream.join(sep ?? '');
            }
          "reduce#1": |
            (args) {
              final stream = args[0] as Stream;
              final combine = args[1] as Function;
              return stream.reduce((a, b) => combine(a, b));
            }
          "fold#2": |
            (args) {
              final stream = args[0] as Stream;
              final initial = args[1];
              final combine = args[2] as Function;
              return stream.fold(initial, (prev, e) => combine(prev, e));
            }
          "toSet#0": "(args) => (args[0] as Stream).toSet()"
          "distinct#1": |
            (args) {
              final stream = args[0] as Stream;
              final equals = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              if (equals != null) {
                return stream.distinct((a, b) => equals(a, b) as bool);
              }
              return stream.distinct();
            }
          "takeWhile#1": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              return stream.takeWhile((e) => test(e) as bool);
            }
          "skipWhile#1": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              return stream.skipWhile((e) => test(e) as bool);
            }
          "singleWhere#2": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (orElse != null) {
                return stream.singleWhere((e) => test(e) as bool,
                    orElse: () => orElse());
              }
              return stream.singleWhere((e) => test(e) as bool);
            }
          "firstWhere#2": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (orElse != null) {
                return stream.firstWhere((e) => test(e) as bool,
                    orElse: () => orElse());
              }
              return stream.firstWhere((e) => test(e) as bool);
            }
          "lastWhere#2": |
            (args) {
              final stream = args[0] as Stream;
              final test = args[1] as Function;
              final orElse = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (orElse != null) {
                return stream.lastWhere((e) => test(e) as bool,
                    orElse: () => orElse());
              }
              return stream.lastWhere((e) => test(e) as bool);
            }
          "single#0": "(args) => (args[0] as Stream).single"
          "cast#0": "(args) => (args[0] as Stream).cast()"
          "pipe#1": "(args) => (args[0] as Stream).pipe(args[1] as StreamConsumer)"
          "timeout#2": |
            (args) {
              final stream = args[0] as Stream;
              final timeLimit = args[1] as Duration;
              final onTimeout = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (onTimeout != null) {
                return stream.timeout(timeLimit,
                    onTimeout: (sink) => onTimeout(sink));
              }
              return stream.timeout(timeLimit);
            }
          "transform#1": "(args) => (args[0] as Stream).transform(args[1] as StreamTransformer)"

      # ── _EmptyStream ────────────────────────────────────────────────────
      # #0 is the zero-arg constructor; #1 is needed because CFE adds a
      # type arg parameter for the generic class _EmptyStream<T>.
      _EmptyStream:
        extra_methods:
          "#0": "(args) => const Stream.empty()"
          "#1": "(args) => const Stream.empty()"
          "_#fromFields#1": "(args) => const Stream.empty()"

      # ── StreamController ────────────────────────────────────────────────
      StreamController:
        extra_methods:
          "#5": |
            (args) {
              final onListen =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final onPause =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final onResume =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              final onCancel =
                  identical(args[3], darticAbsent) ? null : args[3] as Function?;
              final sync =
                  identical(args[4], darticAbsent) ? false : args[4] as bool? ?? false;
              return StreamController<Object?>(
                onListen: onListen != null ? () => onListen() : null,
                onPause: onPause != null ? () => onPause() : null,
                onResume: onResume != null ? () => onResume() : null,
                onCancel: onCancel != null
                    ? () => onCancel() as FutureOr<void>
                    : null,
                sync: sync,
              );
            }
          "broadcast#3": |
            (args) {
              final onListen =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final onCancel =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final sync =
                  identical(args[2], darticAbsent) ? false : args[2] as bool? ?? false;
              return StreamController<Object?>.broadcast(
                onListen: onListen != null ? () => onListen() : null,
                onCancel: onCancel != null ? () => onCancel() : null,
                sync: sync,
              );
            }
          "add#1": |
            (args) {
              (args[0] as StreamController).add(args[1]);
              return null;
            }
          "addError#2": |
            (args) {
              final controller = args[0] as StreamController;
              final error = args[1] as Object;
              final st =
                  identical(args[2], darticAbsent) ? null : args[2] as StackTrace?;
              if (st != null) {
                controller.addError(error, st);
              } else {
                controller.addError(error);
              }
              return null;
            }
          "close#0": "(args) => (args[0] as StreamController).close()"
          "stream#0": "(args) => (args[0] as StreamController).stream"
          "sink#0": "(args) => (args[0] as StreamController).sink"
          "done#0": "(args) => (args[0] as StreamController).done"
          "hasListener#0": "(args) => (args[0] as StreamController).hasListener"
          "isClosed#0": "(args) => (args[0] as StreamController).isClosed"
          "isPaused#0": "(args) => (args[0] as StreamController).isPaused"
          "addStream#2": |
            (args) {
              final controller = args[0] as StreamController;
              final source = args[1] as Stream;
              final cancelOnError =
                  identical(args[2], darticAbsent) ? null : args[2] as bool?;
              return controller.addStream(source,
                  cancelOnError: cancelOnError);
            }

      # ── StreamSubscription ──────────────────────────────────────────────
      StreamSubscription:
        extra_methods:
          "cancel#0": "(args) => (args[0] as StreamSubscription).cancel()"
          "pause#1": |
            (args) {
              final sub = args[0] as StreamSubscription;
              final resumeSignal =
                  identical(args[1], darticAbsent) ? null : args[1] as Future<void>?;
              sub.pause(resumeSignal);
              return null;
            }
          "resume#0": |
            (args) {
              (args[0] as StreamSubscription).resume();
              return null;
            }
          "isPaused#0": "(args) => (args[0] as StreamSubscription).isPaused"
          "onData#1": |
            (args) {
              final sub = args[0] as StreamSubscription;
              final handler = args[1] as Function?;
              sub.onData(handler != null ? (e) => handler(e) : null);
              return null;
            }
          "onError#1": |
            (args) {
              (args[0] as StreamSubscription)
                  .onError(args[1] as Function?);
              return null;
            }
          "onDone#1": |
            (args) {
              final sub = args[0] as StreamSubscription;
              final handler = args[1] as Function?;
              sub.onDone(handler != null ? () => handler() : null);
              return null;
            }
          "asFuture#1": |
            (args) {
              final sub = args[0] as StreamSubscription;
              if (identical(args[1], darticAbsent)) return sub.asFuture();
              return sub.asFuture(args[1]);
            }

      # ── StreamTransformer ───────────────────────────────────────────────
      StreamTransformer:
        extra_methods:
          "bind#1": |
            (args) {
              final transformer = args[0] as StreamTransformer;
              final stream = args[1] as Stream;
              return transformer.bind(stream);
            }
          "cast#0": "(args) => (args[0] as StreamTransformer).cast()"

      # ── _StreamHandlerTransformer ───────────────────────────────────────
      _StreamHandlerTransformer:
        extra_methods:
          "#3": |
            (args) {
              final handleData =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final handleError =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final handleDone =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return StreamTransformer.fromHandlers(
                handleData: handleData != null
                    ? (data, sink) => handleData(data, sink)
                    : null,
                handleError: handleError != null
                    ? (error, stackTrace, sink) =>
                        handleError(error, stackTrace, sink)
                    : null,
                handleDone: handleDone != null
                    ? (sink) => handleDone(sink)
                    : null,
