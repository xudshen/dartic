# dart:async bindings configuration for dartic code generator.
#
# This file drives code generation for ALL dart:async types currently registered
# in the hand-written binding files. Nearly every method requires custom source
# code because of callback wrapping (Function → typed closures), so virtually
# all methods are specified via extra_methods overrides.
#
# Types covered:
#   1. Future (factory constructors, static methods, instance methods)
#   2. Completer (constructor, methods, getters)
#   3. Stream (factory constructors, instance methods) + _EmptyStream
#   4. StreamController (constructors, methods, getters)
#   5. StreamSubscription (methods, getters)
#   6. StreamTransformer + _StreamHandlerTransformer + _StreamSubscriptionTransformer
#   7. EventSink, StreamSink, StreamConsumer, MultiStreamController
#   8. StreamIterator + _StreamIterator
#   9. Timer (constructors, static methods, methods, getters)
#  10. Zone (static getters, instance methods, getters)
#  11. ZoneSpecification + _ZoneSpecification
#  12. Top-level functions: scheduleMicrotask, runZoned, runZonedGuarded

output_bindings: "../lib/src/bindings/async"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: dart:async
    discover: all
    exclude:
      # FutureOr is a union type (T | Future<T>), not a real class.
      # Its test predicate `o is FutureOr` matches ALL non-null objects,
      # poisoning HostTypeResolver's predicate scan and causing unrelated
      # host objects (e.g. Iterator) to be misidentified as FutureOr<Never>.
      # FutureOr subtyping is handled algorithmically by SubtypeChecker.
      - "dart:async::FutureOr"
    classes:
      - name: Stream
        bridge: true
        internal_types:
          - _EmptyStream
      - name: StreamSubscription
        bridge: true
      - name: StreamTransformer
        bridge: true
        internal_types:
          - _StreamHandlerTransformer
          - _StreamSubscriptionTransformer
      - name: EventSink
        bridge: true
      - name: StreamSink
        bridge: true
      - name: StreamConsumer
        bridge: true
      - name: StreamIterator
        internal_types:
          - _StreamIterator
      - name: Zone
        internal_types:
          - _RootZone
      - name: ZoneSpecification
        internal_types:
          - _ZoneSpecification

    # ── Top-level functions ──────────────────────────────────────────────

    functions:
      - name: scheduleMicrotask
        arity: 1
        custom: |
          (args) {
            final callback = args[0] as Function;
            scheduleMicrotask(() => callback());
            return null;
          }

      - name: runZoned
        arity: 4
        custom: |
          (args) {
            final body = args[0] as Function;
            final zoneValues = identical(args[1], darticAbsent) ? null : args[1] as Map?;
            final zoneSpec =
                identical(args[2], darticAbsent) ? null : args[2] as ZoneSpecification?;
            final onError = identical(args[3], darticAbsent) ? null : args[3] as Function?;
            // ignore: deprecated_member_use
            return runZoned<Object?>(
              () => body(),
              zoneValues: zoneValues != null
                  ? Map<Object?, Object?>.from(zoneValues)
                  : null,
              zoneSpecification: zoneSpec,
              // ignore: deprecated_member_use
              onError: onError,
            );
          }

      - name: runZonedGuarded
        arity: 4
        custom: |
          (args) {
            final body = args[0] as Function;
            final onError = args[1] as Function;
            final zoneValues = identical(args[2], darticAbsent) ? null : args[2] as Map?;
            final zoneSpec =
                identical(args[3], darticAbsent) ? null : args[3] as ZoneSpecification?;
            return runZonedGuarded<Object?>(
              () => body(),
              (error, stack) => onError(error, stack),
              zoneValues: zoneValues != null
                  ? Map<Object?, Object?>.from(zoneValues)
                  : null,
              zoneSpecification: zoneSpec,
            );
          }

      - name: unawaited
        arity: 1
        custom: |
          (args) {
            unawaited(args[0] as Future<void>?);
            return null;
          }

      # CFE injects this in non-product `await for` lowering for debugger
      # support. In dartic it's a no-op — we don't have _StreamImpl.
      - name: _asyncStarMoveNextHelper
        arity: 1
        custom: "(args) => null"

    # ── Overrides ────────────────────────────────────────────────────────

    overrides:

      # ── Future ──────────────────────────────────────────────────────────
      Future:
        extra_methods:
          # FutureBox wrapping: when a computation returns a Future, wrap it
          # in FutureBox to prevent the host VM from incorrectly flattening
          # nested Future<Future<T>> values. Consumption points (.then/await)
          # unwrap and selectively re-flatten based on TAG_TYPE.
          "#1": |
            (args) {
              final computation = args[0] as Function;
              return Future(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "value#1": |
            (args) {
              final v = identical(args[0], darticAbsent) ? null : args[0];
              return Future.value(v is Future ? FutureBox(v) : v);
            }
          "error#2": |
            (args) {
              final error = args[0] as Object;
              final stackTrace = identical(args[1], darticAbsent) ? null : args[1] as StackTrace?;
              if (stackTrace != null) {
                return Future.error(error, stackTrace);
              }
              return Future.error(error);
            }
          "delayed#2": |
            (args) {
              final duration = args[0] as Duration;
              final computation = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              if (computation != null) {
                return Future.delayed(duration, () {
                  final result = computation();
                  return result is Future ? FutureBox(result) : result;
                });
              }
              return Future.delayed(duration);
            }
          "microtask#1": |
            (args) {
              final computation = args[0] as Function;
              return Future.microtask(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "sync#1": |
            (args) {
              final computation = args[0] as Function;
              return Future.sync(() {
                final result = computation();
                return result is Future ? FutureBox(result) : result;
              });
            }
          "wait#3": |
            (args) {
              final futures = (args[0] as Iterable).cast<Future>();
              final eagerError = identical(args[1], darticAbsent) ? null : args[1] as bool?;
              final cleanUp = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return Future.wait(
                futures.toList(),
                eagerError: eagerError ?? false,
                cleanUp: cleanUp != null ? (v) => cleanUp(v) : null,
              );
            }
          "any#1": |
            (args) {
              final futures = (args[0] as Iterable).cast<Future>();
              return Future.any(futures.toList());
            }
          "doWhile#1": |
            (args) {
              final action = args[0] as Function;
              return Future.doWhile(() {
                final r = action();
                if (r is Future) return (r as Future).then((v) => v as bool);
                return r as bool;
              });
            }
          "forEach#2": |
            (args) {
              final elements = args[0] as Iterable;
              final action = args[1] as Function;
              return Future.forEach(elements, (e) => action(e));
            }
          "then#2": |
            (args) {
              final future = args[0] as Future;
              final onValue = args[1] as Function;
              final onError = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return future.then(
                (v) => onValue(v),
                onError: onError,
              );
            }
          "catchError#2": |
            (args) {
              final future = args[0] as Future;
              final onError = args[1] as Function;
              final test = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return future.catchError(
                onError,
                test: test != null ? (e) => test(e) as bool : null,
              );
            }
          "whenComplete#1": |
            (args) {
              final future = args[0] as Future;
              final action = args[1] as Function;
              return future.whenComplete(() => action() as FutureOr<void>);
            }
          "asStream#0": "(args) => (args[0] as Future).asStream()"
          "ignore#0": |
            (args) {
              (args[0] as Future).ignore();
              return null;
            }
          "timeout#2": |
            (args) {
              final future = args[0] as Future;
              final timeLimit = args[1] as Duration;
              final onTimeout = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              if (onTimeout != null) {
                return future.timeout(timeLimit, onTimeout: () => onTimeout());
              }
              return future.timeout(timeLimit);
            }


      # ── Stream ──────────────────────────────────────────────────────────
      Stream:
        extra_methods:
          # drain: must omit arg when absent, not pass null (typed streams reject null)
          "drain#1": |
            (args) {
              final stream = args[0] as Stream;
              if (identical(args[1], darticAbsent)) return stream.drain();
              return stream.drain(args[1]);
            }

      # ── _EmptyStream ────────────────────────────────────────────────────
      # #0 is the zero-arg constructor; #1 is needed because CFE adds a
      # type arg parameter for the generic class _EmptyStream<T>.
      _EmptyStream:
        extra_methods:
          "#0": "(args) => const Stream.empty()"
          "#1": "(args) => const Stream.empty()"
          "_#fromFields#1": "(args) => const Stream.empty()"


      # ── StreamController: constructors with callback wrapping ───────────
      StreamController:
        extra_methods:
          "#5": |
            (args) {
              final onListen =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final onPause =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final onResume =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              final onCancel =
                  identical(args[3], darticAbsent) ? null : args[3] as Function?;
              final sync =
                  identical(args[4], darticAbsent) ? false : args[4] as bool? ?? false;
              return StreamController<Object?>(
                onListen: onListen != null ? () => onListen() : null,
                onPause: onPause != null ? () => onPause() : null,
                onResume: onResume != null ? () => onResume() : null,
                onCancel: onCancel != null
                    ? () => onCancel() as FutureOr<void>
                    : null,
                sync: sync,
              );
            }
          "broadcast#3": |
            (args) {
              final onListen =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final onCancel =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final sync =
                  identical(args[2], darticAbsent) ? false : args[2] as bool? ?? false;
              return StreamController<Object?>.broadcast(
                onListen: onListen != null ? () => onListen() : null,
                onCancel: onCancel != null ? () => onCancel() : null,
                sync: sync,
              );
            }

      # ── _StreamHandlerTransformer ───────────────────────────────────────
      _StreamHandlerTransformer:
        extra_methods:
          "#3": |
            (args) {
              final handleData =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final handleError =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final handleDone =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return StreamTransformer.fromHandlers(
                handleData: handleData != null
                    ? (data, sink) => handleData(data, sink)
                    : null,
                handleError: handleError != null
                    ? (error, stackTrace, sink) =>
                        handleError(error, stackTrace, sink)
                    : null,
                handleDone: handleDone != null
                    ? (sink) => handleDone(sink)
                    : null,
              );
            }

      # ── _StreamSubscriptionTransformer ──────────────────────────────────
      _StreamSubscriptionTransformer:
        extra_methods:
          "#1": |
            (args) {
              final transformer = args[0] as Function;
              return StreamTransformer(
                (stream, cancelOnError) =>
                  transformer(stream, cancelOnError) as StreamSubscription,
              );
            }


      # ── _StreamIterator ─────────────────────────────────────────────────
      _StreamIterator:
        extra_methods:
          "#1": "(args) => StreamIterator(args[0] as Stream)"
          "moveNext#0": "(args) => (args[0] as StreamIterator).moveNext()"
          "cancel#0": "(args) => (args[0] as StreamIterator).cancel()"
          "current#0": "(args) => (args[0] as StreamIterator).current"
          "_subscription#0": "(args) => args[0]"



      # ── Zone ────────────────────────────────────────────────────────────
      # registerCallback/Unary/Binary: pass the closure proxy directly via
      # Function.apply to bypass the generic type parameter check (the proxy
      # is Object? Function() which fails the R Function() check). The
      # default zone returns the callback unchanged, so the proxy round-trips
      # and _unwrapClosureProxy recovers the DarticClosure for `is` checks.
      Zone:
        extra_methods:
          "registerCallback#1": |
            (args) => Function.apply(
              (args[0] as Zone).registerCallback,
              [args[1]],
            )
          "registerUnaryCallback#1": |
            (args) => Function.apply(
              (args[0] as Zone).registerUnaryCallback,
              [args[1]],
            )
          "registerBinaryCallback#1": |
            (args) => Function.apply(
              (args[0] as Zone).registerBinaryCallback,
              [args[1]],
            )

      # ── ZoneSpecification ───────────────────────────────────────────────
      # Methods are registered under both dart:async::ZoneSpecification:: and
      # dart:async::_ZoneSpecification:: namespaces (see _ZoneSpecification
      # internal type below).
      ZoneSpecification:
        extra_methods:
          "#13": |
            (args) {
              // Named params in _ZoneSpecification declaration order:
              // 0=handleUncaughtError, 1=run, 2=runUnary, 3=runBinary,
              // 4=registerCallback, 5=registerUnaryCallback, 6=registerBinaryCallback,
              // 7=errorCallback, 8=scheduleMicrotask, 9=createTimer,
              // 10=createPeriodicTimer, 11=print, 12=fork
              final handleUncaughtError =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final runFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final runUnaryFn =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              final runBinaryFn =
                  identical(args[3], darticAbsent) ? null : args[3] as Function?;
              final registerCallbackFn =
                  identical(args[4], darticAbsent) ? null : args[4] as Function?;
              final registerUnaryCallbackFn =
                  identical(args[5], darticAbsent) ? null : args[5] as Function?;
              final registerBinaryCallbackFn =
                  identical(args[6], darticAbsent) ? null : args[6] as Function?;
              final errorCallbackFn =
                  identical(args[7], darticAbsent) ? null : args[7] as Function?;
              final scheduleMicrotaskFn =
                  identical(args[8], darticAbsent) ? null : args[8] as Function?;
              final createTimerFn =
                  identical(args[9], darticAbsent) ? null : args[9] as Function?;
              final createPeriodicTimerFn =
                  identical(args[10], darticAbsent) ? null : args[10] as Function?;
              final printFn =
                  identical(args[11], darticAbsent) ? null : args[11] as Function?;
              final forkFn =
                  identical(args[12], darticAbsent) ? null : args[12] as Function?;

              return ZoneSpecification(
                handleUncaughtError: handleUncaughtError != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, Object error,
                            StackTrace stackTrace) =>
                        handleUncaughtError(
                            self, parent, zone, error, stackTrace)
                    : null,
                run: runFn != null
                    ? <R>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function() f) =>
                        runFn(self, parent, zone, f) as R
                    : null,
                runUnary: runUnaryFn != null
                    ? <R, T>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T) f, T arg) =>
                        runUnaryFn(self, parent, zone, f, arg) as R
                    : null,
                runBinary: runBinaryFn != null
                    ? <R, T1, T2>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T1, T2) f, T1 a1, T2 a2) =>
                        runBinaryFn(self, parent, zone, f, a1, a2) as R
                    : null,
                registerCallback: registerCallbackFn != null
                    ? <R>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function() f) {
                        final raw = registerCallbackFn(self, parent, zone, f);
                        // Wrap in typed lambda so `is R Function()` passes.
                        if (raw is Function) return () => raw() as R;
                        return raw as R Function();
                      }
                    : null,
                registerUnaryCallback: registerUnaryCallbackFn != null
                    ? <R, T>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T) f) {
                        final raw = registerUnaryCallbackFn(self, parent, zone, f);
                        if (raw is Function) return (T a) => raw(a) as R;
                        return raw as R Function(T);
                      }
                    : null,
                registerBinaryCallback: registerBinaryCallbackFn != null
                    ? <R, T1, T2>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T1, T2) f) {
                        final raw = registerBinaryCallbackFn(self, parent, zone, f);
                        if (raw is Function) return (T1 a, T2 b) => raw(a, b) as R;
                        return raw as R Function(T1, T2);
                      }
                    : null,
                errorCallback: errorCallbackFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, Object error,
                            StackTrace? stackTrace) =>
                        errorCallbackFn(self, parent, zone, error, stackTrace)
                            as AsyncError?
                    : null,
                scheduleMicrotask: scheduleMicrotaskFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            void Function() f) =>
                        scheduleMicrotaskFn(self, parent, zone, f)
                    : null,
                createTimer: createTimerFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            Duration duration, void Function() f) =>
                        createTimerFn(self, parent, zone, duration, f) as Timer
                    : null,
                createPeriodicTimer: createPeriodicTimerFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            Duration period, void Function(Timer) f) =>
                        createPeriodicTimerFn(self, parent, zone, period, f)
                            as Timer
                    : null,
                print: printFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, String line) =>
                        printFn(self, parent, zone, line)
                    : null,
                fork: forkFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            ZoneSpecification? specification,
                            Map<Object?, Object?>? zoneValues) =>
                        forkFn(self, parent, zone, specification, zoneValues)
                            as Zone
                    : null,
              );
            }

      # ── _ZoneSpecification ──────────────────────────────────────────────
      _ZoneSpecification:
        extra_methods:
          "#13": |
            (args) {
              // Named params in _ZoneSpecification declaration order:
              // 0=handleUncaughtError, 1=run, 2=runUnary, 3=runBinary,
              // 4=registerCallback, 5=registerUnaryCallback, 6=registerBinaryCallback,
              // 7=errorCallback, 8=scheduleMicrotask, 9=createTimer,
              // 10=createPeriodicTimer, 11=print, 12=fork
              final handleUncaughtError =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final runFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final runUnaryFn =
                  identical(args[2], darticAbsent) ? null : args[2] as Function?;
              final runBinaryFn =
                  identical(args[3], darticAbsent) ? null : args[3] as Function?;
              final registerCallbackFn =
                  identical(args[4], darticAbsent) ? null : args[4] as Function?;
              final registerUnaryCallbackFn =
                  identical(args[5], darticAbsent) ? null : args[5] as Function?;
              final registerBinaryCallbackFn =
                  identical(args[6], darticAbsent) ? null : args[6] as Function?;
              final errorCallbackFn =
                  identical(args[7], darticAbsent) ? null : args[7] as Function?;
              final scheduleMicrotaskFn =
                  identical(args[8], darticAbsent) ? null : args[8] as Function?;
              final createTimerFn =
                  identical(args[9], darticAbsent) ? null : args[9] as Function?;
              final createPeriodicTimerFn =
                  identical(args[10], darticAbsent) ? null : args[10] as Function?;
              final printFn =
                  identical(args[11], darticAbsent) ? null : args[11] as Function?;
              final forkFn =
                  identical(args[12], darticAbsent) ? null : args[12] as Function?;

              return ZoneSpecification(
                handleUncaughtError: handleUncaughtError != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, Object error,
                            StackTrace stackTrace) =>
                        handleUncaughtError(
                            self, parent, zone, error, stackTrace)
                    : null,
                run: runFn != null
                    ? <R>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function() f) =>
                        runFn(self, parent, zone, f) as R
                    : null,
                runUnary: runUnaryFn != null
                    ? <R, T>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T) f, T arg) =>
                        runUnaryFn(self, parent, zone, f, arg) as R
                    : null,
                runBinary: runBinaryFn != null
                    ? <R, T1, T2>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T1, T2) f, T1 a1, T2 a2) =>
                        runBinaryFn(self, parent, zone, f, a1, a2) as R
                    : null,
                registerCallback: registerCallbackFn != null
                    ? <R>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function() f) {
                        final raw = registerCallbackFn(self, parent, zone, f);
                        if (raw is Function) return () => raw() as R;
                        return raw as R Function();
                      }
                    : null,
                registerUnaryCallback: registerUnaryCallbackFn != null
                    ? <R, T>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T) f) {
                        final raw = registerUnaryCallbackFn(self, parent, zone, f);
                        if (raw is Function) return (T a) => raw(a) as R;
                        return raw as R Function(T);
                      }
                    : null,
                registerBinaryCallback: registerBinaryCallbackFn != null
                    ? <R, T1, T2>(Zone self, ZoneDelegate parent, Zone zone,
                            R Function(T1, T2) f) {
                        final raw = registerBinaryCallbackFn(self, parent, zone, f);
                        if (raw is Function) return (T1 a, T2 b) => raw(a, b) as R;
                        return raw as R Function(T1, T2);
                      }
                    : null,
                errorCallback: errorCallbackFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, Object error,
                            StackTrace? stackTrace) =>
                        errorCallbackFn(self, parent, zone, error, stackTrace)
                            as AsyncError?
                    : null,
                scheduleMicrotask: scheduleMicrotaskFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            void Function() f) =>
                        scheduleMicrotaskFn(self, parent, zone, f)
                    : null,
                createTimer: createTimerFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            Duration duration, void Function() f) =>
                        createTimerFn(self, parent, zone, duration, f) as Timer
                    : null,
                createPeriodicTimer: createPeriodicTimerFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            Duration period, void Function(Timer) f) =>
                        createPeriodicTimerFn(self, parent, zone, period, f)
                            as Timer
                    : null,
                print: printFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone, String line) =>
                        printFn(self, parent, zone, line)
                    : null,
                fork: forkFn != null
                    ? (Zone self, ZoneDelegate parent, Zone zone,
                            ZoneSpecification? specification,
                            Map<Object?, Object?>? zoneValues) =>
                        forkFn(self, parent, zone, specification, zoneValues)
                            as Zone
                    : null,
              );
            }

      # ── _RootZone: singleton, fromFields returns Zone.root ──────────────
      _RootZone:
        extra_methods:
          "_#fromFields#0": "(args) => Zone.root"


