# dart:collection bindings configuration for dartic code generator.
#
# Types covered:
#   1. LinkedHashMap — from, of, _fromEntries + _compact_hash::_Map::#0 (extra_bindings)
#   2. LinkedHashSet — from, of + _compact_hash::_Set::#0 (extra_bindings)
#   3. HashMap — constructor with callback wrapping, from, of
#   4. HashSet — constructor with callback wrapping, from, of
#   5. ListQueue — constructor with optional capacity
#   6. Queue — from, of, instance methods
#   7. SplayTreeMap — constructor with callback wrapping, from, instance methods
#   8. SplayTreeSet — constructor with callback wrapping, from, instance methods
#   9. UnmodifiableListView — constructor, [], length, iterator
#  10. UnmodifiableMapView — constructor, [], length, keys, values, containsKey
#  11. UnmodifiableSetView — constructor, length, contains, iterator, lookup, toSet
#
# Note: dart:_compact_hash::_Map::#0 and _Set::#0 are registered via
# extra_bindings on LinkedHashMap and LinkedHashSet respectively.
#
# Note: Some dart:collection::LinkedHashMap bindings overlap with dart:core's
# Map internal types — this is intentional for coverage completeness.

output_bindings: "../lib/src/bindings/collection"
output_plugins: "../lib/src/plugins"

libraries:
  - uri: dart:collection
    discover: all
    classes:
      - name: ListBase
        bridge: true
      - name: MapBase
        bridge: true
        internal_types:
          - _MapBaseValueIterable
      - name: SetBase
        bridge: true
      - DoubleLinkedQueueEntry
      # Cross-namespace: UnmodifiableMapBase from dart:_internal
      - UnmodifiableMapBase

    overrides:

      # ── LinkedHashMap: custom constructors + _compact_hash cross-namespace ──
      # #0 creates an empty LinkedHashMap (used by _compact_hash::_Map cross-binding)
      LinkedHashMap:
        extra_methods:
          "#0": "(args) => LinkedHashMap<Object?, Object?>()"
          "#3": |
            (args) {
              final equals = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final hashCodeFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return LinkedHashMap<Object?, Object?>(
                equals: equals != null ? (a, b) => equals(a, b) as bool : null,
                hashCode:
                    hashCodeFn != null ? (k) => hashCodeFn(k) as int : null,
                isValidKey:
                    isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#1": "(args) => LinkedHashMap.from(args[0] as Map)"
          "of#1": "(args) => LinkedHashMap.of(args[0] as Map)"
          "_fromEntries#1": "(args) => Map.fromEntries((args[0] as Iterable).cast<MapEntry>())"
          "fromIterable#3": |
            (args) {
              final key = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final value = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return LinkedHashMap.fromIterable(
                args[0] as Iterable,
                key: key != null ? (e) => key(e) : null,
                value: value != null ? (e) => value(e) : null,
              );
            }
          "fromIterables#2": "(args) => LinkedHashMap.fromIterables(args[0] as Iterable, args[1] as Iterable)"
          "identity#0": "(args) => LinkedHashMap.identity()"
        extra_bindings:
          - "dart:_compact_hash::_Map::#0"

      # ── LinkedHashSet: custom constructors + _compact_hash cross-namespace ──
      # #0 creates an empty LinkedHashSet (used by _compact_hash::_Set cross-binding)
      LinkedHashSet:
        extra_methods:
          "#0": "(args) => LinkedHashSet<Object?>()"
          "#3": |
            (args) {
              final equals = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final hashCodeFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return LinkedHashSet<Object?>(
                equals: equals != null ? (a, b) => equals(a, b) as bool : null,
                hashCode: hashCodeFn != null ? (k) => hashCodeFn(k) as int : null,
                isValidKey: isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#1": "(args) => LinkedHashSet.from(args[0] as Iterable)"
          "of#1": "(args) => LinkedHashSet.of(args[0] as Iterable)"
          "identity#0": "(args) => Set.identity()"
        extra_bindings:
          - "dart:_compact_hash::_Set::#0"

      # ── HashMap: constructor with callback wrapping ──
      HashMap:
        extra_methods:
          "#3": |
            (args) {
              final equals = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final hashCodeFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return HashMap<Object?, Object?>(
                equals: equals != null ? (a, b) => equals(a, b) as bool : null,
                hashCode:
                    hashCodeFn != null ? (k) => hashCodeFn(k) as int : null,
                isValidKey:
                    isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#1": "(args) => HashMap.from(args[0] as Map)"
          "of#1": "(args) => HashMap.of(args[0] as Map)"
          "fromIterable#3": |
            (args) {
              final key = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final value = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return HashMap.fromIterable(
                args[0] as Iterable,
                key: key != null ? (e) => key(e) : null,
                value: value != null ? (e) => value(e) : null,
              );
            }
          "fromIterables#2": "(args) => HashMap.fromIterables(args[0] as Iterable, args[1] as Iterable)"
          "identity#0": "(args) => HashMap.identity()"

      # ── HashSet: constructor with callback wrapping ──
      HashSet:
        extra_methods:
          "#3": |
            (args) {
              final equals = identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final hashCodeFn = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return HashSet<Object?>(
                equals: equals != null ? (a, b) => equals(a, b) as bool : null,
                hashCode:
                    hashCodeFn != null ? (e) => hashCodeFn(e) as int : null,
                isValidKey:
                    isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#1": "(args) => HashSet.from(args[0] as Iterable)"
          "of#1": "(args) => HashSet.of(args[0] as Iterable)"
          "identity#0": "(args) => HashSet.identity()"

      # ── ListQueue: constructor with optional capacity ──
      ListQueue:
        extra_methods:
          "#1": |
            (args) {
              if (!identical(args[0], darticAbsent)) {
                return ListQueue<Object?>(args[0] as int);
              }
              return ListQueue<Object?>();
            }

      # ── Queue: interface methods ──
      Queue:
        extra_methods:
          "from#1": "(args) => Queue.from(args[0] as Iterable)"
          "of#1": "(args) => Queue.of(args[0] as Iterable)"

      # ── SplayTreeMap: constructor with callback wrapping ──
      SplayTreeMap:
        extra_methods:
          "#2": |
            (args) {
              final compare =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final isValidKey =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              return SplayTreeMap<Object?, Object?>(
                compare != null ? (a, b) => compare(a, b) as int : null,
                isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#3": |
            (args) {
              final compare = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return SplayTreeMap.from(
                args[0] as Map,
                compare != null ? (a, b) => compare(a, b) as int : null,
                isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }

      # ── SplayTreeSet: constructor with callback wrapping ──
      SplayTreeSet:
        extra_methods:
          "#2": |
            (args) {
              final compare =
                  identical(args[0], darticAbsent) ? null : args[0] as Function?;
              final isValidKey =
                  identical(args[1], darticAbsent) ? null : args[1] as Function?;
              return SplayTreeSet<Object?>(
                compare != null ? (a, b) => compare(a, b) as int : null,
                isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
          "from#3": |
            (args) {
              final compare = identical(args[1], darticAbsent) ? null : args[1] as Function?;
              final isValidKey = identical(args[2], darticAbsent) ? null : args[2] as Function?;
              return SplayTreeSet.from(
                args[0] as Iterable,
                compare != null ? (a, b) => compare(a, b) as int : null,
                isValidKey != null ? (k) => isValidKey(k) as bool : null,
              );
            }
        extra_bindings:
          - "dart:collection::_SplayTreeSet&_SplayTree&Iterable&SetMixin::elementAt#1"

      # ── UnmodifiableListView ──
      # extra_bindings registers UnmodifiableListBase methods (dart:_internal)
      # under the correct namespace. The closures come from the auto-generated
      # methodMap (all inherited from UnmodifiableListBase).
      UnmodifiableListView:
        extra_methods:
          "#1": "(args) => UnmodifiableListView(args[0] as Iterable)"
        extra_bindings:
          # UnmodifiableListBase write methods (all throw UnsupportedError)
          - "dart:_internal::UnmodifiableListBase::[]=#2"
          - "dart:_internal::UnmodifiableListBase::length=#1"
          - "dart:_internal::UnmodifiableListBase::first=#1"
          - "dart:_internal::UnmodifiableListBase::last=#1"
          - "dart:_internal::UnmodifiableListBase::setAll#2"
          - "dart:_internal::UnmodifiableListBase::add#1"
          - "dart:_internal::UnmodifiableListBase::insert#2"
          - "dart:_internal::UnmodifiableListBase::insertAll#2"
          - "dart:_internal::UnmodifiableListBase::addAll#1"
          - "dart:_internal::UnmodifiableListBase::remove#1"
          - "dart:_internal::UnmodifiableListBase::removeWhere#1"
          - "dart:_internal::UnmodifiableListBase::retainWhere#1"
          - "dart:_internal::UnmodifiableListBase::sort#1"
          - "dart:_internal::UnmodifiableListBase::shuffle#1"
          - "dart:_internal::UnmodifiableListBase::clear#0"
          - "dart:_internal::UnmodifiableListBase::removeAt#1"
          - "dart:_internal::UnmodifiableListBase::removeLast#0"
          - "dart:_internal::UnmodifiableListBase::setRange#4"
          - "dart:_internal::UnmodifiableListBase::removeRange#2"
          - "dart:_internal::UnmodifiableListBase::replaceRange#3"
          - "dart:_internal::UnmodifiableListBase::fillRange#3"
          # UnmodifiableListMixin (same methods, different mixin app name)
          - "dart:_internal::UnmodifiableListMixin::[]=#2"
          - "dart:_internal::UnmodifiableListMixin::length=#1"
          - "dart:_internal::UnmodifiableListMixin::first=#1"
          - "dart:_internal::UnmodifiableListMixin::last=#1"
          - "dart:_internal::UnmodifiableListMixin::setAll#2"
          - "dart:_internal::UnmodifiableListMixin::add#1"
          - "dart:_internal::UnmodifiableListMixin::insert#2"
          - "dart:_internal::UnmodifiableListMixin::insertAll#2"
          - "dart:_internal::UnmodifiableListMixin::addAll#1"
          - "dart:_internal::UnmodifiableListMixin::remove#1"
          - "dart:_internal::UnmodifiableListMixin::removeWhere#1"
          - "dart:_internal::UnmodifiableListMixin::retainWhere#1"
          - "dart:_internal::UnmodifiableListMixin::sort#1"
          - "dart:_internal::UnmodifiableListMixin::shuffle#1"
          - "dart:_internal::UnmodifiableListMixin::clear#0"
          - "dart:_internal::UnmodifiableListMixin::removeAt#1"
          - "dart:_internal::UnmodifiableListMixin::removeLast#0"
          - "dart:_internal::UnmodifiableListMixin::setRange#4"
          - "dart:_internal::UnmodifiableListMixin::removeRange#2"
          - "dart:_internal::UnmodifiableListMixin::replaceRange#3"
          - "dart:_internal::UnmodifiableListMixin::fillRange#3"

      # ── UnmodifiableMapView ──
      # extra_bindings registers UnmodifiableMapBase methods (dart:_internal)
      UnmodifiableMapView:
        extra_methods:
          "#1": "(args) => UnmodifiableMapView(args[0] as Map)"
        extra_bindings:
          # UnmodifiableMapBase write methods (all throw UnsupportedError)
          - "dart:_internal::UnmodifiableMapBase::[]=#2"
          - "dart:_internal::UnmodifiableMapBase::addAll#1"
          - "dart:_internal::UnmodifiableMapBase::clear#0"
          - "dart:_internal::UnmodifiableMapBase::putIfAbsent#2"
          - "dart:_internal::UnmodifiableMapBase::remove#1"
          - "dart:_internal::UnmodifiableMapBase::update#3"
          - "dart:_internal::UnmodifiableMapBase::updateAll#1"
          - "dart:_internal::UnmodifiableMapBase::removeWhere#1"
          - "dart:_internal::UnmodifiableMapBase::addEntries#1"
          # UnmodifiableMapMixin (same methods, different mixin app)
          - "dart:_internal::UnmodifiableMapMixin::[]=#2"
          - "dart:_internal::UnmodifiableMapMixin::addAll#1"
          - "dart:_internal::UnmodifiableMapMixin::clear#0"
          - "dart:_internal::UnmodifiableMapMixin::putIfAbsent#2"
          - "dart:_internal::UnmodifiableMapMixin::remove#1"
          - "dart:_internal::UnmodifiableMapMixin::update#3"
          - "dart:_internal::UnmodifiableMapMixin::updateAll#1"
          - "dart:_internal::UnmodifiableMapMixin::removeWhere#1"
          - "dart:_internal::UnmodifiableMapMixin::addEntries#1"
          # Synthetic mixin application class (name contains &, can't be internal_type)
          - "dart:collection::_UnmodifiableMapView&MapView&_UnmodifiableMapMixin::addAll#1"
          - "dart:collection::_UnmodifiableMapView&MapView&_UnmodifiableMapMixin::clear#0"
          - "dart:collection::_UnmodifiableMapView&MapView&_UnmodifiableMapMixin::[]=#2"
          - "dart:collection::_UnmodifiableMapView&MapView&_UnmodifiableMapMixin::putIfAbsent#2"
          - "dart:collection::_UnmodifiableMapView&MapView&_UnmodifiableMapMixin::remove#1"

      # ── UnmodifiableSetView ──
      UnmodifiableSetView:
        extra_methods:
          "#1": "(args) => UnmodifiableSetView(args[0] as Set)"

      # ── ListBase: private helper methods called by sort/remove/etc. ──
      ListBase:
        extra_methods:
          "_closeGap#2": "(args) => null"
          "_compareAny#2": "(args) => Comparable.compare(args[0] as Comparable, args[1] as Comparable)"
          "_filter#2": |
            (args) {
              (args[0] as List).removeWhere(args[1] as bool Function(dynamic));
              return null;
            }

      # ── MapBase: abstract, gen auto-discovers all methods ──
      # No extra_methods needed.

      # ── _MapBaseValueIterable: private class returned by MapBase.values ──
      _MapBaseValueIterable:
        extra_methods:
          "#1": "(args) => (args[0] as Map).values"

      # ── UnmodifiableMapBase: cross-namespace for dart:_internal ──
      UnmodifiableMapBase:
        extra_methods:
          "addAll#1": |
            (args) { (args[0] as Map).addAll(args[1] as Map); return null; }
          "clear#0": |
            (args) { (args[0] as Map).clear(); return null; }
          "[]=#2": |
            (args) { (args[0] as Map)[args[1]] = args[2]; return args[2]; }
          "putIfAbsent#2": "(args) => (args[0] as Map).putIfAbsent(args[1], () => (args[2] as Function)())"
          "remove#1": "(args) => (args[0] as Map).remove(args[1])"

      # ── DoubleLinkedQueueEntry: gen auto-discovers public methods ──

      # ── LinkedList: constructor + forEach callback wrapping ──
      # LinkedList<E extends LinkedListEntry<E>> has recursive F-bound.
      # Must use explicit type arg to avoid inference failure.
      LinkedList:
        extra_methods:
          "#0": "(args) => LinkedList<Never>()"

      # NOTE: LinkedListEntry.element doesn't exist — element is on
      # DoubleLinkedQueueEntry, which gets auto-discovered by gen tool.

      # ── HasNextIterator: constructor ──
      HasNextIterator:
        extra_methods:
          "#1": "(args) => HasNextIterator(args[0] as Iterator)"

      # ── DoubleLinkedQueue: constructors + Queue methods + callback methods ──
      DoubleLinkedQueue:
        extra_methods:
          "#0": "(args) => DoubleLinkedQueue()"
          "from#1": "(args) => DoubleLinkedQueue.from(args[0] as Iterable)"
          "of#1": "(args) => DoubleLinkedQueue.of(args[0] as Iterable)"
          # _DoubleLinkedQueueIterator: private class, methods go here
          "moveNext#0": "(args) => (args[0] as Iterator).moveNext()"
          "current#0": "(args) => (args[0] as Iterator).current"
        extra_bindings:
          # _DoubleLinkedQueueIterator private class
          - "dart:collection::_DoubleLinkedQueueIterator::moveNext#0"
          - "dart:collection::_DoubleLinkedQueueIterator::current#0"

