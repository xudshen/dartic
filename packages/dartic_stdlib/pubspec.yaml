name: dartic_stdlib
description: >-
  Dart standard library bindings (dart:core, dart:async, dart:collection,
  dart:math) for the dartic bytecode interpreter.
version: 0.1.0
repository: https://github.com/xudshen/dartic/tree/main/packages/dartic_stdlib

environment:
  sdk: ^3.10.7

dependencies:
  dartic:
    path: ../../

dartic:
  role: plugin

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
