name: dartic
description: A Dart bytecode interpreter.
version: 1.0.0
publish_to: none
repository: https://github.com/xudshen/dartic.git

environment:
  sdk: ^3.10.7

dependencies:
  kernel:
    path: vendor/dart-sdk/pkg/kernel
  meta: ^1.11.0
  yaml: ^3.1.3

dev_dependencies:
  dartic_stdlib:
    path: packages/dartic_stdlib
  lints: ^6.0.0
  test: ^1.25.6
  front_end:
    path: vendor/dart-sdk/pkg/front_end
  vm:
    path: vendor/dart-sdk/pkg/vm
  _fe_analyzer_shared:
    path: vendor/dart-sdk/pkg/_fe_analyzer_shared

dependency_overrides:
  kernel:
    path: vendor/dart-sdk/pkg/kernel
  front_end:
    path: vendor/dart-sdk/pkg/front_end
  vm:
    path: vendor/dart-sdk/pkg/vm
  build_integration:
    path: vendor/dart-sdk/pkg/build_integration
  _fe_analyzer_shared:
    path: vendor/dart-sdk/pkg/_fe_analyzer_shared
  analyzer:
    path: vendor/dart-sdk/pkg/analyzer