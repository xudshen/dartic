# dart:core bindings configuration for dartic code generator.
#
# This file drives code generation for ALL dart:core types currently registered
# in the hand-written binding files. The generator uses this YAML + dart analyzer
# to produce equivalent .g.dart files.
#
# Types are organized by category:
#   1. Non-generic types (type-only dispatcher, no test needed)
#   2. Generic/polymorphic types (dispatcher + test predicate)
#   3. Binding-only types (no dispatcher needed)
#   4. Error/Exception hierarchy
#   5. Misc types (Stopwatch, StackTrace, Symbol, Expando, MapEntry, etc.)
#   6. RegExp/Match/RegExpMatch
#   7. Runes/RuneIterator
#   8. BigInt, DateTime, StringBuffer, Uri, Invocation

output_bindings: "../lib/src/bridge/bindings"
output_plugins: "../lib/src/bridge/plugins"

libraries:
  - uri: dart:core
    classes:
      # ── Non-generic types (type-only dispatcher, no test needed) ──────

      # int -- dispatcher prefix chain: int, num
      - int

      # double -- dispatcher prefix chain: double, num
      - double

      # String (also registers Pattern bindings separately)
      - String

      # bool
      - bool

      # Duration (non-final, bridgeable)
      - name: Duration
        bridge: true

      # ── Generic/polymorphic types (need test predicate) ──────────────
      # NOTE: Supertypes MUST come before subtypes here. The dispatch
      # registry uses reverse-order predicate scan, so later registrations
      # take priority. If Iterable (supertype) is registered after List,
      # `[1,2,3] is Iterable` matches first, binding the wrong dispatcher.

      # Iterable -- registered first so subtypes (List, Set) take priority
      - Iterable

      # List -- dispatcher prefix chain: List, _GrowableList, Iterable
      - name: List
        internal_types:
          - _GrowableList
          - _List

      # Map -- dispatcher prefix chain: Map, LinkedHashMap
      - name: Map
        internal_types:
          - name: LinkedHashMap
            source: dart:collection

      # Set -- dispatcher prefix chain: Set, _Set, Iterable
      - name: Set
        internal_types:
          - name: _Set
            source: "dart:_compact_hash"

      # Invocation
      - Invocation

      # ── Binding-only types (no dispatcher needed) ────────────────────

      # num -- no runtime instances; int/double dispatchers handle via superclasses
      - num

      # Object -- too generic as dispatcher (all types match)
      - Object

      # Type -- no dispatcher, just bindings
      - Type

      # _Enum -- abstract base for enums, no dispatcher
      - name: Enum
        source_name: _Enum

      # Function -- no dispatcher for Function instances
      - Function

      # Iterator -- abstract, no dispatcher
      - Iterator

      # ── Error/Exception hierarchy ────────────────────────────────────
      # Non-final error/exception types get bridge: true so scripts can
      # define custom error/exception subclasses.

      - name: Error
        bridge: true
      - name: ArgumentError
        bridge: true
      - name: RangeError
        bridge: true
      - name: IndexError
        bridge: true
      - name: StateError
        bridge: true
      - name: UnsupportedError
        bridge: true
      - name: UnimplementedError
        bridge: true
      - name: FormatException
        bridge: true
      - name: Exception
        bridge: true
      - name: ConcurrentModificationError
        bridge: true
      - StackOverflowError
      - name: AssertionError
        bridge: true
      - name: TypeError
        bridge: true
      - NoSuchMethodError  # factory-only constructors, can't be bridged

      # ── Misc types ──────────────────────────────────────────────────

      - name: Stopwatch
        bridge: true
      - StackTrace
      - name: _StringStackTrace
        source_name: _StringStackTrace
      - Symbol
      - Expando
      - MapEntry

      # ── Pattern (String implements Pattern, Kernel may resolve to Pattern::) ──

      - Pattern

      # ── RegExp / Match / RegExpMatch ─────────────────────────────────

      - RegExp
      - Match
      - RegExpMatch

      # ── Runes / RuneIterator ─────────────────────────────────────────

      - Runes
      - RuneIterator

      # ── Standalone types ─────────────────────────────────────────────

      - BigInt
      - DateTime
      - StringBuffer
      - Uri

    # ── Top-level functions ──────────────────────────────────────────────

    functions:
      - identical

      - name: print
        arity: 1
        custom: |
          (args) {
            (ctx.config.onPrint ?? print)(args[0]);
            return null;
          }

      # EnumName|get#name -- extension getter used by .name on enums
      - name: "EnumName|get#name"
        arity: 1
        custom: |
          (args) {
            final obj = args[0] as DarticObject;
            return obj.refFields[0] as String;
          }

    # ── Overrides (things the analyzer can't auto-discover) ──────────────

    overrides:

      # ── Object: null-safe toString ──
      Object:
        extra_methods:
          "toString#0": "(args) => args[0].toString()"
          "hashCode#0": "(args) => args[0].hashCode"
          "==#1": "(args) => args[0] == args[1]"

      # ── _GrowableList: VM-internal literal constructors ──
      _GrowableList:
        extra_methods:
          "cast#0": "(args) => (args[0] as List).cast()"
          "#1": "(args) => List<dynamic>.filled(args[0] as int, null, growable: true)"
          "_literal1#1": "(args) => <dynamic>[args[0]]"
          "_literal2#2": "(args) => <dynamic>[args[0], args[1]]"
          "_literal3#3": "(args) => <dynamic>[args[0], args[1], args[2]]"
          "_literal4#4": "(args) => <dynamic>[args[0], args[1], args[2], args[3]]"
          "_literal5#5": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4]]"
          "_literal6#6": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5]]"
          "_literal7#7": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5], args[6]]"
          "_literal8#8": "(args) => <dynamic>[args[0], args[1], args[2], args[3], args[4], args[5], args[6], args[7]]"
          "_literal#1": "(args) => List<dynamic>.from(args[0] as List)"
          "filled#2": "(args) => List<dynamic>.filled(args[0] as int, args[1], growable: true)"
          "empty#0": "(args) => <dynamic>[]"
          "generate#3": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              if (args.length > 2 && args[2] != null) {
                return List.generate(length, (i) => generator(i), growable: args[2] as bool);
              }
              return List.generate(length, (i) => generator(i));
            }
          "generate#2": |
            (args) {
              final length = args[0] as int;
              final generator = args[1] as Function;
              return List.generate(length, (i) => generator(i));
            }

      # ── _List: VM-internal fixed-length list constructors ──
      _List:
        extra_methods:
          "filled#2": "(args) => List<dynamic>.filled(args[0] as int, args[1], growable: false)"
          "#1": "(args) => List<dynamic>.filled(args[0] as int, null, growable: false)"

      # ── _Set: VM-internal compact set constructor ──
      _Set:
        extra_methods:
          "#0": "(args) => <dynamic>{}"
          "add#1": "(args) => (args[0] as Set).add(args[1])"
          "cast#0": "(args) => (args[0] as Set).cast()"

      # ── LinkedHashMap: CFE lowers map literals to LinkedHashMap ──
      LinkedHashMap:
        extra_methods:
          "of#1": "(args) => LinkedHashMap<dynamic, dynamic>.of(args[0] as Map)"
          "#0": "(args) => <dynamic, dynamic>{}"

      # ── Pattern: String implements Pattern, registered separately ──
      Pattern:
        extra_methods:
          "allMatches#2": |
            (args) {
              final self = args[0] as String;
              final string = args[1] as String;
              final start = (args.length > 2 && args[2] != null) ? args[2] as int : 0;
              return self.allMatches(string, start);
            }
          "matchAsPrefix#2": |
            (args) {
              final self = args[0] as String;
              final string = args[1] as String;
              final start = (args.length > 2 && args[2] != null) ? args[2] as int : 0;
              return self.matchAsPrefix(string, start);
            }

      # ── Symbol: cross-namespace binding (dart:_internal) ──
      Symbol:
        extra_methods:
          "#1": "(args) => Symbol(args[0] as String)"
          "==#1": "(args) => args[0] == args[1]"
          "toString#0": "(args) => args[0].toString()"
        extra_bindings:
          - "dart:_internal::Symbol::#1"

      # ── _StringStackTrace: internal StackTrace implementation ──
      _StringStackTrace:
        extra_methods:
          "#1": "(args) => StackTrace.fromString(args[0] as String)"

      # ── _Enum: DarticObject field accessors ──
      _Enum:
        extra_methods:
          "index#0": |
            (args) {
              final obj = args[0] as DarticObject;
              return obj.valueFields[0];
            }
          "_name#0": |
            (args) {
              final obj = args[0] as DarticObject;
              return obj.refFields[0] as String;
            }

      # ── Error: uses custom _DarticErrorBacking for constructor ──
      Error:
        preamble: |
          /// Minimal concrete Error subclass used as host backing for
          /// interpreter-defined Error subclasses.
          class _DarticErrorBacking extends Error {
            @override
            String toString() => 'Error';
          }
        extra_methods:
          "#0": "(args) => _DarticErrorBacking()"
          "toString#0": "(args) => (args[0] as Error).toString()"

      # ── ArgumentError: constructor variants with optional params ──
      ArgumentError:
        extra_methods:
          "#1": "(args) => ArgumentError(args[0])"
          "value#1": "(args) => ArgumentError.value(args[0])"
          "value#2": "(args) => ArgumentError.value(args[0], args[1] as String?)"
          "value#3": "(args) => ArgumentError.value(args[0], args[1] as String?, args[2])"

      # ── RangeError: factory constructors with optional params ──
      # extra_bindings override auto-generated registerBinding calls that
      # don't handle optional params (hard args[N] indexing).
      RangeError:
        extra_methods:
          "toString#0": "(args) => (args[0] as RangeError).toString()"
          "value#3": |
            (args) => RangeError.value(
              args[0] as num,
              args.length > 1 ? args[1] as String? : null,
              args.length > 2 ? args[2] as String? : null,
            )
          "range#5": |
            (args) => RangeError.range(
              args[0] as int,
              args[1] as int?,
              args[2] as int?,
              args.length > 3 ? args[3] as String? : null,
              args.length > 4 ? args[4] as String? : null,
            )
          "index#5": |
            (args) => RangeError.index(
              args[0] as int,
              args[1],
              args.length > 2 ? args[2] as String? : null,
              args.length > 3 ? args[3] as String? : null,
              args.length > 4 ? args[4] as int? : null,
            )
          "checkValidIndex#5": |
            (args) => RangeError.checkValidIndex(
              args[0] as int,
              args[1],
              args.length > 2 ? args[2] as String? : null,
              args.length > 3 ? args[3] as int? : null,
              args.length > 4 ? args[4] as String? : null,
            )
          "checkValidRange#6": |
            (args) => RangeError.checkValidRange(
              args[0] as int,
              args[1] as int?,
              args[2] as int,
              args.length > 3 ? args[3] as String? : null,
              args.length > 4 ? args[4] as String? : null,
              args.length > 5 ? args[5] as String? : null,
            )
          "checkNotNegative#3": |
            (args) => RangeError.checkNotNegative(
              args[0] as int,
              args.length > 1 ? args[1] as String? : null,
              args.length > 2 ? args[2] as String? : null,
            )
        extra_bindings:
          - "dart:core::RangeError::value#3"
          - "dart:core::RangeError::range#5"
          - "dart:core::RangeError::index#5"
          - "dart:core::RangeError::checkValidIndex#5"
          - "dart:core::RangeError::checkValidRange#6"
          - "dart:core::RangeError::checkNotNegative#3"

      # ── IndexError: constructor with optional params ──
      IndexError:
        extra_methods:
          "toString#0": "(args) => (args[0] as IndexError).toString()"
          "#5": |
            (args) => IndexError(
              args[0] as int,
              args[1],
              args.length > 2 ? args[2] as String? : null,
              args.length > 3 ? args[3] as String? : null,
              args.length > 4 ? args[4] as int? : null,
            )
        extra_bindings:
          - "dart:core::IndexError::#5"

      # ── FormatException: constructor with optional params ──
      FormatException:
        extra_methods:
          "#3": |
            (args) {
              final msg = args.isNotEmpty && args[0] != null ? args[0] as String : '';
              final source = args.length > 1 ? args[1] : null;
              final offset = args.length > 2 ? args[2] as int? : null;
              return FormatException(msg, source, offset);
            }

      # ── TypeError: toString ──
      TypeError:
        extra_methods:
          "toString#0": "(args) => (args[0] as TypeError).toString()"

      # ── Exception: constructor and toString ──
      Exception:
        extra_methods:
          "#1": "(args) => Exception(args.isNotEmpty ? args[0] : null)"
          "toString#0": "(args) => args[0].toString()"

      # ── MapEntry: private constructor variant ──
      MapEntry:
        extra_methods:
          "_#2": "(args) => MapEntry(args[0], args[1])"

      # ── Duration: constructor with all-named params + internal variant ──
      Duration:
        extra_methods:
          "#6": |
            (args) => Duration(
              days: args[0] != null ? args[0] as int : 0,
              hours: args[1] != null ? args[1] as int : 0,
              minutes: args[2] != null ? args[2] as int : 0,
              seconds: args[3] != null ? args[3] as int : 0,
              milliseconds: args[4] != null ? args[4] as int : 0,
              microseconds: args[5] != null ? args[5] as int : 0,
            )
          "_#fromFields#1": "(args) => Duration(microseconds: args[0] as int)"

      # ── int: parse with deprecated onError (Kernel compiles to arity 3) ──
      int:
        extra_methods:
          "parse#3": |
            (args) {
              final source = args[0] as String;
              if (args.length > 1 && args[1] != null) {
                return int.parse(source, radix: args[1] as int);
              }
              return int.parse(source);
            }

      # ── BigInt: factory constructor + inherited methods ──
      BigInt:
        extra_methods:
          "from#1": "(args) => BigInt.from(args[0] as num)"
          "==#1": "(args) => args[0] == args[1]"
          "hashCode#0": "(args) => (args[0] as BigInt).hashCode"

      # ── RegExp: constructor + inherited + optional param methods ──
      RegExp:
        extra_methods:
          "#5": |
            (args) => RegExp(
              args[0] as String,
              multiLine: args.length > 1 && args[1] != null ? args[1] as bool : false,
              caseSensitive: args.length > 2 && args[2] != null ? args[2] as bool : true,
              unicode: args.length > 3 && args[3] != null ? args[3] as bool : false,
              dotAll: args.length > 4 && args[4] != null ? args[4] as bool : false,
            )
          "hashCode#0": "(args) => (args[0] as RegExp).hashCode"
          "toString#0": "(args) => (args[0] as RegExp).toString()"
          "allMatches#2": |
            (args) {
              final re = args[0] as RegExp;
              final str = args[1] as String;
              if (args.length > 2 && args[2] != null) {
                return re.allMatches(str, args[2] as int);
              }
              return re.allMatches(str);
            }
          "matchAsPrefix#2": |
            (args) {
              final re = args[0] as RegExp;
              final str = args[1] as String;
              if (args.length > 2 && args[2] != null) {
                return re.matchAsPrefix(str, args[2] as int);
              }
              return re.matchAsPrefix(str);
            }

      # ── Iterable: generate factory + callback methods + optional params ──
      Iterable:
        extra_methods:
          "generate#2": |
            (args) {
              final count = args[0] as int;
              if (args.length > 1 && args[1] != null) {
                final generator = args[1] as Function;
                return Iterable.generate(count, (i) => generator(i));
              }
              return Iterable.generate(count);
            }
          "toList#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as Iterable).toList(growable: args[1] as bool);
              }
              return (args[0] as Iterable).toList();
            }
          "join#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as Iterable).join(args[1] as String);
              }
              return (args[0] as Iterable).join();
            }
          "where#1": |
            (args) {
              final fn = args[1] as Function;
              return (args[0] as Iterable).where((e) => fn(e) as bool);
            }
          "map#1": |
            (args) {
              final fn = args[1] as Function;
              return (args[0] as Iterable).map((e) => fn(e));
            }
          "expand#1": "(args) => (args[0] as Iterable).expand((e) => (args[1] as Function)(e) as Iterable)"
          "firstWhere#2": |
            (args) {
              final fn = args[1] as Function;
              if (args.length > 2 && args[2] != null) {
                final orElse = args[2] as Function;
                return (args[0] as Iterable).firstWhere((e) => fn(e) as bool, orElse: () => orElse());
              }
              return (args[0] as Iterable).firstWhere((e) => fn(e) as bool);
            }
          "lastWhere#2": |
            (args) {
              final fn = args[1] as Function;
              if (args.length > 2 && args[2] != null) {
                final orElse = args[2] as Function;
                return (args[0] as Iterable).lastWhere((e) => fn(e) as bool, orElse: () => orElse());
              }
              return (args[0] as Iterable).lastWhere((e) => fn(e) as bool);
            }
          "singleWhere#2": |
            (args) {
              final fn = args[1] as Function;
              if (args.length > 2 && args[2] != null) {
                final orElse = args[2] as Function;
                return (args[0] as Iterable).singleWhere((e) => fn(e) as bool, orElse: () => orElse());
              }
              return (args[0] as Iterable).singleWhere((e) => fn(e) as bool);
            }
          "takeWhile#1": "(args) => (args[0] as Iterable).takeWhile((e) => (args[1] as Function)(e) as bool)"
          "skipWhile#1": "(args) => (args[0] as Iterable).skipWhile((e) => (args[1] as Function)(e) as bool)"
          "followedBy#1": "(args) => (args[0] as Iterable).followedBy(args[1] as Iterable)"
          "reduce#1": |
            (args) {
              final fn = args[1] as Function;
              final iter = (args[0] as Iterable).iterator;
              if (!iter.moveNext()) throw StateError('No element');
              var value = iter.current;
              while (iter.moveNext()) {
                value = fn(value, iter.current);
              }
              return value;
            }

      # ── List: optional param methods ──
      List:
        extra_methods:
          "indexOf#2": |
            (args) {
              final list = args[0] as List;
              if (args.length > 2 && args[2] != null) {
                return list.indexOf(args[1], args[2] as int);
              }
              return list.indexOf(args[1]);
            }
          "lastIndexOf#2": |
            (args) {
              final list = args[0] as List;
              if (args.length > 2 && args[2] != null) {
                return list.lastIndexOf(args[1], args[2] as int);
              }
              return list.lastIndexOf(args[1]);
            }
          "toList#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as List).toList(growable: args[1] as bool);
              }
              return (args[0] as List).toList();
            }
          "join#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as List).join(args[1] as String);
              }
              return (args[0] as List).join();
            }

      # ── Map: fromEntries + callback methods + toString ──
      Map:
        extra_methods:
          "fromEntries#1": "(args) => Map.fromEntries((args[0] as Iterable).cast<MapEntry>())"
          "toString#0": "(args) => (args[0] as Map).toString()"
          "updateAll#1": |
            (args) {
              final fn = args[1] as Function;
              final map = args[0] as Map;
              for (final key in map.keys.toList()) {
                map[key] = fn(key, map[key]);
              }
              return null;
            }
          "update#3": |
            (args) {
              final updateFn = args[2] as Function;
              final ifAbsentFn = args.length > 3 ? args[3] as Function? : null;
              return (args[0] as Map).update(
                args[1],
                (v) => updateFn(v),
                ifAbsent: ifAbsentFn != null ? () => ifAbsentFn() : null,
              );
            }

      # ── Set: callback methods + symmetricDifference + toString ──
      Set:
        extra_methods:
          "toString#0": "(args) => (args[0] as Set).toString()"
          "toList#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as Set).toList(growable: args[1] as bool);
              }
              return (args[0] as Set).toList();
            }
          "symmetricDifference#1": |
            (args) {
              final a = args[0] as Set;
              final b = args[1] as Set;
              return a.union(b).difference(a.intersection(b));
            }
          "where#1": |
            (args) {
              final fn = args[1] as Function;
              return (args[0] as Set).where((e) => fn(e) as bool);
            }
          "firstWhere#2": |
            (args) {
              final fn = args[1] as Function;
              final orElse = (args.length > 2 && args[2] != null) ? args[2] as Function : null;
              for (final e in args[0] as Set) {
                if (fn(e) as bool) return e;
              }
              if (orElse != null) return orElse();
              throw StateError('No element');
            }
          "reduce#1": |
            (args) {
              final fn = args[1] as Function;
              final set = args[0] as Set;
              final iter = set.iterator;
              if (!iter.moveNext()) throw StateError('No element');
              var value = iter.current;
              while (iter.moveNext()) {
                value = fn(value, iter.current);
              }
              return value;
            }

      # ── Runes: inherited methods + optional param methods ──
      Runes:
        extra_methods:
          "hashCode#0": "(args) => (args[0] as Runes).hashCode"
          "toString#0": "(args) => (args[0] as Runes).toString()"
          "toList#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as Runes).toList(growable: args[1] as bool);
              }
              return (args[0] as Runes).toList();
            }
          "join#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                return (args[0] as Runes).join(args[1] as String);
              }
              return (args[0] as Runes).join();
            }

      # ── RuneIterator: optional param methods ──
      RuneIterator:
        extra_methods:
          "reset#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                (args[0] as RuneIterator).reset(args[1] as int);
              } else {
                (args[0] as RuneIterator).reset();
              }
              return null;
            }

      # ── StringBuffer: optional param constructors/methods ──
      StringBuffer:
        extra_methods:
          "#1": |
            (args) {
              if (args.isNotEmpty && args[0] != null) {
                return StringBuffer(args[0]!);
              }
              return StringBuffer();
            }
          "writeln#1": |
            (args) {
              if (args.length > 1 && args[1] != null) {
                (args[0] as StringBuffer).writeln(args[1]);
              } else {
                (args[0] as StringBuffer).writeln();
              }
              return null;
            }
