name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: dartic-cli-darwin-arm64
          - os: ubuntu-latest
            target: dartic-cli-linux-x64
    steps:
      - uses: actions/checkout@v4
      - name: Read Dart SDK version
        id: sdk
        run: echo "version=$(cat .dart-sdk-version)" >> $GITHUB_OUTPUT
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ steps.sdk.outputs.version }}
      - name: Clone vendor/dart-sdk
        run: |
          git clone --depth 1 --filter=blob:none --branch ${{ steps.sdk.outputs.version }} \
            https://github.com/dart-lang/sdk.git vendor/dart-sdk
      - name: Install dependencies
        run: dart pub get
      - name: Run tests
        continue-on-error: true
        run: dart test --reporter expanded
      - name: Compile CLI binary
        run: dart compile exe packages/dartic_cli/bin/dartic.dart -o ${{ matrix.target }}
      - name: Verify binary
        run: ./${{ matrix.target }} version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "dartic ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/dartic-cli-darwin-arm64/dartic-cli-darwin-arm64 \
            artifacts/dartic-cli-linux-x64/dartic-cli-linux-x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
